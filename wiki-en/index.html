ompatibility shim between Unix-style networking APIs and their equivalents in Windows. It allows developers using libraries or code that assumes POSIX headers to compile and run correctly on Windows platforms by providing necessary definitions without requiring full emulation of the entire POSIX stack.\n\nIt is intended to be included directly via standard include directives, e.g.,\n\n```c\n#include <sys/socket.h>\n#include <sys/time.h>\n#include <sys/types.h>\n```\n\nThese files are typically used alongside other components such as `win32compat/net` or `win32compat/unistd` to provide complete network I/O support under Windows.\n\n## Integration Points\n\nThe module integrates with several parts of the system:\n\n- **Networking Layer (`net`)**: Used by functions like `socket()`, `bind()`, `connect()` when interfacing with low-level sockets.\n- **System Calls (`unistd`)**: Provides types needed for system call interfaces involving file offsets and sizes.\n- **Windows Sockets API (`<winsock2.h>` & `<ws2tcpip.h>`)**: This module acts as a wrapper around native Windows socket functionality, exposing it through familiar POSIX-like names.\n\nNo internal calls or execution flows exist within this module; its role is purely header definition and inclusion management.\n\n## Example Use Case\n\nA typical usage scenario involves defining a custom struct for handling both IPv4 and IPv6 addresses transparently:\n\n```c\nstruct addr_info {\n    int family;\n    union {\n        struct sockaddr_in v4;\n        struct sockaddr_in6 v6;\n    } addr;\n};\n```\n\nThen using `getaddrinfo()` to resolve domain names into these structures, which can then be passed to higher-level functions expecting generic socket addresses.\n\n## Notes\n\nSome macros and constants defined here may conflict with those already present in older versions of `<winsock.h>`. The inclusion order must ensure that `<winsock2.h>` is included before including any headers that depend on it (such as `ws2tcpip.h`).","other-tsunami-spec-in":"# Other — tsunami.spec.in\n\n# Tsunami UDP File Transport Module\n\n## Overview\n\nThe tsunami module implements a fast UDP-based file transport protocol designed for high-speed data transfer in radio astronomy applications, particularly within Very Long Baseline Interferometry (VLBI) systems. It provides both client and server components for efficient network-based file transmission.\n\n## Purpose\n\nThis module enables rapid data transfer between nodes in VLBI networks where low latency and high bandwidth are critical requirements. The implementation was originally developed at Indiana University and later enhanced by contributors from Metsahovi and NRAO.\n\n## Key Components\n\n### Executables\n- `tsunami`: Client application for file transport\n- `tsunamid`: Server daemon for file transport\n- `rttsunami`: Real-time client for file transport\n- `rttsunamid`: Real-time server daemon for file transport\n\n### Build Process\nThe module uses standard RPM build macros:\n- `%prep`: Extracts and prepares source files using `%setup`\n- `%build`: Configures and compiles with `./configure` and `make`\n- `%install`: Installs built binaries using `make install`\n\n## Architecture\n\n```\n┌─────────────┐    ┌─────────────┐\n│   rttsunami  │    │   rttsunamid  │\n└─────────────┘    └─────────────┘\n       │                  │\n       └──────────────────┘\n              ▼\n        ┌─────────────┐\n        │   Tsunami     │\n        │   Protocol    │\n        └─────────────┘\n              ▼\n        ┌─────────────┐\n        │   UDP Layer  │\n        └─────────────┘\n```\n\n## Implementation Details\n\nThe tsunami protocol operates over UDP, leveraging its speed advantages for real-time astronomical data streaming. The module supports both regular and real-time variants:\n\n1. **Regular tsunami**: Standard UDP-based transport\n2. **Real-time tsunami**: Enhanced version optimized for time-critical applications\n\nBoth implementations use the same underlying transport mechanism but differ in their handling of timing constraints and buffer management.\n\n## Integration Points\n\nThe module appears to be self-contained without internal dependencies or external call relationships. It integrates into larger VLBI systems through its command-line interfaces which can be invoked directly or used as part of automated workflows.\n\n## Usage Context\n\nThis module is primarily intended for use in VLBI data processing pipelines where large amounts of observational data need to be transferred quickly between stations. The real-time variants suggest it's also suitable for applications requiring strict timing guarantees during data acquisition.\n\n## Version History\n\n- **0.92wb** (Sat Jul 20 2013): Initial version by Walter Brisken\n- **Merged version** (Thu Aug 15 2013): Integration of Walter's changes by Jan Wagner","other-util":"# Other — util\n\n# Other — util\n\nThis module contains utility scripts and tools used in support of the Tsunami software package, primarily focused on experiment setup, recording, and testing. These are not part of the core library but provide automation and operational assistance for tasks such as generating schedule scripts, managing transfers, and analyzing performance.\n\n## Purpose\n\nThe `util` directory provides shell scripts and configuration files that assist in:\n- Generating client-side scripts (`recexpt_*.sh`) from SNAP files.\n- Managing real-time Tsunami recordings via remote clients.\n- Running network tests using iperf.\n- Analyzing Tsunami transcripts with plotting utilities.\n- Automating routine tasks like DRUDG processing or file transfer setups.\n\nThese tools are intended for use by operators or developers working with Tsunami-based experiments, especially those involving real-time data capture and playback.\n\n## Key Components\n\n### Scripts for Schedule Generation\n\n#### `makeRecexpt.sh`\nGenerates a Bash script (`recexpt_*_*.sh`) based on a `.snp` file produced by DRUDG. This script is used to record all scans of an experiment locally onto disk using the `wr` tool.\n\nIt parses scan names and start times from the SNP file, converts them into date formats, and outputs a list of commands to execute `recpass`.\n\n#### `makeRecexpt-tsunami.sh`\nSimilar to `makeRecexpt.sh`, but generates a version tailored for real-time Tsunami client-side recording. It creates a script that downloads each scan from a remote server using `recpass-tsunami`.\n\n### Recording Tools\n\n#### `recpass`\nA simple script to initiate a single recording session using the `wr` program. It takes a scan name and duration in seconds, then sets up the correct parameters for writing to RAID.\n\n#### `recpass-tsunami`\nDesigned for real-time Tsunami client usage. Downloads a single scan from a remote Tsunami server using the `tsunami` command-line client. Requires editing of server address, password, root directory, and rate settings before use.\n\n### Experiment Execution Scripts\n\n#### `recexpt.head` / `recexpt.tail`\nTemplate files used by `makeRecexpt.sh` to generate full `recexpt_*_*.sh` scripts. They define common variables and control flow logic (e.g., skipping old scans).\n\n#### `recexpt-tsunami.head` / `recexpt-tsunami.tail`\nSame purpose as above, but for tsunami-specific scripts generated by `makeRecexpt-tsunami.sh`. Includes additional handling for background processes and time synchronization.\n\n### Testing & Analysis\n\n#### `iperf-tester.sh`\nRuns a two-way UDP test using iperf between local machine and another host, testing various packet sizes and transmit rates at predefined bandwidths. Uses port 46224.\n\n#### `tsuc2plot.sh`\nTakes a Tsunami transcript file (`.tsuc`) and plots its performance metrics (transfer rates, loss) over time using Octave/GNUplot.\n\n#### `tsunami-testload.sh`\nUsed to simulate or test real-time transfers via Tsunami. Continuously connects to a specified server and requests dummy transfer files.\n\n### Automation Helpers\n\n#### `MhDrudge.sh`\nAutomates processing of SKD files with DRUDG to produce PRC/SNP output files for station Mh. Also handles cleanup of existing output files and calls `makeRecexpt-tsunami.sh` to create corresponding recexpt scripts.\n\n## Integration Points\n\nThese utilities are not directly integrated into core libraries but can be invoked manually or through automation tools like Makefiles or experiment control systems.\n\nFor example:\n- The `Makefile.am` defines build targets (`readtest`, `writetest`, etc.) which may reference these tools.\n- `MhDrudge.sh` is called during scheduling preparation to automate SNP/PRC creation.\n- `makeRecexpt-tsunami.sh` generates client-side scripts needed for real-time data capture.\n\n## Diagram: Schedule Script Generation Workflow\n\n```mermaid\ngraph TD\n    A[SKD File] --> B[DRUDG]\n    B --> C[SNP File]\n    C --> D[makeRecexpt-tsunami.sh]\n    D --> E[recexpt_tsunami.sh]\n    E --> F[recpass-tsunami.sh]\n```\n\nThis diagram illustrates how an SKD schedule file is processed through DRUDG to generate a `.snp` file, then passed to the generator script to produce a final recording script that uses `recpass-tsunami`.\n\n## Notes\n\nSome scripts contain TODO comments indicating areas where improvements could be made, such as automatic samplerate detection in `makeRecexpt-tsunami.sh`. Others include hardcoded assumptions about RAID paths or frame rates that must be adjusted per system configuration.","other-win32compat":"# Other — win32compat\n\n# win32compat Module\n\nThis module provides compatibility layer support for POSIX thread functionality on Windows platforms. It specifically handles compilation of the static pthread library (`pthreadVC2.lib`) using Microsoft Visual C++ tools.\n\n## Purpose\n\nThe primary purpose of this module is to facilitate building a Windows-compatible POSIX threading library that can be statically linked into applications. This enables cross-platform development where POSIX threads are used on Unix-like systems while maintaining equivalent functionality on Windows.\n\n## Key Components\n\n### pthreadVC2.lib Compilation Process\n\nThe module documents the process for compiling `pthreadVC2.lib` using Visual C++ 6.0 and newer versions. The compilation workflow involves:\n\n1. Setting up the Visual C++ environment via `vcvars32.bat`\n2. Executing `nmake clean VC-static` to build the static library\n\n### Build Environment Requirements\n\n- Visual Studio installation with `vcvars32.bat` available\n- Command-line access through `cmd.exe`\n- Support for multiple Visual C++ versions including:\n  - Visual C++ 6.0 (VC6)\n  - Visual C++ 7.1 (VC7.1)\n  - Visual C++ 2005 (VC2005 Express)\n\n### Default Installation Path\n\nFor Visual C++ 6.0, the `vcvars32.bat` file is typically located at:\n```\nC:\\Program Files\\Microsoft Visual Studio\\VC98\\Bin\\\n```\n\n## Integration Points\n\nThis module serves as a build-time dependency rather than an active runtime component. It does not contain executable code but instead provides instructions for external tooling processes.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[Visual Studio] --> B[vcvars32.bat]\n    B --> C[nmake clean VC-static]\n    C --> D[pthreadVC2.lib]\n```\n\n## Usage Notes\n\nThis module acts as a reference guide for developers who need to rebuild or update the pthread library in their Windows development environments. Since no incoming or outgoing calls are documented, this module functions purely as informational content for the build system setup.\n\n## Dependencies\n\nNo internal dependencies exist within this module. All operations rely entirely on external build tools and environment variables provided by Visual Studio installations.","overview":"# tsunami-udp — Wiki\n\n# Tsunami UDP Overview\n\nWelcome to **tsunami-udp**, a real-time file transfer protocol implementation designed for high-performance data delivery with precise timing control.\n\nThis system enables clients to connect to servers over TCP and perform file transfers using UDP, supporting both standard and specialized real-time operations. It is particularly useful in environments such as Mark5 hardware or VSIB-based systems where accurate data streaming is required.\n\n## Architecture\n\nThe following diagram shows the core modules involved in the Tsunami UDP system:\n\n```mermaid\ngraph TD\n    A[RT Client Interface] --> B[Client Communication]\n    A --> C[Core Utilities]\n    B --> D[Server Components]\n    D --> E[Core Utilities]\n    D --> F[RT Server Components]\n    F --> G[MK5 Server Functionality]\n    G --> H[Core Utilities]\n    C --> I[Utility Tools]\n    I --> J[Core Utilities]\n\n    style A fill:#ffe4b5\n    style B fill:#ffe4b5\n    style D fill:#add8e6\n    style F fill:#add8e6\n    style G fill:#98fb98\n```\n\n### Key Modules\n\n- The [RT Client Interface](rt-client-interface.md) provides the command-line interface used by users.\n- The [Client Communication](client-communication.md) module handles all client-side logic including connection management and protocol negotiation.\n- The [Server Components](server-components.md) module implements core server functionality like configuration handling and authentication.\n- The [RT Server Components](rt-server-components.md) provide real-time capabilities built on top of standard socket APIs.\n- The [MK5 Server Functionality](mk5-server-functionality.md) supports integration with Mark5 hardware via StreamStor disk I/O.\n- The [Core Utilities](core-utilities.md) module offers shared functions across the codebase, such as MD5 computation and time utilities.\n- The [Utility Tools](utility-tools.md) module contains small diagnostic programs used for testing and benchmarking.\n\n## End-to-End Flows\n\n1. A user starts the RT client (`./client/tsunami`) and connects to a server using `connect`.\n2. The client negotiates parameters with the server through the TCP session managed by the [Client Communication](client-communication.md) module.\n3. Once connected, the client initiates file transfers using UDP, handled by the [RT Server Components](rt-server-components.md).\n4. For real-time applications involving Mark5 hardware, the [MK5 Server Functionality](mk5-server-functionality.md) takes over to manage disk I/O via `xlrapi`.\n\n## Setup Instructions\n\nTo compile and run tsunami-udp:\n\n```bash\n# Compile the project\n./recompile.sh\n\n# Start the server (example)\n./server/tsunamid --help\n\n# Run the client (example)\n./client/tsunami help\n```\n\nFor more detailed usage instructions, refer to the full command examples in the README excerpt:\n\n```bash\n# Full example command:\n./client/tsunami connect your.server.add set udpport 51031 get path/to/yourfile quit\n```\n\n## Compatibility Notes\n\nThis system includes support for Windows compatibility through the [Windows Compatibility](windows-compatibility.md) module, which bridges POSIX threading semantics with Win32 APIs using the `pthreads-win32` library.\n\n---\n\n*Next: Explore the [Client Communication](client-communication.md) or [Server Components](server-components.md)*","rt-client-interface":"# RT Client Interface\n\n# RT Client Interface\n\nThe RT Client Interface is a command-line interface client for the Tsunami file transfer protocol that supports real-time data streaming over TCP and UDP connections.\n\n## Purpose\n\nThis module provides functionality for:\n- Establishing network connections with Tsunami servers\n- Managing file transfers using TTP (Tsunami Transfer Protocol)\n- Handling disk I/O operations for received blocks\n- Supporting IPv4/IPv6 socket handling\n- Providing transcript logging capabilities\n\n## Key Components\n\n### Configuration Management (`config.c`)\nManages default parameters and session configuration:\n\n```c\ntypedef struct {\n    u_int32_t block_size;\n    char *server_name;\n    u_int16_t server_port;\n    u_int16_t client_port;\n    u_int32_t udp_buffer;\n    u_char verbose_yn;\n    u_char transcript_yn;\n    u_char ipv6_yn;\n    u_char output_mode;\n    u_int32_t target_rate;\n    u_char rate_adjust;\n    u_int32_t error_rate;\n    u_int16_t slower_num;\n    u_int16_t slower_den;\n    u_int16_t faster_num;\n    u_int16_t faster_den;\n    u_int16_t history;\n    u_char lossless;\n    u_int32_t losswindow_ms;\n    u_char blockdump;\n} ttp_parameter_t;\n```\n\nFunctions:\n- `reset_client()` - Resets all parameters to defaults\n- Global constants defining default values for various settings\n\n### Network Operations (`network.c`, `network_v4.c`, `network_v6.c`)\n\nHandles socket creation and connection management:\n\n#### TCP Socket Creation\n```c\nint create_tcp_socket(ttp_session_t *session,\n                      const char *server_name, \n                      u_int16_t server_port);\n```\n\n#### UDP Socket Creation\n```c\nint create_udp_socket(ttp_parameter_t *parameter);\n```\n\nSupports both IPv4 and IPv6 through separate implementations:\n- `create_tcp_socket_v4()`\n- `create_tcp_socket_v6()`\n- `create_udp_socket_v4()`\n- `create_udp_socket_v6()`\n\n### Disk I/O Operations (`io.c`)\n\nManages writing received blocks to disk:\n\n```c\nint accept_block(ttp_session_t *session,\n                u_int32_t block_index, \n                u_char *block);\n```\n\nIncludes support for VSIB real-time processing when enabled via `VSIB_REALTIME`.\n\n### Protocol Implementation (`protocol.c`)\n\nImplements core TTP protocol functions:\n\n#### Authentication\n```c\nint ttp_authenticate(ttp_session_t *session, u_char *secret);\n```\n\n#### Negotiation\n```c\nint ttp_negotiate(ttp_session_t *session);\n```\n\n#### File Transfer Setup\n```c\nint ttp_open_transfer(ttp_session_t *session,\n                       const char *remote_filename,\n                       const char *local_filename);\n```\n\n#### Port Management\n```c\nint ttp_open_port(ttp_session_t *session);\n```\n\n#### Retransmission Handling\n```c\nint ttp_repeat_retransmit(ttp_session_t *session);\nint ttp_request_retransmit(ttp_session_t *session, u_int32_t block);\nint ttp_request_stop(ttp_session_t *session);\n```\n\n### Statistics Update (`protocol.c`)\n\nMaintains transfer statistics with IIR filtering:\n\n```c\nint ttp_update_stats(ttp_session_t *session);\n```\n\n### Ring Buffer Management (`ring.c`)\n\nProvides thread-safe ring buffer operations for data staging between network and disk threads:\n\n```c\ntypedef struct {\n    int count_data;\n    int count_reserved;\n    int base_data;\n    int space_ready;\n    int data_ready;\n    // ... other fields\n} ring_buffer_t;\n\n// Thread-safe operations\nu_char *ring_peek(ring_buffer_t *ring);\nu_char *ring_reserve(ring_buffer_t *ring);\nint ring_confirm(ring_buffer_t *ring);\nint ring_cancel(ring_buffer_t *ring);\nint ring_pop(ring_buffer_t *ring);\nint ring_full(ring_buffer_t *ring);\n```\n\n### Transcript Logging (`transcript.c`)\n\nHandles logging of transfer statistics to files:\n\n```c\nvoid xscript_open(ttp_session_t *session);\nvoid xscript_data_log(ttp_session_t *session, const char *logline);\nvoid xscript_close(ttp_session_t *session, u_int64_t delta);\n```\n\n## Execution Flow\n\nThe client operates in a command loop where it processes user commands. Key execution paths include:\n\n1. **Connection establishment**: `create_tcp_socket()` → `getaddrinfo()`\n2. **UDP port binding**: `create_udp_socket()` → attempts multiple ports until success\n3. **File transfer initiation**: `ttp_open_transfer()` → sends filename request → receives parameters\n4. **Data reception**: Network thread → `accept_block()` (via `ring_reserve`) → Disk thread → `accept_block()`\n5. **Retransmission handling**: `ttp_repeat_retransmit()` → filters blocks that were received or are already pending\n6. **Statistics update**: Periodically called by main loop to compute rates and error metrics\n\n## Mermaid Diagram: Client Session Lifecycle\n\n```mermaid\ngraph TD\n    A[Client Start] --> B{User Command}\n    B --> C[connect]\n    C --> D[create_tcp_socket()]\n    D --> E[TCP Connection Established]\n    E --> F[create_udp_socket()]\n    F --> G[UDP Port Created]\n    G --> H[open_transfer]\n    H --> I[Send Request]\n    I --> J[Receive Response]\n    J --> K[Open Local File]\n    K --> L[Start Data Transfer]\n    L --> M[Network Thread Receives UDP]\n    M --> N[Disk Thread Writes Blocks]\n    N --> O[Update Stats]\n    O --> P{Transfer Complete?}\n    P -->|Yes| Q[Close Session]\n    P -->|No| R[Continue Transfer]\n\n    subgraph \"Session\"\n        E\n        G\n        H\n        J\n        K\n        L\n        M\n        N\n        O\n        P\n    end\n```\n\n## Compilation Flags\n\n- `VSIB_REALTIME`: Enables VSIB real-time processing support\n- `DEBUG_RETX`: Enables retransmission debug output\n- `STATS_MATLABFORMAT`: Changes stats display format\n- `RETX_REQBLOCK_SORTING`: Enables insertion sort for retransmit requests\n\n## Error Handling\n\nAll functions return 0 on success, non-zero on failure. Critical errors call `error()` while recoverable issues use `warn()`. Memory allocation failures result in program termination.\n\n## Threading Model\n\nUses pthreads for synchronization between network and disk threads:\n- Mutexes protect ring buffer access\n- Condition variables signal when data is ready or space is available\n- Ring buffer operations (`ring_pop`, `ring_reserve`, etc.) are thread-safe","rt-server-components":"# RT Server Components\n\n# RT Server Components\n\nThe **RT Server Components** module implements a real-time file transfer server designed for high-performance data delivery with precise timing control. It supports both standard file transfers and specialized real-time operations using VSIB (VLBI Storage Interface Board) hardware.\n\n## Purpose\n\nThis module provides:\n- Real-time file transfer capabilities via Tsunami Transfer Protocol (TTP)\n- Support for VSIB hardware-based real-time data streaming\n- Configurable parameters for block size, buffer sizes, timeouts, etc.\n- Logging and transcript generation for performance analysis\n- EVN filename parsing utilities for real-time scheduling\n\nIt is used in conjunction with `tsunami-client` to provide synchronized, low-latency file transfers suitable for VLBI and other time-sensitive applications.\n\n## Key Files & Components\n\n### Configuration (`config.c`)\nManages default configuration values and parameter reset logic:\n\n```c\nconst u_int32_t DEFAULT_BLOCK_SIZE = 1024;\nconst u_char *DEFAULT_SECRET = (u_char*)\"kitten\";\nconst u_int16_t DEFAULT_TCP_PORT = TS_TCP_PORT;\nconst u_int32_t DEFAULT_UDP_BUFFER = 20000000;\nconst u_char DEFAULT_VERBOSE_YN = 1;\nconst u_char DEFAULT_TRANSCRIPT_YN = 0;\nconst u_char DEFAULT_IPV6_YN = 0;\nconst u_int16_t DEFAULT_HEARTBEAT_TIMEOUT = 15;\n\nvoid reset_server(ttp_parameter_t *parameter);\n```\n\n### Disk I/O (`io.c`)\nHandles building datagrams from files or VSIB boards:\n\n```c\nint build_datagram(ttp_session_t *session, u_int32_t block_index,\n                   u_int16_t block_type, u_char *datagram);\n\n// Optional MODE_34TH support for packing 3-of-4 byte reads\n```\n\n### Logging (`log.c`)\nProvides timestamped logging functionality:\n\n```c\nvoid log(FILE *log_file, const char *format, ...);\n```\n\n### Main Loop (`main.c`)\nEntry point that handles client connections and session management:\n\n```c\nint main(int argc, char *argv[]);\nvoid client_handler(ttp_session_t *session);\nvoid process_options(int argc, char *argv[], ttp_parameter_t *param);\n```\n\n### Network Setup (`network.c`)\nSocket creation and configuration routines:\n\n```c\nint create_tcp_socket(ttp_parameter_t *param);\nint create_udp_socket(ttp_parameter_t *param);\n```\n\n### EVN Filename Parsing (`parse_evn_filename.c`)\nParses EVN-style filenames containing start times and auxiliary information:\n\n```c\nstruct evn_filename* parse_evn_filename(char *filename);\nchar* get_aux_entry(char *key, char **auxinfo, int nr_auxinfo);\ndouble interpret_as_utc(...);\n```\n\n### Protocol Handling (`protocol.c`)\nImplements TTP protocol negotiation, authentication, and retransmission handling:\n\n```c\nint ttp_negotiate(ttp_session_t *session);\nint ttp_authenticate(ttp_session_t *session, const u_char *secret);\nint ttp_accept_retransmit(ttp_session_t *session, retransmission_t *retrans, u_char *datagram);\nint ttp_open_port(ttp_session_t *session);\nint ttp_open_transfer(ttp_session_t *session);\n```\n\n### Transcript Generation (`transcript.c`)\n\nGenerates performance transcripts of transfers:\n\n```c\nvoid xscript_open(ttp_session_t *session);\nvoid xscript_close(ttp_session_t *session, u_int64_t delta);\nvoid xscript_data_start(ttp_session_t *session, const struct timeval *epoch);\nvoid xscript_data_stop(ttp_session_t *session, const struct timeval *epoch);\nvoid xscript_data_log(ttp_session_t *session, const char *logline);\n```\n\n## Execution Flow\n\nThe server starts by initializing parameters via `reset_server()` and parsing command-line options in `process_options()`. It then creates a TCP socket using `create_tcp_socket()`.\n\nWhen a new connection is accepted:\n1. A new session is created.\n2. The client authenticates with `ttp_authenticate()`.\n3. Transfer parameters are negotiated through `ttp_negotiate()` and `ttp_open_transfer()`.\n4. Data transfer begins via `build_datagram()` and `sendto()` calls on UDP sockets.\n5. Retransmissions are handled by `ttp_accept_retransmit()` which may trigger `build_datagram()` again for the same block.\n6. Transcripts are generated during transfer if enabled.\n\nFor VSIB real-time mode (when compiled with `-DVSIB_REALTIME`):\n- Uses `/dev/vsib` to read data blocks directly from hardware.\n- Parses EVN filename formats to determine start time and metadata.\n- Starts/stop vsib board operations via `start_vsib()` / `stop_vsib()` functions.\n- Optionally writes local disk copies of received data when `fileout` flag is set.\n\n## Mermaid Diagram: Client Session Lifecycle\n\n```mermaid\ngraph TD\n    A[Main Loop] --> B{New Connection}\n    B --> C[Create Session]\n    C --> D[Accept Auth]\n    D --> E[Authenticate Client]\n    E --> F[Negotiate Parameters]\n    F --> G[Open Transfer]\n    G --> H[Set Up UDP Port]\n    H --> I[Send File Blocks]\n    I --> J{Retransmit Request?}\n    J --> K[Handle Retransmit]\n    K --> L[Build Datagram]\n    L --> M[Send Block]\n    M --> N[Monitor Heartbeat]\n    N --> O{Timeout?}\n    O --> P[Close Session]\n    P --> Q[Return to Main Loop]\n    \n    subgraph \"VSIB Mode\"\n        R[start_vsib]\n        S[read_vsib_block]\n        T[stop_vsib]\n    end\n    \n    R --> S\n    S --> T\n    T --> U[close vsib file]\n    U --> V[close local copy]\nend\n```\n\n## Configuration Options\n\n| Option | Description |\n|------------|----------------|\n| `--verbose`, `-v` | Enable verbose output |\n| `--transcript`, `-t` | Enable transcript logging |\n| `--v6`, `-6` | Use IPv6 instead of IPv4 |\n| `--port=N`, `-p N` | Listen port number |\n| `--secret=STR`, `-s STR` | Shared secret string |\n| `--buffer=N`, `-b N` | UDP buffer size in bytes |\n| `--hbtimeout=N`, `-h N` | Heartbeat timeout in seconds |\n\nWhen compiling with `-DVSIB_REALTIME`:\n| Option | Description |\n|------------|----------------|\n| `--vsibmode=N`, `-M N` | Set VSIB operating mode |\n| `--vsibskip=N`, `-S N` | Skip N samples after each sample |\n\n## Integration Points\n\nThis module integrates with the following components:\n\n1. **Client-side**: Communicates using Tsunami Transfer Protocol (TTP) over TCP for negotiation, MD5 authentication, and UDP for data transfer.\n2. **Common Headers**: Uses `tsunami-server.h` for shared types and constants.\n3. **VSIB Driver**: When compiled with `-DVSIB_REALTIME`, interacts directly with `/dev/vsib`.\n4. **EVN Parser**: Parses EVN-style filenames when real-time mode is enabled.\n\nThe server supports both single-user and multi-user modes depending on compile flags (`-DVSIB_REALTIME`). In real-time mode, it uses a single-threaded approach without forking child processes.","server-components":"# Server Components\n\n# Server Components\n\n## Purpose\n\nThe Server Components module implements the core functionality of the Tsunami file transfer server. It handles incoming client connections, manages file transfers over UDP, negotiates protocol parameters, authenticates clients, and logs transfer statistics.\n\n## Key Components\n\n### Configuration Management (`config.c`)\nManages server configuration parameters with default values:\n- `DEFAULT_BLOCK_SIZE`: Default block size (1024 bytes)\n- `DEFAULT_SECRET`: Default shared secret (\"kitten\")\n- `DEFAULT_TCP_PORT`: Default TCP port (TS_TCP_PORT)\n- `DEFAULT_UDP_BUFFER`: Default UDP buffer size (20000000 bytes)\n- `DEFAULT_HEARTBEAT_TIMEOUT`: Heartbeat timeout in seconds (15)\n\nFunctions:\n- `reset_server()`: Initializes parameter structure with defaults\n\n### Network Operations (`network.c`)\nHandles socket creation and management:\n- `create_tcp_socket()`: Creates IPv4 or IPv6 TCP listening socket\n- `create_udp_socket()`: Creates UDP socket for data transmission\n\n### Disk I/O (`io.c`)\nProvides disk reading operations:\n- `build_datagram()`: Reads file blocks and constructs datagrams\n\n### Protocol Handling (`protocol.c`)\nImplements TTP protocol negotiation and retransmission handling:\n- `ttp_negotiate()`: Verifies protocol revision compatibility\n- `ttp_authenticate()`: Handles client authentication using MD5 challenge-response\n- `ttp_open_port()`: Sets up UDP communication channel\n- `ttp_accept_retransmit()`: Processes retransmission requests from clients\n\n### Logging & Transcripting (`log.c`, `transcript.c`)\n- `log()`: Formats timestamped log messages\n- `xscript_*()` functions: Generate detailed transfer transcripts\n\n### Main Loop (`main.c`)\nCoordinates server operation:\n- `main()`: Entry point that listens for connections and forks child processes\n- `client_handler()`: Child process logic for individual client sessions\n- `reap()`: Signal handler for zombie process cleanup\n\n## Execution Flow\n\n```mermaid\ngraph TD\n    A[Client Connects] --> B{Fork Child}\n    B --> C[Child Process]\n    C --> D[Accept Negotiation]\n    D --> E[Authenticate Client]\n    E --> F[Open Transfer Request]\n    F --> G[Set Up UDP Port]\n    G --> H[Send File Blocks]\n    H --> I[Handle Retransmissions]\n    I --> J{Stop/Timeout}\n    J --> K[Close Resources]\n```\n\n## Integration Points\n\n### External Dependencies\n- `tsunami-server.h`: Core header defining structures and constants\n- `include/tsunami.h`: Error handling utilities\n- Common system libraries (`sys/socket.h`, `netinet/tcp.h`)\n\n### Internal Calls\nThe module uses internal function calls to manage session state, including:\n- `full_write()` and `full_read()` for reliable network I/O\n- `getaddrinfo()` for address resolution\n- `sendto()` for UDP packet delivery\n- `fread()` and `fwrite()` for file I/O\n\n## Command-Line Options\n\nSupported options include:\n- `--verbose`: Enable verbose output mode\n- `--transcript`: Record statistics to transcript files\n- `--v6`: Use IPv6 instead of IPv4\n- `--port=n`: Set TCP port number\n- `--secret=s`: Shared secret string\n- `--buffer=bytes`: UDP socket send buffer size\n- `--hbtimeout=seconds`: Heartbeat timeout value\n- `--finishhook=cmd`: Execute command after transfer completion\n- `--allhook=cmd`: Custom file listing program for GET *\n\n## Authentication Protocol\n\nThe server implements a challenge-response authentication mechanism:\n1. Server sends 64 bytes of random data to client\n2. Client XORs shared secret with random data and computes MD5 hash\n3. Client sends MD5 digest back to server\n4. Server performs same computation and compares digests\n\n## Data Transmission\n\nFile blocks are transmitted over UDP using the following format:\n```\n+---------------------+\n|   block_number (4)  |\n+----------+----------+\n|   type (2) |   data (n) |\n+----------+     :    :\n:     :          :    :    :\n+---------------------+\n```\n\nEach datagram consists of a 4-byte block number, 2-byte block type, followed by the actual data payload.\n\n## Realtime Support\n\nWhen compiled with `VSIB_REALTIME` flag:\n- Supports real-time VLBI data streaming via `/dev/vsib`\n- Parses EVN filename conventions for time-based start scheduling\n- Implements IPD throttling for precise timing control","utility-tools":"# Utility Tools\n\n# Utility Tools\n\nThe **Utility Tools** module provides a collection of small command-line tools used for testing, benchmarking, and data manipulation in low-level system operations.\n\nThese utilities are typically compiled separately and executed directly from the terminal or shell scripts. They serve as lightweight diagnostics or performance measurement tools with minimal dependencies on other modules within the project.\n\n## Purpose\n\nThis module contains standalone programs that perform specific tasks related to:\n\n- Data skipping/filtering (`bskp`)\n- Hexadecimal memory dumping (`dump`)\n- Benchmarking disk read throughput (`readtest`)\n- Benchmarking disk write throughput (`writetest`)\n- Simulating fused reads with random delays (`fusereadtest`)\n- Testing insertion sort logic (`insertsorttest`)\n\nEach tool is designed to be simple, focused, and useful for debugging or validating hardware/software behavior under test conditions.\n\n## Key Components\n\n### `bskp.c`\nA utility for reading input bytes and outputting every third byte from each group of four consecutive bytes.\n- Reads from stdin\n- Writes to stdout\n- Skips one byte after every three bytes in a 4-byte sequence\n\n#### Example Usage:\n```bash\ncat input.bin | ./bskp > output.bin\n```\n\n#### Execution Flow:\n```mermaid\ngraph TD\n    A[stdin] --> B{getc}\n    B --> C{putc}\n    C --> D{getc}\n    D --> E{putc}\n    E --> F{getc}\n    F --> G{putc}\n    G --> H{getc}\n    H --> I[skip]\n```\n\n### `dump.c`\nDumps hexadecimal values of input bytes grouped into sets of three, formatted like standard hex dumps.\n- Reads from stdin\n- Outputs bytes in groups of three followed by spaces\n- After every fourth group, starts a new line prefixed by address\n\n#### Example Output:\n```\n0000: 00 01 02     03 04 05     06 07 08     09 0A 0B\n```\n\n### `readtest.c`\nMeasures disk read speed using buffered file I/O.\n\n#### Features:\n- Uses `malloc()` to allocate buffer\n- Measures time between start and stop using `gettimeofday()`\n- Calculates Mbps based on total bits read over elapsed microseconds\n\n#### Execution Flow:\n```mermaid\ngraph TD\n    A[main] --> B[fopen]\n    B --> C[fseeko]\n    C --> D[ftello]\n    D --> E[fread loop]\n    E --> F[gettimeofday]\n    F --> G[stop]\n    G --> H[print results]\n```\n\n### `writetest.c`\nMeasures disk write speed using buffered file I/O.\n\n#### Features:\n- Allocates a block of memory via `malloc()`\n- Writes fixed-size blocks repeatedly until reaching target size\n- Reports performance metrics including Mbps\n\n#### Execution Flow:\nSame as `readtest`, but uses `fwrite` instead of `fread`.\n\n### `fusereadtest.c`\nSimulates fused read operations with randomized sleep intervals between reads.\n\n#### Features:\n- Randomly selects number of iterations per cycle (up to 4)\n- Sleeps randomly between cycles using `usleep()`\n- Tracks timing information through `gettimeofday()`\n- Computes effective throughput during execution\n\n#### Constants Used:\n- `DIFX_RECEIVE_RING_LENGTH = 4`\n\n#### Execution Flow:\n```mermaid\ngraph TD\n    A[main] --> B[srand]\n    B --> C[fopen]\n    C --> D[rand()]\n    D --> E[fread]\n    E --> F[usleep]\n    F --> G[loop back to D]\n    G --> H[close]\n```\n\n### `insertsorttest.c`\nTests insertion sorting logic for integer arrays. Demonstrates how elements are inserted while maintaining sorted order.\n\n#### Functions:\n- `insert(int val)` - inserts value into array at correct position\n- `dumpTab()` - prints first few entries of the array\n\n#### Use Case:\nUsed primarily for educational or internal validation purposes rather than production use.\n\n## Integration Points\n\nThese tools do not depend on any shared libraries or core modules in this codebase. They rely only on standard C library functions (`stdio.h`, `stdlib.h`, etc.) and system calls such as:\n\n- `gettimeofday()` – used by `readtest`, `writetest`, and `fusereadtest`\n- `fopen/fread/fwrite/fclose` – basic file I/O routines\n- `malloc/free` – dynamic allocation/deallocation\n- `usleep` – delay function in `fusereadtest`\n\nThey may be invoked from shell scripts, automated test suites, or directly from command-line interfaces where raw data processing or benchmarking is required.\n\n## Compilation Instructions\n\nAll utilities can be compiled using GCC with no special flags needed beyond `-o <output_name>`.\n\nExample compilation commands:\n```bash\ngcc util/bskp.c -o bskp\ngcc util/dump.c -o dump\ngcc util/readtest.c -o readtest\ngcc util/writetest.c -o writetest\ngcc util/fusereadtest.c -o fusereadtest\ngcc util/insertsorttest.c -o insertsorttest\n```","windows-compatibility":"# Windows Compatibility\n\n# Windows Compatibility Module\n\n## Purpose\n\nThe Windows Compatibility module provides POSIX thread (pthreads) implementation details specific to Windows systems. It includes internal utilities for managing thread cleanup handlers, attribute handling, condition variables, barriers, and other threading primitives that bridge the gap between POSIX thread semantics and Windows threading APIs.\n\nThis module is part of the `pthreads-win32` library which implements POSIX threads on top of Windows Win32 API.\n\n## Key Components\n\n### Thread Cleanup Handlers\n\n#### Functions:\n```c\nptw32_cleanup_t *ptw32_pop_cleanup(int execute);\nvoid ptw32_push_cleanup(ptw32_cleanup_t *cleanup, ptw32_cleanup_callback_t routine, void *arg);\n```\n\nThese functions manage a stack of cleanup handlers associated with each thread. They are used when threads exit or are cancelled to ensure proper resource cleanup.\n\nCleanup handlers are stored in a linked list using `prev` pointers. The stack is managed through `pthread_getspecific()` and `pthread_setspecific()` using the global cleanup key (`ptw32_cleanupKey`). \n\nWhen a cleanup handler is popped, if `execute` is true and the handler exists, it's invoked with the argument passed during registration.\n\n### Attribute Management\n\n#### Structures:\n```c\nstruct pthread_attr_t_\nstruct pthread_barrierattr_t_\nstruct pthread_condattr_t_\n```\n\nThese structures define attributes for various threading objects like threads, barriers, conditions, etc. The attributes are initialized via `pthread_attr_init`, validated by `ptw32_is_attr`, and destroyed by `pthread_attr_destroy`.\n\n### Threading Primitives\n\n#### Condition Variables:\n```c\nint pthread_cond_init(pthread_cond_t *cond, const pthread_condattr_t *attr);\nint pthread_cond_wait(pthread_cond_t *cond, pthread_mutex_t *mutex);\nint pthread_cond_signal(pthread_cond_t *cond);\nint pthread_cond_broadcast(pthread_cond_t *attr);\nint pthread_cond_destroy(pthread_cond_t *cond);\n```\n\nCondition variable implementation uses two semaphores (`semBlockLock`, `semBlockQueue`) and mutexes (`mtxUnblockLock`) to synchronize waiting threads.\n\n#### Barriers:\n```c\nint pthread_barrier_init(pthread_barrier_t *barrier, const pthread_barrierattr_t *attr, unsigned int count);\nint pthread_barrier_wait(pthread_barrier_t *barrier);\nint pthread_barrier_destroy(pthread_barrier_t *attr);\n```\n\nBarriers use alternating semaphores (`semBarrierBreeched[0]`, `semBarrierBreeched[1]`) to coordinate multiple threads at a synchronization point.\n\n#### Mutexes:\n```c\nint pthread_mutex_init(pthread_mutex_t *mutex, const pthread_mutexattr_t *attr);\nint pthread_mutex_lock(pthread_mutex_t *mutex);\nint pthread_mutex_unlock(pthread_mutex_t *mutex);\nint pthread_mutex_timedlock(pthread_mutex_t *mutex, const struct timespec *abstime);\nint pthread_mutex_trylock(pthread_mutex_t *mutex);\nint pthread_mutex_destroy(pthread_mutex_t *mutex);\n```\n\nMutex implementations include both recursive and normal variants, with support for asynchronous cancellation.\n\n## Internal APIs\n\n### Cleanup Stack Management:\n\nThe cleanup mechanism relies on `pthread_getspecific()`/`pthread_setspecific()` with a dedicated key (`ptw32_cleanupKey`) to store per-thread cleanup stacks.\n\n- **`ptw32_pop_cleanup(int execute)`**: Pops the most recently pushed cleanup handler from thread-specific storage.\n  - If `execute` is non-zero and handler exists, calls handler routine with stored argument.\n  - Returns pointer to previous cleanup handler in stack.\n\n- **`ptw32_push_cleanup(ptw32_cleanup_t *cleanup, ptw32_cleanup_callback_t routine, void *arg)`**: Pushes new cleanup handler onto thread-specific stack.\n  - Stores callback function and argument.\n  - Links into existing cleanup stack using `prev` field.\n\n### Attribute Validation:\n\n- **`ptw32_is_attr(const pthread_attr_t *attr)`: Validates that an attribute object is valid before use. Returns 0 if valid, otherwise EINVAL.\n\n### Thread Management:\n\n- **`ptw32_threadStart(void *vthreadParms)`**: Entry point for all created threads; manages thread lifecycle including cleanup execution upon exit or cancellation.\n\n- **`ptw32_threadDestroy(pthread_t tid)`**: Cleans up resources associated with a thread when it exits or is destroyed.\n\n### Synchronization Primitives:\n\n- **`ptw32_semwait(sem_t *sem)`**: Non-cancelable wait operation on semaphore (used by condition variables).\n- **`ptw32_relmillisecs(const struct timespec *abstime)`**: Calculates relative milliseconds until absolute time expires.\n\n## Execution Flow Diagram\n\n```mermaid\ngraph TD\n    A[pthread_create] --> B[ptw32_threadStart]\n    B --> C[ptw32_push_cleanup]\n    C --> D[Cleanup Handler Registration]\n    B --> E[Thread Body]\n    E --> F[ptw32_pop_cleanup]\n    F --> G[Execute Handlers]\n    G --> H[Resource Cleanup]\n    \n    subgraph Threading_Layer\n        A\n        B\n        C\n        D\n        E\n        F\n        G\n        H\n    end\n    \n    I[ptw32_throw] --> J[ptw32_pop_cleanup_all]\n    J --> K[ptw32_pop_cleanup]\n    K --> L[Cleanup Routine Call]\nend\n```\n\n## Integration Points\n\nThis module integrates with:\n1. Core threading functions via `pthread.h`\n2. Internal implementation details through `implement.h`\n3. Windows API for thread management (`CreateThread`, `SuspendThread`)\n4. POSIX-compatible synchronization primitives like mutexes, conditions, semaphores\n5. Thread-local storage mechanisms (`pthread_getspecific`, `pthread_setspecific`)\n6. Exception handling system (`ptw32_throw`)"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();

</script>
