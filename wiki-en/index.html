var PAGES = {"client-communication":"# Client Communication\n\n# Client Communication Module\n\n## Purpose\n\nThe Client Communication module provides the core functionality for interacting with Tsunami servers via the command-line interface. It handles all client-side operations including connection management, file transfer initiation, data reception, disk I/O handling, and protocol negotiation.\n\n## Key Components\n\n### Command Processing Functions\n\n- `command_close()` - Closes active control session\n- `command_connect()` - Establishes new control session to server\n- `command_dir()` - Requests list of available remote files\n- `command_get()` - Initiates single or multiple file transfers\n- `command_help()` - Provides help on commands\n- `command_quit()` - Closes connection and exits client\n- `command_set()` - Sets configuration parameters\n\n### Core Transfer Logic\n\n#### Data Reception Thread (`disk_thread`)\nA dedicated thread that:\n- Processes received blocks from network\n- Writes blocks to disk in order\n- Handles block accounting and statistics updates\n- Terminates when receiving a zero-block marker\n\n#### Block Tracking (`got_block`, `dump_blockmap`)\nFunctions for checking whether a specific block has been received:\n```c\nint got_block(ttp_session_t* session, u_int32_t blocknr);\n```\n\n### Protocol Negotiation Routines\n\n- `ttp_negotiate()` - Verifies protocol revision compatibility\n- `ttp_authenticate()` - Performs shared secret authentication\n- `ttp_open_transfer()` - Submits file request to server\n- `ttp_open_port()` - Creates UDP socket and communicates port to server\n\n### Network Socket Management\n\n- `create_tcp_socket()` - Opens TCP control channel\n- `create_udp_socket()` - Creates UDP data socket\n- Platform-specific implementations: `create_tcp_socket_v4()`, `create_tcp_socket_v6()`, `create_udp_socket_v4()`, `create_udp_socket_v6()`\n\n## Execution Flow Overview\n\n```mermaid\ngraph TD\n    A[main] --> B{User Input}\n    B --> C[parse_command]\n    C --> D[dispatch_command]\n    D --> E[command_connect|command_get|command_dir|etc]\n    E --> F[Network Operations]\n    F --> G[Protocol Negotiation]\n    G --> H[Data Transfer Initiated]\n    H --> I[create_udp_socket]\n    I --> J[disk_thread]\n    J --> K[accept_block]\n    K --> L[write_to_disk]\n    L --> M[Statistics Updates]\n    M --> N[Retransmit Requests]\n    N --> O[Ring Buffer Management]\n```\n\n## Usage Patterns\n\n### Connection Establishment\n1. User invokes `connect` with optional host/port arguments\n2. Module creates TCP socket using DNS resolution\n3. Negotiates protocol version with server\n4. Authenticates using shared secret\n5. Returns initialized session object\n\n### File Transfer (Single)\n1. User invokes `get <remote_file>`\n2. Module negotiates transfer parameters with server\n3. Creates UDP socket for data reception\n4. Starts `disk_thread` for background I/O\n5. Receives blocks via UDP until complete or error\n\n### Multiple File Transfer (`GET *`)\n1. User invokes `get *`\n2. Module requests all available files from server\n3. For each file:\n   - Negotiates transfer parameters\n   - Sets up UDP socket\n   - Processes blocks through `disk_thread`\n4. Aggregates final statistics across all transfers\n\n## Configuration Parameters\n\nAll configurable values are stored in the global `ttp_parameter_t` structure:\n\n| Parameter | Default Value | Description |\n|-----------|---------------|-------------|\n| `server_name` | \"localhost\" | Hostname of Tsunami server |\n| `server_port` | TS_TCP_PORT | TCP port for control connection |\n| `client_port` | TS_UDP_PORT | UDP port for data connection |\n| `block_size` | 1024 bytes | Size of individual file blocks |\n| `target_rate` | 650 Mbps | Target bandwidth for transfers |\n| `error_rate` | 7.5% | Maximum acceptable packet loss |\n| `lossless` | true | Whether to request retransmissions for missing packets |\n| `losswindow_ms` | 1000 ms | Time window for semi-lossless mode |\n\n## Thread Safety and Concurrency\n\nThe module uses pthreads extensively, particularly:\n- The `disk_thread` handles disk I/O operations concurrently with network reception\n- Ring buffer management is thread-safe with proper locking mechanisms\n- Statistics updates may require synchronization between threads\n\n## Error Handling\n\nAll functions return integer status codes where:\n- Zero indicates success\n- Nonzero indicates failure that should be handled by caller\n\nCommon errors include:\n- Network connectivity issues\n- Authentication failures\n- Disk write permissions\n- Invalid command syntax\n- Server-side transfer rejection\n\n## Integration Points\n\nThis module integrates with:\n- `tsunami-client.h`: Core client API definitions\n- `ring.c`: Block ring buffer implementation\n- `transcript.c`: Statistical logging functionality\n- Platform-specific networking code: `network_v4.c`, `network_v6.c`\n\nIt depends on standard system libraries including:\n- `pthread` for threading support\n- `sys/socket.h` for BSD sockets\n- `netdb.h` for DNS resolution\n- `unistd.h` for Unix system calls","core-utilities":"# Core Utilities\n\n# Core Utilities Module\n\nThe **Core Utilities** module provides shared functionality used across both the Tsunami client and server implementations. It includes essential routines such as random data generation, time handling utilities, MD5 digest computation, and cross-platform compatibility functions.\n\n## Purpose\n\nThis module serves as a foundational component that encapsulates common operations required by multiple parts of the Tsunami system. Its primary goal is to abstract platform-specific behaviors and provide consistent interfaces for core tasks like:\n\n- Generating cryptographically secure random data.\n- Handling time measurements with microsecond precision.\n- Computing MD5 message digests.\n- Reading lines from file descriptors without buffering.\n- Implementing precise sleep functionality.\n\nThese utilities are designed to be portable between Unix-like systems and Windows platforms while maintaining performance and correctness.\n\n## Key Components\n\n### Global Constants\n\n```c\nconst u_int32_t PROTOCOL_REVISION = 0x20061025; // yyyymmdd\nconst u_int16_t REQUEST_RETRANSMIT = 0;\nconst u_int16_t REQUEST_RESTART    = 1;\nconst u_int16_t REQUEST_STOP       = 2;\nconst u_int16_t REQUEST_ERROR_RATE = 3;\n```\n\nGlobal constants define protocol version and request types used in communication between client and server modules.\n\n### Random Data Generation\n\n#### `int get_random_data(u_char *buffer, size_t bytes)`\n\nAttempts to read the specified number of bytes of random data from `/dev/urandom` into the provided buffer. Returns:\n- `0` on success.\n- `-1` on failure.\n\n> On Win32, uses `CryptGenRandom()` instead.\n\n### Time Measurement & Conversion\n\n#### `u_int64_t get_usec_since(struct timeval *old_time)`\n\nReturns the number of microseconds elapsed since the given timestamp (`old_time`). This function handles potential overflow correctly when computing differences over seconds.\n\n#### `u_int64_t htonll(u_int64_t value)` / `u_int64_t ntohll(u_int64_t value)`\n\nConverts a 64-bit integer between host byte order and network byte order. The conversion logic detects endianness at runtime using `htons(5)`.\n\n#### `void usleep_that_works(u_int64_t usec)`\n\nSleeps for the specified number of microseconds with higher accuracy than standard `usleep()`. Uses real sleep for large intervals (up to 10ms granularity), then busy-waits for remaining time.\n\n> On Win32, this implementation uses `timeBeginPeriod`, `Sleep`, and `QueryPerformanceCounter`.\n\n### Transcript Filename Construction\n\n#### `char *make_transcript_filename(char *buffer, time_t epoch, const char *extension)`\n\nConstructs a filename string based on UTC time components in format:  \n`YYYY-MM-DD-HH-MM-SS.extension`\n\nThe buffer must have sufficient space to hold the resulting string including null terminator.\n\n### Proof Preparation\n\n#### `u_char *prepare_proof(u_char *buffer, size_t bytes, const u_char *secret, u_char *digest)`\n\nPrepares an MD5 hash as proof that both parties know the same shared secret:\n\n1. XORs the secret repeatedly over the input buffer.\n2. Computes the MD5 digest of the modified buffer.\n3. Stores result in `digest`.\n4. Returns pointer to `digest`.\n\nThis is used during authentication phases where secrets are verified without transmitting them directly.\n\n### Line Reading Utilities\n\n#### `int read_line(int fd, char *buffer, size_t buffer_length)`\n\nReads a newline-terminated line from a file descriptor into a buffer. No internal buffering is performed.\n\n#### `int fread_line(FILE *f, char *buffer, size_t buffer_length)`\n\nSame functionality as above but operates on FILE pointers instead of raw file descriptors.\n\nBoth functions return:\n- `0` on successful read.\n- Negative error code if reading fails or exceeds buffer length.\n\n### UDP Error Counter Access\n\n#### `u_int64_t get_udp_in_errors()`\n\nAttempts to retrieve the current UDP Input Error counter from `/proc/net/snmp` on Linux systems. For non-Linux platforms, returns zero.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[Client/Server Core] --> B[Random Data]\n    A --> C[Time Handling]\n    A --> D[MD5 Digest]\n    A --> E[Line Reader]\n\n    B --> F[/dev/urandom or CryptGenRandom]\n    C --> G[gettimeofday()]\n    C --> H[get_usec_since()]\n    C --> I[ntohll(), htonll()]\n\n    D --> J[md5_digest()]\n    D --> K[md5_finish()]\n    D --> L[md5_append()]\n    D --> M[md5_process()]\n\n    E --> N[read_line()]\n    E --> O[fread_line()]\n```\n\n## Integration Points\n\nThese utilities are widely integrated throughout the Tsunami system:\n\n| Module | Usage |\n|--------|-------|\n| `common.c` / `common_win32.c` | Used for basic operations like random data and time measurement |\n| `error.c` | Provides logging infrastructure via `warn()` calls |\n| `md5.c` | Implements core cryptographic hashing logic |\n| `server/main.c`, `client/main.c` | Invoked by main loop for timing-related tasks |\n| `rtclient/command.c`, `rtserver/protocol.c` | Called when processing commands or protocol updates |\n\nThe module ensures consistent behavior across different environments (Unix vs Win32), abstracting away platform-specific quirks while providing high-performance implementations for critical functions such as time tracking and secure randomness generation.","mk5-server-functionality":"# MK5 Server Functionality\n\n# MK5 Server Functionality\n\nThe **MK5 Server Functionality** module implements a Tsunami file transfer server tailored for Mark5 hardware, specifically supporting StreamStor disk I/O via the `xlrapi` library.\n\n## Purpose\n\nThis module provides core functionality for handling client requests in a Tsunami-based file transfer system that operates on Mark5 hardware with StreamStor access. It supports real-time data streaming over UDP using a custom protocol (`TTP`) built upon standard Unix socket APIs. The server listens for TCP connections from clients, negotiates transfers, and sends out blocks of data as requested or retransmitted.\n\nIt is designed to be used alongside other modules such as `tsunami-server`, which defines shared types and utilities like logging functions, authentication routines, and socket creation helpers.\n\n## Key Components\n\n### Configuration Management (`config.c`)\n- Defines default parameters for the server.\n- Provides `reset_server()` function to initialize a `ttp_parameter_t` struct with defaults:\n    - Block size: 32768 bytes\n    - Secret: `\"kitten\"`\n    - TCP port: `TS_TCP_PORT`\n    - UDP buffer size: 20MB\n    - Verbose mode enabled by default\n    - Transcript mode disabled by default\n    - IPv6 support disabled by default\n\n### Disk I/O Routines (`io.c`)\n- Implements `build_datagram()`: Reads a block from an open Mark5 file handle and constructs a TTP datagram containing the block data.\n    - Uses `mk5_fseek()` and `mk5_fread()` internally.\n    - Handles non-contiguous reads efficiently by seeking when necessary.\n\n### Logging Mechanism (`log.c`)\n- Provides `log()` function for timestamped log entries to a specified file descriptor.\n    - Logs time-stamped messages including date/time information.\n\n### Main Execution Loop (`main.c`)\n- Entry point of the server process.\n- Sets up listening socket and forks child processes per connection.\n- Contains `client_handler()` which handles each connected client's session:\n    - Negotiates protocol version and authenticates client.\n    - Accepts new transfer requests.\n    - Manages UDP transmission of data blocks.\n    - Supports retransmission requests (e.g., REQUEST_RETRANSMIT).\n    - Optionally logs transcript data during transfer.\n- Includes signal handler (`reap`) to clean up zombie children.\n\n### Protocol Handling (`protocol.c`)\n- Implements core TTP protocol logic:\n    - `ttp_negotiate()`: Ensures both ends use compatible protocol revisions.\n    - `ttp_authenticate()`: Authenticates client using challenge-response mechanism involving MD5 hashes.\n    - `ttp_open_transfer()`: Processes incoming filename request; opens file via `mk5_fopen64()` and returns metadata.\n    - `ttp_accept_retransmit()`: Handles retransmission requests based on type:\n        - REQUEST_ERROR_RATE: Adjusts inter-packet delay (IPD) dynamically.\n        - REQUEST_RESTART: Resumes transfer at a given block index.\n        - REQUEST_RETRANSMIT: Sends back a specific block upon demand.\n    - `ttp_open_port()`: Creates a UDP socket for sending data blocks.\n\n### Transcript Generation (`transcript.c`)\n- Generates detailed transcripts of transfers in a structured format.\n- Functions include:\n    - `xscript_open()`: Initializes transcript file with header info.\n    - `xscript_data_start()`, `xscript_data_stop()`: Marks start/end times.\n    - `xscript_close()`: Finalizes transcript with summary stats.\n\n### StreamStor API Wrapper (`mk5api.c`)\n- Wraps low-level `xlrapi` functions into standard C library-style I/O operations:\n    - `mk5_fopen64()`: Opens a StreamStor device or file.\n    - `mk5_fclose()`: Closes a StreamStor file handle.\n    - `mk5_fseek()`: Seeks within a StreamStor file.\n    - `mk5_ftello()`: Returns current position in a StreamStor file.\n    - `mk5_fread()`: Reads from a StreamStor file.\n\n## Module Interactions\n\n```mermaid\ngraph TD\n    A[main] --> B[create_tcp_socket]\n    A --> C[fork()]\n    D[client_handler] --> E[ttp_negotiate]\n    D --> F[ttp_authenticate]\n    D --> G[ttp_open_transfer]\n    G --> H[mk5_fopen64]\n    D --> I[ttp_open_port]\n    I --> J[create_udp_socket]\n    D --> K[build_datagram]\n    K --> L[mk5_fread]\n    D --> M[xscript_open]\n    M --> N[xscript_data_log]\n    M --> O[xscript_close]\n```\n\n## Command-Line Interface\n\nThe server supports the following command-line options:\n\n| Option              | Description |\n|---------------------|-------------|\n| `--verbose`         | Enable verbose output. |\n| `--transcript`      | Enable transcript logging mode. |\n| `--v6`              | Use IPv6 instead of IPv4. |\n| `--port=N`          | Listen on TCP port N. |\n| `--secret=S`        | Set shared secret to S. |\n| `--datagram=B`       | Set datagram size to B bytes. |\n| `--buffer=B`         | Set UDP send buffer size to B bytes. |\n\nAdditionally, it accepts a list of filenames that can be retrieved using the special GET request `\"get *\"`.\n\nExample usage:\n```bash\ntsunamid --verbose --transcript --port=8080 --secret=\"my_secret\" --datagram=32768 --buffer=10000000 /path/to/file1 /path/to/file2\n```\n\nThis starts the server listening on port 8080, enabling verbose and transcript modes, setting a custom block size and UDP buffer size, with two files available for download via `get *`.\n\n## Notes\n\n- The module assumes Mark5 hardware is present (`XLRDeviceFind()`).\n- It uses standard Unix socket APIs for communication over TCP and UDP.\n- All data transfers are performed through `sendto()` on a UDP socket.\n- File access is abstracted via `mk5api.c`, which interfaces directly with `xlrapi`.\n- Transcripts are written to disk in `.tsus` format with metadata including timestamps, throughput, and error rates.","other-client":"# Other — client\n\n# Other — Client Module Documentation\n\n## Purpose\n\nThe `client` module implements the core functionality of the Tsunami client application. It provides the command-line interface and orchestration logic for managing network communication, configuration handling, and data transmission tasks within the Tsunami framework.\n\n## Key Components\n\n### Main Entry Point\n- **main.c**: Contains the primary program entry point (`main`) that initializes the client environment, parses command-line arguments, and starts the main execution loop.\n\n### Core Functionality Modules\n- **command.c**: Implements command processing logic including parsing user input and executing corresponding actions.\n- **config.c**: Handles configuration file loading, parsing, and management with support for various configuration options.\n- **io.c**: Manages input/output operations between the client and users or other systems.\n- **network.c**: Provides networking capabilities including connection establishment and maintenance.\n- **protocol.c**: Implements the core protocol handling for message formatting and exchange.\n- **ring.c**: Manages ring buffer structures used in data transmission and storage.\n- **transcript.c**: Handles logging and recording of client activities and communications.\n\n## Build System Integration\n\nThis module is built as part of the `tsunami` binary target through:\n\n```makefile\nbin_PROGRAMS        = tsunami\ntsunami_SOURCES     = command.c config.c io.c main.c network.c protocol.c ring.c transcript.c\n```\n\nIt depends on:\n- The common library (`libtsunami_common.a`)\n- The pthread library for threading support\n\nBuild dependencies are managed via:\n```makefile\ntsunami_LDADD       = $(common_lib) -lpthread\ntsunami_DEPENDENCIES= $(common_lib)\n```\n\n## Architecture Overview\n\nThe client module serves as the central coordination layer for all client-side operations. It integrates with the shared common libraries while maintaining distinct client-specific behavior.\n\n## External Dependencies\n\nThe client module relies entirely on internal components from the `common/` directory and does not introduce any external dependencies beyond standard system libraries.\n\n## Compilation Details\n\nFor standalone compilation, the Makefile defines:\n- Source files including both client modules and common utilities\n- Compiler flags including `-Wall`, `-O3`, and thread support\n- Header include paths for common and include directories\n- Linking against required libraries\n\n## Execution Flow\n\nNo specific execution flows were detected during analysis. The client operates primarily through its main function which handles initialization and argument parsing before entering operational mode.\n\n## Design Considerations\n\n- Modular design to separate concerns (configuration, I/O, network, etc.)\n- Thread-safe implementation using POSIX threads\n- Integration with shared common library functions\n- Support for both IPv4 and IPv6 networking through dedicated modules","other-common":"# Other — common\n\n# Common Module Documentation\n\n## Purpose\n\nThe `common` module provides foundational utilities and shared functionality used throughout the Tsunami software package. It contains essential functions for error handling, cryptographic operations (MD5), and basic system interactions that are commonly needed across different components of the application.\n\n## Key Components\n\n### Files\n- `md5.c`: Implementation of MD5 hash algorithm functions\n- `common.c`: General utility functions and helper routines  \n- `error.c`: Error handling and reporting mechanisms\n\n### Library\nThis module compiles into a static library `libtsunami_common.a` which can be linked with other modules requiring these common functionalities.\n\n## Interface Functions\n\n### From md5.c:\n```c\nvoid tsunami_md5(const unsigned char *input, size_t length, unsigned char *output);\n```\nComputes MD5 hash of input data and stores result in output buffer.\n\n### From common.c:\n```c\nint tsunami_get_system_info(char *buffer, size_t buflen);\nint tsunami_log_message(const char *format, ...);\n```\n\n### From error.c:\n```c\nvoid tsunami_error_report(int error_code, const char *message);\nint tsunami_error_get_last(void);\n```\n\n## Build Configuration\n\n### Makefile.am Settings\n- **Library**: Creates `libtsunami_common.a` static library\n- **Include Path**: Adds `-I$(top_srcdir)/include` for header file access\n- **Sources**: Includes all three source files (`md5.c`, `common.c`, `error.c`)\n- **Endian Handling**: Commented-out flag `AM_CFLAGS = -DARCH_IS_BIG_ENDIAN` for PlayStation3 compatibility\n\n## Architecture Overview\n\nThe common module serves as a foundation layer providing:\n\n1. Cryptographic hashing capabilities through MD5 implementation\n2. System information gathering utilities \n3. Standardized error handling and logging interface\n\nThese functions are designed to be lightweight and portable while offering reliable core functionality that other modules depend upon.\n\n```\n┌─────────────┐\n│   md5.c     │\n├─────────────┤\n│  MD5 Hashing│\n└─────────────┘\n       │\n       ▼\n┌─────────────┐\n│  common.c     │\n├─────────────┤\n│  Utilities    │\n└─────────────┘\n       │\n       ▼\n┌─────────────┐\n│  error.c    │\n├─────────────┤\n│  Error Hndlg │\n└─────────────┘\n```","other-configure-ac":"# Other — configure.ac\n\n# configure.ac\n\nThe `configure.ac` is an Autoconf input file used to generate the `configure` script for the Tsunami software package. This script automates the process of detecting system features, setting compilation options, and generating configuration files necessary for building the project.\n\n## Purpose\n\nThis module ensures that the build environment meets the requirements for compiling Tsunami. It checks for:\n- Required tools like GCC, ranlib\n- Required libraries such as pthread\n- Compilation flags and settings\nIt also sets up variables used in other parts of the build system, including those needed by packaging tools.\n\n## Key Components\n\n### Initialization\n\n```autoconf\nAC_INIT([tsunami], [1.1b43])\necho \"Configuring Tsunami version AC_PACKAGE_VERSION\"\n```\n\nInitializes the Autoconf environment with the package name (`tsunami`) and version (`1.1b43`). The version string is automatically substituted using `AC_PACKAGE_VERSION`.\n\n### Automake Integration\n\n```autoconf\nAM_INIT_AUTOMAKE([foreign])\nAM_CONFIG_HEADER(config.h:config.in)\n```\n\nEnables integration with Automake, which generates Makefiles from `Makefile.am`. Also specifies that `config.h` should be generated from `config.in`.\n\n### Host Detection\n\n```autoconf\nAC_CANONICAL_HOST\n```\n\nDetects the canonical host type for cross-compilation support.\n\n### Compiler Checks\n\n```autoconf\nCFLAGS_save=\"$CFLAGS\"\nAC_PROG_CC\nif test \"$GCC\" != \"yes\"; then\n    AC_MSG_WARN([*** WARNING! *** You are not using the GNU C compiler.])\nfi\nAC_PROG_RANLIB\nCFLAGS=\"$CFLAGS_save\"\nunset CFLAGS_save\n```\n\nEnsures that the GNU C compiler (`gcc`) is being used, issuing warnings otherwise. Saves and restores original `CFLAGS` to avoid overwriting them during tool detection.\n\n### Compilation Flags\n\n```autoconf\nEXTRA_CFLAGS=\"-O3 -D_GNU_SOURCE -D_FILE_OFFSET_BITS=64\"\n```\n\nSets optimization level (`-O3`) and defines required preprocessor macros for proper compilation on POSIX systems.\n\n### Debug Flag Handling\n\n```autoconf\n#AC_ARG_ENABLE([debug], ...)\n#...\nEXTRA_CFLAGS=\"-g -Wall $EXTRA_CFLAGS\"\n```\n\nUncommented code shows how debug flags can be added via command-line option `--enable-debug`, enabling debugging symbols and warnings.\n\n### Library Dependencies\n\n```autoconf\nAC_CHECK_LIB(pthread, main, [HAPPY=1], [HAPPY=0])\nif test \"$HAPPY\" = \"0\"; then\n    AC_MSG_WARN([Could not find the pthread library])\n    AC_MSG_ERROR([Cannot continue])\nfi\n```\n\nVerifies that the `pthread` library is available. If not found, it issues a warning and exits with an error.\n\n### Version Substitution\n\n```autoconf\nversion=AC_PACKAGE_VERSION\nAC_SUBST(version)\n```\n\nExports the current package version as a variable usable in other build scripts or spec files.\n\n## Output Files\n\nThe script generates several output files based on its configuration:\n\n```autoconf\nAC_OUTPUT([\n    Makefile\n    tsunami.spec\n    client/Makefile\n    rtclient/Makefile\n    common/Makefile\n    include/Makefile\n    server/Makefile\n    rtserver/Makefile\n    util/Makefile\n])\n```\n\nThese include:\n- Main `Makefile`\n- Platform-specific `Makefile`s (e.g., `client/Makefile`)\n- Package metadata file `tsunami.spec` for RPM packaging\n\n## Execution Flow\n\nThis module does not have internal execution flows; it serves as input to Autoconf which processes it into a shell script. The flow of operations is linear and deterministic, involving checks and substitutions performed by Autoconf's macro system.\n\n## Diagram\n\nNo diagram needed — this module is purely declarative and procedural, defining what should be checked and generated without complex architectural relationships.","other-docs":"# Other — docs\n\n# tsunam_udp 文档体系模块\n\n该模块负责管理 `tsunami-udp` 项目的文档基础设施，包括目录结构、编写规范以及构建工具配置。它为项目提供统一的文档组织方式，并确保所有文档内容符合开发团队的标准。\n\n## 目录结构\n\n```text\ndocs/\n├── tutorials/          # 入门教程和使用指导\n├── how-to-guides/      # 实用操作指南\n├── reference/        # API接口说明\n├── explanation/        # 技术概念阐述\n└── assets/             # 图表及静态资源文件\n```\n\n## 核心功能\n\n### 文档构建脚本\n`docs/build.sh` 是一个 Bash 脚本，用于自动化文档构建流程：\n\n```bash\n#!/bin/bash\n# 文档构建脚本\npip install mkdocs\nmkdocs build\n```\n\n此脚本通过 pip 安装 MkDocs 并运行构建命令来生成最终的 HTML 文档站点。\n\n### 文档标准\n\n1. **可执行性**：所有代码示例必须能够直接运行并验证其正确性。\n2. **完整性**：每个文档应是独立且完整的，不依赖外部上下文。\n3. **语言风格**：采用主动语态和现在时态以提高清晰度。\n4. **版本一致性**：文档版本需与源码发布的版本保持同步更新。\n\n### 架构支持工具\n\n| 工具名称     | 功能描述                   |\n|--------------|----------------------------|\n| MkDocs       | 主要文档生成框架           |\n| Doxygen      | C++/C 风格的 API 文档生成器 |\n| PlantUML     | 系统架构图绘制工具         |\n\n这些工具协同工作，共同维护整个文档系统的质量与一致性。\n\n## 使用方法\n\n开发者可通过以下步骤快速开始阅读或贡献文档：\n1. 查看 `tutorials/quickstart.md` 开始学习基础使用；\n2. 在本地环境中安装所需工具链（如 MkDocs）；\n3. 运行 `build.sh` 来预览当前文档状态；\n4. 提交修改至相应子目录下的 Markdown 文件中。\n\n## 示例调用关系\n\n```mermaid\ngraph TD\n    A[用户] --> B[Markdown]\n    B --> C[MkDocs]\n    C --> D[HTML输出]\n    subgraph 工具链\n        C\n        D\n    end\n```","other-include":"# Other — include\n\n# Tsunami Protocol Header Files\n\n## Purpose\n\nThe **Other — include** module defines global headers used by both client and server applications in the Tsunami file transfer protocol suite. These files contain shared constants, data structures, function prototypes, and type definitions that are essential across different parts of the system.\n\n## Key Components\n\n### `md5.h`\nProvides MD5 message digest functionality for cryptographic operations within the Tsunami protocol.\n\n#### Functions:\n- `md5_digest`: Computes MD5 hash of buffer data.\n- `md5_fprint_digest`: Prints digest to a file.\n- `md5_sprint_digest`: Converts digest to string format.\n\n#### Types:\n```c\ntypedef struct md5_state_s {\n    md5_word_t count[2];\n    md5_word_t abcd[4];\n    md5_byte_t buf[64];\n} md5_state_t;\n```\n\n### `tsunami-client.h`\nDefines client-side global constants, data structures, and function prototypes for the Tsunami client application.\n\n#### Constants:\n- Default values for block size, table size, server name, ports, etc.\n- Output modes (`SCREEN_MODE`, `LINE_MODE`)\n- Maximum limits for commands, buffers, blocks\n\n#### Data Structures:\n- `command_t`: Parsed command with text words\n- `statistics_t`: Transfer statistics including rates and counts\n- `retransmit_t`: Retransmission state management\n- `ring_buffer_t`: Queuing mechanism for disk writes\n- `ttp_parameter_t`: Client transfer parameters\n- `ttp_transfer_t`: Current transfer state\n- `ttp_session_t`: Overall session state\n\n#### Function Prototypes:\n- Command handling functions (`command_close`, `command_connect`, `command_get`, etc.)\n- Configuration reset (`reset_client`)\n- I/O operations (`accept_block`)\n- Network socket creation (`create_tcp_socket`, `create_udp_socket`)\n- Protocol negotiation (`ttp_authenticate`, `ttp_negotiate`)\n\n### `tsunami-server.h`\nDefines server-side global constants, data structures, and function prototypes for the Tsunami server application.\n\n#### Constants:\n- Default TCP port, UDP buffer sizes, heartbeat timeouts\n- File naming and storage limits\n\n#### Data Structures:\n- `ttp_parameter_t`: Server transfer parameters\n- `ttp_transfer_t`: Transfer state information\n- `ttp_session_t`: Session-wide state tracking\n\n#### Function Prototypes:\n- Configuration reset (`reset_server`)\n- Datagram building (`build_datagram`)\n- VSIB control functions (`start_vsib`, `stop_vsib`, `read_vsib_block`)\n- Network socket creation (`create_tcp_socket`, `create_udp_socket`)\n- Protocol functions (`ttp_accept_retransmit`, `ttp_authenticate`, `ttp_negotiate`)\n\n### `tsunami-cvs-buildnr.h`\nContains version/build number information that is embedded in the software during compilation.\n\n#### Macro:\n- `TSUNAMI_CVS_BUILDNR`: String identifier for current build version\n\n### `tsunami.h`\nThe primary header file containing core definitions shared by both client and server components.\n\n#### Macros:\n- `warn(message)`: Error reporting macro\n- `error(message)`: Fatal error reporting macro\n- `min(a,b)` / `max(a,b)`: Utility comparison macros\n- `tv_diff_usec(newer,older)`: Time difference calculation\n\n#### Constants:\n- Protocol revision numbers\n- Request types (`REQUEST_RETRANSMIT`, `REQUEST_RESTART`, etc.)\n- Block type identifiers (`TS_BLOCK_ORIGINAL`, `TS_BLOCK_TERMINATE`, `TS_BLOCK_RETRANSMISSION`)\n- Port defaults (`TS_TCP_PORT`, `TS_UDP_PORT`)\n\n#### Types:\n```c\ntypedef struct {\n    u_int16_t           request_type;\n    u_int32_t           block;\n    u_int32_t           error_rate;\n} retransmission_t;\n```\n\n## Architecture Overview\n\nThis module serves as a foundational layer providing:\n\n1. **Cryptographic support** through MD5 hashing (in `md5.h`)\n2. **Protocol constants and types** (in `tsunami.h`)\n3. **Client-specific interfaces** (in `tsunami-client.h`)\n4. **Server-specific interfaces** (in `tsunami-server.h`)\n5. **Version identification** (in `tsunami-cvs-buildnr.h`)\n\n## External Dependencies\n\nThese headers depend on standard system libraries including:\n- `<sys/types.h>`\n- `<stdio.h>`\n- `<string.h>`\n- `<netinet/in.h>`\n- `<sys/time.h>`\n\nThey also include other headers from this same module to provide complete interface definitions.\n\n## Usage Patterns\n\nAll applications within the Tsunami suite must include these headers to access protocol constants, data structures, and function declarations. The pattern of inclusion ensures consistent behavior across different implementations while maintaining modularity between client and server code paths.\n\nFor example, when implementing network operations or protocol handling, developers reference these headers to obtain proper data structure layouts and function signatures needed for interoperability with other parts of the system.","other-makefile":"# Other — Makefile\n\n# Other — Makefile\n\nThis module provides a Makefile containing build automation rules for documentation preview functionality.\n\n## Purpose\n\nThe primary purpose of this Makefile is to enable developers to quickly start a local documentation server for previewing changes during development. It specifically targets the `mkdocs` documentation system used in this project.\n\n## Key Components\n\n### `docs-preview` target\n\n```makefile\ndocs-preview:\n\tcd docs && mkdocs serve\n```\n\nThis rule performs two main operations:\n1. Changes directory to `docs/`\n2. Executes `mkdocs serve` command to start the documentation preview server\n\n## Functionality\n\nWhen executed, this makefile target will:\n- Navigate into the `docs` directory\n- Launch MkDocs' built-in development server\n- Serve documentation on localhost (default port 8000)\n- Enable live reloading for faster development workflow\n\n## Usage\n\nTo use this functionality:\n\n```bash\nmake docs-preview\n```\n\nThis will start the documentation server at http://localhost:8000 where developers can view their documentation changes in real-time.\n\n## Integration\n\nThis Makefile integrates with the broader project by providing an easy way to access documentation previews without requiring explicit knowledge of the underlying MkDocs configuration or commands. It serves as a bridge between the standard development workflow and documentation building tools.\n\n## Dependencies\n\nRequires:\n- MkDocs installed in the environment (`pip install mkdocs`)\n- A valid `mkdocs.yml` configuration file in the `docs/` directory\n- The `docs/` directory exists and contains documentation files\n\n## Architecture Notes\n\nNo complex internal dependencies exist within this makefile itself. The execution flow is straightforward:\n```mermaid\ngraph TD\n    A[Make invocation] --> B[Change to docs directory]\n    B --> C[Execute mkdocs serve]\n    C --> D[Documentation server running]\n```\n\nThis simple dependency graph reflects that this makefile acts as a thin wrapper around existing documentation tooling rather than implementing complex logic.","other-mk5server":"# Other — mk5server\n\n# Mk5 Server Module Documentation\n\n## Purpose\n\nThe **mk5server** module implements a file transfer server specifically designed for handling data transfers from Mark5 disk systems using StreamStor hardware APIs. It provides an interface between client applications and physical storage devices by managing TCP and UDP sockets for communication, supporting both IPv4 and IPv6 protocols.\n\nThis module is part of the Tsunami software package used in radio astronomy data acquisition systems.\n\n## Key Components\n\n### 1. Network Management (`network.c`)\n- `create_tcp_socket()`: Creates and configures a TCP socket for incoming connections.\n- `create_udp_socket()`: Sets up a UDP socket for data transmission with configurable buffer size.\n\nBoth functions support dual-stack networking via IPv6 or IPv4 depending on configuration flags.\n\n### 2. File Access API (`mk5api.c`, `mk5api.h`)\nProvides high-level file operations that wrap around StreamStor API functions:\n- `mk5_fopen64()`: Opens a file handle for reading/writing.\n- `mk5_fclose()`: Closes an open file handle.\n- `mk5_fseek()`: Seeks within a file.\n- `mk5_ftello()`: Reports current position in a file.\n- `mk5_fread()`: Reads data into memory buffers.\n\nThese functions are implemented as wrappers over standard StreamStor API calls like `XLROpen`, `XLRRead`, etc., which interact directly with the underlying hardware.\n\n### 3. Timestamp Utilities (`tstamp.c`)\nHandles conversion between UTC timestamps and ASCII representations:\n- `getDuration()`: Parses duration strings into double values.\n- `getDateTime()`: Converts date-time string formats into Unix seconds.\n- `formatTimestamp()` / `getUTC()` / `toTimestamp()`: Utility functions for formatting time-related data.\n\nUsed primarily for logging purposes but can be extended for other time-sensitive tasks.\n\n### 4. Configuration & Main Loop (`config.c`, `main.c`)\n- Handles command-line argument parsing and initialization parameters.\n- Initializes network services and starts listening loops.\n- Manages global state variables such as port numbers and IP version settings.\n\n### 5. Protocol Handling (`protocol.c`)\nImplements protocol-specific logic including:\n- Parsing commands received through TCP.\n- Routing requests to appropriate backend handlers (e.g., file access).\n\n### 6. Logging (`log.c`)\nManages log output generation:\n- Logs events related to connection establishment, read/write operations, errors, etc.\n- Uses timestamp utilities defined above.\n\n### 7. Transcript Support (`transcript.c`)\nSupports transcript-based logging functionality:\n- Records detailed session transcripts for debugging and analysis.\n\n## Compilation Notes\n\nThe mk5server requires compilation using **g++** instead of gcc due to dependencies on libssapi.a from the StreamStor library, which was built with g++ v3.x.\n\nTo compile:\n\n```bash\n./configure\ncd common\n# Edit Makefile: change \"CC = gcc\" to \"CC = g++\"\nmake\ncd ../mk5server\n# Edit Makefile: change \"CC = gcc\" to \"CC = g++\"\nmake\n```\n\nAlternatively, you may link manually during quick checks:\n```bash\ng++ mk5api.c ../common/libtsunami_common.a -lm ../common/libssapi.a -lpthread\n```\n\n> Note: The automake configuration does not support setting `mk5tsunamid_CC = g++` directly; manual edits to generated Makefiles are required.\n\n## Integration Points\n\n### External Dependencies\n- **StreamStor Library**: Requires `libssapi.a` compiled with g++\n- **Tsunami Common Module**: Depends on shared libraries located at `../common/`\n- **Standard C Libraries**: Includes POSIX socket APIs (`sys/socket.h`, `netdb.h`, etc.)\n\n### Internal Calls\n- `create_tcp_socket()` → calls `warn()` from `include/tsunami.h`\n- `create_udp_socket()` → also calls `warn()` from `include/tsunami.h`\n- `getUTC()` → uses `gettimeofday()` from `common/common_win32.c`\n- `formatTimestamp()` → used by both `getUTC()` and `toTimestamp()`\n\n### API Entry Points\n- Clients connect via TCP or UDP sockets.\n- File I/O is handled through functions declared in `mk5api.h`.\n- These include wrappers around core StreamStor APIs like:\n    - `XLROpen`\n    - `XLRRead`\n    - `XLRClose`\n    - `XLRSetMode`\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[Client] --> B[TCP/UDP Socket]\n    B --> C[mk5server Main Loop]\n    C --> D[Protocol Handler]\n    D --> E[File Access Layer (mk5api)]\n    E --> F[StreamStor API]\n    F --> G[HDD / Storage Device]\n```\n\nThis diagram illustrates how client requests flow into the server, processed through a protocol layer before being dispatched to hardware-specific operations.","other-mkdocs-yml":"# Other — mkdocs.yml\n\n# MkDocs Configuration Module\n\nThis module defines the `mkdocs.yml` configuration file that controls the documentation site generation process for the tsunami-udp project using MkDocs.\n\n## Purpose\n\nThe primary purpose of this configuration is to define the structure, appearance, and behavior of the documentation website. It serves as the central configuration point for:\n\n- Site metadata and branding\n- Theme selection and customization\n- Plugin integration for enhanced functionality\n- Markdown extension settings\n- Navigation hierarchy\n\n## Key Components\n\n### Site Metadata\n```yaml\nsite_name: tsunami-udp\nrepo_url: https://github.com/your-repo/tsunami-udp\n```\nSets the display name of the documentation site and links to the source repository.\n\n### Theme Configuration\n```yaml\ntheme:\n  name: material\n  features:\n    - navigation.tabs\n```\nUses the Material theme with tab-based navigation support, providing a modern and responsive UI experience.\n\n### Plugins\n```yaml\nplugins:\n  - search\n  - markdownextradata\n```\nEnables:\n- Built-in search functionality for easy content discovery\n- Markdown extra data plugin for injecting variables into markdown files\n\n### Markdown Extensions\n```yaml\nmarkdown_extensions:\n  - admonition\n  - toc:\n      permalink: true\n  - pymdownx.superfences\n```\nConfigures extensions that enhance markdown rendering:\n- Admonitions for note/warning callouts\n- Table of contents with permalinks\n- Super fences for better code block handling\n\n### Extra Variables\n```yaml\nextra:\n  version: 1.0.0\n```\nDefines additional metadata available throughout the documentation.\n\n### Navigation Structure\n```yaml\nnav:\n  - 首页: index.md\n  - 教程:\n    - 快速开始: tutorials/quickstart.md\n  - API参考: reference/index.md\n  - 概念解析:\n    - 架构设计: explanation/architecture.md\n  - 开发指南:\n    - 贡献规范: CONTRIBUTING.md\n```\n\n## Architecture Overview\n\nThe mkdocs.yml configuration establishes a hierarchical navigation system that organizes documentation content logically:\n\n```mermaid\ngraph TD\n  A[Documentation Root] --> B[首页]\n  A --> C[教程]\n  A --> D[API参考]\n  A --> E[概念解析]\n  A --> F[开发指南]\n  \n  C --> C1[快速开始]\n  D --> D1[API文档]\n  E --> E1[架构设计]\n  F --> F1[贡献规范]\n```\n\nThis structure provides clear pathways for different user types:\n- New users start at \"首页\" and \"教程\"\n- Developers reference \"API参考\"\n- Technical readers explore \"概念解析\"\n- Contributors follow \"开发指南\"\n\n## Integration Points\n\nThis configuration file is processed by MkDocs during the build process and integrates with other project components through:\n\n1. **Markdown Files**: The navigation references actual markdown documents in the project\n2. **Theme System**: Material theme components are used across all pages\n3. **Plugin System**: Search and data injection plugins work across the entire site\n4. **Version Management**: The extra.version variable can be referenced in templates\n\n## Configuration Best Practices\n\n### Consistent Naming\nAll paths use consistent naming conventions (e.g., `tutorials/`, `reference/`) to maintain clarity.\n\n### Logical Organization\nNavigation follows a logical progression from general information to specific technical details, supporting progressive disclosure of knowledge.\n\n### Extensibility\nThe modular approach allows adding new sections without disrupting existing navigation structures.\n\n## Usage Notes\n\nThis configuration file should remain in the root directory of the documentation source tree. Changes to this file require rebuilding the documentation site using MkDocs commands such as:\n\n```bash\nmkdocs serve\n# or\nmkdocs build\n```\n\nThe configuration does not define any internal execution flows since it's purely declarative — no runtime logic exists within this file itself.","other-readme-md":"# Other — README.md\n\n# tsunami-udp Module Documentation\n\n## Purpose\n\nThe `tsunami-udp` module represents a UDP-based network communication system originally cloned from http://tsunami-udp.sourceforge.net/. It provides both server and client implementations for establishing UDP connections and performing file operations over a network.\n\n## Overview\n\nThis is a simple network protocol implementation that allows clients to connect to a server and perform basic file operations using UDP as the transport layer. The system supports operations such as getting files, listing directories, setting configuration parameters, and managing connections.\n\n## Key Components\n\n### Server Implementation\n- **Location**: `./server/tsunamid`\n- **Functionality**: Provides UDP server capabilities for handling client requests\n- **Usage**: `./server/tsunamid [options]`\n\n### Client Implementation\n- **Location**: `./client/tsunami`\n- **Functionality**: Implements client-side command interface for interacting with the server\n- **Commands Supported**:\n  - `close` - Close connection\n  - `connect` - Establish connection to server\n  - `get` - Retrieve file from server\n  - `dir` - List directory contents on server\n  - `help` - Display available commands\n  - `quit` - Terminate client session\n  - `set` - Configure client settings\n\n## Architecture\n\n```\n┌─────────────┐    ┌──────────────┐\n│   Client      │    │    Server      │\n│  (client)     │    │   (server)    │\n└─────────────┘    └──────────────┘\n       │                 │\n       ├─connect→        │\n       │                 │\n       ├─get→            │\n       │                 │\n       ├─dir→            │\n       │                 │\n       ├─set→            │\n       │                 │\n       └←response─        │\n```\n\n## Usage Examples\n\n### Basic Setup\n```bash\n# Compile the entire project\n./recompile.sh\n\n# Start server\n./server/tsunamid *\n\n# Run client in interactive mode\n./client/tsunami\n```\n\n### Command Line Operations\n```bash\n# Connect to server and retrieve a file\n./client/tsunami connect your.server.add set udpport 51031 get path/to/yourfile quit\n\n# Get help information\n./server/tsunamid --help\n./client/tsunami help\n```\n\n## Configuration\n\nThe client accepts various configuration options through the `set` command. The primary configurable parameter is the UDP port (`udpport`) which can be specified during connection setup.\n\n## Execution Flow\n\nNo execution flows were detected for this module. This documentation serves as an overview of the module's purpose and structure rather than detailed code analysis.\n\n## Build Process\n\nThe build process relies on the provided `recompile.sh` script which handles compilation of both server and client components.\n\n## Limitations\n\nBased on the TODO section, one limitation is that the system lacks \"Interactive difference\" functionality, suggesting it doesn't provide real-time or interactive comparison features between different versions or states of files.","other-readme-sxw":"# Other — README.sxw\n\n# README.sxw Module Documentation\n\n## Overview\n\nThe `README.sxw` file is an OpenDocument Writer file (`.sxw`) that contains metadata and content related to a document in the OpenOffice.org format. This module represents the internal structure of such a file as part of a larger system or tooling process, likely used for processing or analyzing `.sxw` documents.\n\nThis file is structured like a ZIP archive containing multiple XML-based files:\n- `mimetype`\n- `content.xml`\n- `styles.xml`\n- `meta.xml`\n- `settings.xml`\n- `META-INF/manifest.xml`\n\nIt does not contain executable logic but rather serves as a data container with specific formatting requirements typical of OpenDocument formats.\n\n## Purpose\n\nThis module acts as a representation or abstraction of an OpenDocument Writer file (`*.sxw`). It may be used by tools that need to parse, validate, or manipulate `.sxw` documents without direct access to the full file system or complex libraries.\n\nIts main role is to encapsulate the structure and contents of a `.sxw` file so that downstream systems can treat it as a unit for operations like:\n\n- Metadata extraction\n- Content analysis\n- File validation\n- Document conversion or transformation\n\n## Structure\n\n### ZIP Archive Format\n\nThe file follows the standard ZIP archive layout where each entry consists of:\n\n1. **Local File Header**\n2. **File Data**\n3. **Data Descriptor** *(optional)*\n\nEach file inside the archive has a header indicating its size, compression method, and other attributes.\n\n### Key Files Inside the Archive\n\n#### mimetype\n- Contains the MIME type string: `application/vnd.sun.xml.writer`.\n- Used to identify the file format.\n- Stored uncompressed at the beginning of the archive.\n\n#### content.xml\n- Main document content stored in XML format.\n- Includes text paragraphs, tables, images, etc., depending on the actual document.\n\n#### styles.xml\n- Defines styling information applied to elements within the document.\n- Stores font definitions, paragraph styles, character styles, etc.\n\n#### meta.xml\n- Holds metadata about the document including:\n  - Generator version\n  - Creation date\n  - Print date\n  - Editing cycles and duration\n  - User-defined properties\n\nExample snippet from `meta.xml`:\n```xml\n<meta:generator>OpenOffice.org 1.1.3 (Linux)<\/meta:generator>\n<meta:creation-date>2006-05-12T10:17:41<\/meta:creation-date>\n<dc:date>2006-05-12T11:08:58<\/dc:date>\n<meta:user-defined meta:name=\"Info 1\"/>\n```\n\n#### settings.xml\n- Configuration settings related to the document's view or editing behavior.\n- May include things like default fonts, page setup options, etc.\n\n#### META-INF/manifest.xml\n- Describes the internal structure of the document.\n- Lists all files included in the package along with their paths and types.\n\n## Usage Context\n\nWhile this module itself doesn't perform any actions directly, it represents a key part of how `.sxw` documents are handled in environments where they might be processed programmatically — such as:\n\n- A document parser or converter tool\n- An application that needs to inspect or extract data from OpenDocument files\n- A testing framework simulating real-world `.sxw` inputs\n\nThis representation allows developers to simulate or validate against known structures when working with `.sxw` formats without needing full libraries or external dependencies.\n\n## Mermaid Diagram\n\nIf needed to illustrate the conceptual architecture of an SXW file container:\n\n```mermaid\ngraph TD\n    A[README.sxw] --> B[mimetype]\n    A --> C[content.xml]\n    A --> D[styles.xml]\n    A --> E[meta.xml]\n    A --> F[settings.xml]\n    A --> G[META-INF/manifest.xml]\n\n    style A fill:#f9f,stroke:#333\n    style B fill:#fff,stroke:#333\n    style C fill:#fff,stroke:#333\n    style D fill:#fff,stroke:#333\n    style E fill:#fff,stroke:#333\n    style F fill:#fff,stroke:#333\n    style G fill:#fff,stroke:#333\n```\n\n## Notes on Execution Flow\n\nNo execution flows were detected for this module. It is purely static content representing a ZIP-based document format rather than containing logic or being invoked by other modules during runtime.\n\n## Related Modules\n\nThis module does not depend on or interact with other code modules directly. However, it may be used in conjunction with:\n\n- Document readers/writers handling ODF formats\n- File validation utilities checking ZIP integrity\n- Metadata extraction tools targeting XML components within `*.sxw` files\n\nThese would typically operate on top of or alongside this abstraction to process actual `.sxw` files.","other-readme-txt":"# Other — README.txt\n\n# Tsunami Protocol README Module\n\nThis document describes the **README.txt** module which contains the original documentation for the Tsunami protocol suite. It outlines the core functionality, communication flow, authentication mechanism, and other implementation details relevant to developers working with or contributing to the Tsunami system.\n\n## Purpose\n\nThe `README.txt` serves as an introductory guide to the Tsunami protocol, providing high-level architectural overview and operational instructions. While not comprehensive, it offers essential context about:\n\n- How the protocol functions at a conceptual level\n- Basic installation and compilation steps\n- Communication patterns between client and server\n- Authentication mechanisms used by the system\n\nIt is intended primarily for users who want to understand what they're installing before proceeding with actual setup and configuration.\n\n## Overview of Operation\n\nTsunami implements a TCP-based file transfer protocol where clients connect to servers over TCP, authenticate using shared secrets, then initiate UDP-based data transfers. The protocol supports retransmission requests during transmission to handle errors gracefully.\n\n### Core Components\n\n1. **Client (`tsunami`)** - Initiates connection and handles file reception.\n2. **Server (`tsunamid`)** - Listens for connections and manages file sending.\n3. **Utilities (`readtest`, `writetest`)** - Benchmark disk subsystem performance.\n\n## Communication Flow\n\nA basic Tsunami conversation proceeds through these stages:\n\n```mermaid\ngraph TD\n    A[Client Connects] --> B[Exchange Revision Numbers]\n    B --> C[Authenticate Using Secret]\n    C --> D[Send File Name]\n    D --> E[Verify File Access]\n    E --> F[Exchanged Parameters]\n    F --> G[Client Sends UDP Port]\n    G --> H[Transmission Loop Begins]\n```\n\n### Transmission Loops\n\n#### Server Loop:\nWhile the entire file hasn't been sent yet:\n- Check if client has made a request via TCP pipe\n- Service that request if present\n- Otherwise send next block in file\n- Delay for next packet\n\n#### Client Loop:\nWhile the entire file hasn't been received yet:\n- Try to receive another block\n- If last block, break and notify server\n- Else every 50th iteration:\n  - Update statistics\n  - Notify server of error rate\n  - Transmit queue of retransmission requests\n- Save block\n- Handle out-of-order blocks:\n  - Add intervening blocks to retransmission queue (if later)\n  - Remove from queue (if earlier)\n\n## Retransmission Queue\n\nThe retransmission queue is implemented as a sparse array tracking requested block numbers.\n\nKey behaviors:\n- Doubles in size when full\n- Tracks lowest/highest indices used\n- Rehomes data periodically to base of array\n- For large queues (> threshold), restarts instead of individual requests\n\nThis design allows efficient handling of missing or duplicate blocks without excessive overhead.\n\n## Authentication Mechanism\n\nAuthentication uses a challenge-response model based on MD5 hashing:\n\n1. Server generates 512 bits random data from `/dev/random`\n2. Client XORs copies of shared secret over this random data\n3. Client computes MD5 hash of result buffer\n4. Server performs same operation and compares hashes\n5. Connection accepted only if hashes match\n\nCurrently hardcoded password: `\"kitten\"`  \nCan be overridden with `--secret` option.\n\n## Implementation Notes\n\n### Endianness\nAll components are endian-independent except for the MD5 implementation code.\n\n### Large Files\nSupport for 64-bit file sizes using `fopen64()` / `fseeko64()` API.\n\n### Platform Dependencies\n- Uses `/dev/random` for secure randomness\n- Depends on fixed-size types like `u_int32_t` (Linux) vs `uint32_t` (Solaris)\n- Requires `gcc` due to use of GNU \"long long\" datatype for 64-bit operations\n- Lacks support for systems without `getopt_long()` (e.g., Solaris)\n\n### Known Limitations\n- Disk-to-disk transfers on same box are unreliable due to scheduling daemon behavior\n- Online help limited; use 'help' command for client assistance\n- Usage info limited on server side; run with '--help' flag for options\n\n## Integration Points\n\nThis module does not directly call into other modules but provides foundational documentation that guides developers through integration points such as:\n\n- TCP port binding (`46224`)\n- UDP port negotiation during transmission\n- Shared secret configuration via CLI arguments\n- File access verification routines\n\nIt also indirectly informs about protocol parameters defined elsewhere (in `tsunami.h`) which control version compatibility checks and tuning algorithms.\n\n## Future Considerations\n\nSeveral aspects of Tsunami remain under active development:\n- Error rate response tuning logic\n- Potential changes to authentication method in future releases\n\nThese areas may evolve significantly between versions, so developers should monitor updates carefully.\n\n## References\n\nFor detailed usage instructions, see:\n- COMPILING.txt\n- USAGE.txt\n\nFor technical questions, subscribe to the Tsunami LISTSERV at:\nhttp://listserv.indiana.edu/archives/tsunami-l.html","other-recompile-sh":"# Other — recompile.sh\n\n# recompile.sh\n\nA shell script used to rebuild the project from source using GNU Autotools.\n\n## Purpose\n\nThis script serves as an automated cleanup and rebuild utility for projects that use the GNU Autotools build system. It removes existing build artifacts and regenerates configuration files before performing a fresh compilation.\n\n## Key Components\n\n### Cleanup Phase\n```sh\nrm -f configure\nrm -f Makefile\nrm -f Makefile.in\nrm -f */Makefile\nrm -f */Makefile.in\nrm -rf */.deps\nrm -rf autom4te.cache\n```\n\nRemoves generated and cached build files to ensure a clean rebuild environment.\n\n### Regeneration Phase\n```sh\nautoreconf -i -f -s\n```\n\nRuns `autoreconf` with options:\n- `-i`: Install missing auxiliary files\n- `-f`: Force regeneration even if files exist\n- `-s`: Suppress warnings about missing auxiliary files\n\n### Build Phase\n```sh\n./configure\nmake clean\nmake -j8\n```\n\nExecutes the standard three-step build process:\n1. Configure: Generates platform-specific Makefiles\n2. Clean: Removes previous build outputs\n3. Make: Compiles with 8 parallel jobs\n\n## Usage\n\nRun the script directly in the root directory of the project:\n\n```bash\n./recompile.sh\n```\n\nAfter successful execution, run:\n```bash\nsudo make install\n```\nto install binaries into `/usr/bin`.\n\n## Notes\n\nThe script is designed for projects using autotools but does not execute all possible autotools steps (`aclocal`, `autoheader`, `automake`, `autoconf`) which are commented out. These may be needed depending on the complexity of the build setup.\n\nFor Solaris builds, specific flags can be uncommented in the configure line to handle type definitions and library dependencies.\n\n## Diagram\n\n```mermaid\ngraph TD\n    A[Start] --> B[Cleanup]\n    B --> C[Regenerate]\n    C --> D[Configure]\n    D --> E[Clean]\n    E --> F[Build]\n    F --> G[End]\n```","other-rtclient":"# Other — rtclient\n\n# rtclient Module Documentation\n\n## Purpose\n\nThe `rtclient` module is a real-time Tsunami UDP client implementation used for transferring files over a network using the Tsunami protocol. It provides a command-line interface (CLI) with support for connecting to servers, retrieving remote files, listing shared files, setting parameters, and managing sessions.\n\n## Key Components\n\n### Main CLI Commands\n\n#### `close`\nCloses an active connection to a Tsunami server.\n\n#### `connect`\nEstablishes a TCP connection to a Tsunami server, performs authentication, and initializes session state.\n\n#### `dir`\nRequests and displays a list of available files on the remote Tsunami server.\n\n#### `get`\nInitiates retrieval of one or more files from the remote server. Supports both single-file and multi-file (`GET *`) operations.\n\n#### `help`\nProvides usage information for commands.\n\n#### `quit`\nTerminates any open connection and exits the client.\n\n#### `set`\nModifies default parameter values or reports current settings.\n\n### Core Functions\n\n- `command_close()` – Closes a Tsunami control session.\n- `command_connect()` – Opens a new Tsunami control session.\n- `command_dir()` – Lists remote files.\n- `command_get()` – Initiates file transfer(s).\n- `command_help()` – Displays help text for commands.\n- `command_quit()` – Exits the client.\n- `command_set()` – Manages configuration parameters.\n\n### Threading Support\n\n- `disk_thread()` – A dedicated thread that handles writing received data blocks to disk.\n- Uses POSIX threads (`pthread_create`, `pthread_join`) for asynchronous I/O processing.\n\n### Utility Functions\n\n- `got_block()` – Checks whether a specific block has already been received in a session.\n- `parse_fraction()` – Parses fraction strings like `\"nnn/ddd\"` into numerator/denominator pairs.\n\n## Execution Flow Overview\n\nThis section describes how core functionality flows through the system:\n\n```mermaid\ngraph TD\n    A[main] --> B{command}\n    B -->|get| C[command_get]\n    C --> D[ttp_open_transfer]\n    D --> E[ttp_open_port]\n    E --> F[ring_create]\n    F --> G[disk_thread]\n    G --> H[recvfrom]\n    H --> I[ring_reserve]\n    I --> J[ring_confirm]\n    J --> K[accept_block]\n    K --> L[ring_pop]\n    L --> M[ttp_repeat_retransmit]\n```\n\nIn this diagram:\n- The main loop processes user input via `main()`.\n- When a `get` command is issued, it calls `command_get()`.\n- File transfer setup includes negotiation (`ttp_open_transfer`) and port creation (`ttp_open_port`).\n- Data reception uses a ring buffer (`ring_create`) managed by `disk_thread`.\n- Received datagrams are processed using `recvfrom`, which copies them into the ring buffer.\n- Final writes happen asynchronously in `disk_thread`.\n\n## Detailed Function Descriptions\n\n### `command_get(command_t *, ttp_session_t *)`\n\nHandles file retrieval requests including support for multiple files (`GET *`). It performs the following steps:\n\n1. Validates command syntax and session state.\n2. Initializes transfer metadata (remote/local filenames).\n3. Negotiates with server to start transfer (`ttp_open_transfer`).\n4. Sets up UDP socket for data transmission (`ttp_open_port`).\n5. Allocates memory structures: retransmission table, bitfield tracking, ring buffer.\n6. Starts background disk write thread (`pthread_create`).\n7. Enters receive loop where packets arrive over UDP:\n   - Packet type and block index extracted from payload.\n   - Statistics updated based on packet type.\n   - Duplicate detection handled via `got_block`.\n   - New or missing blocks inserted into ring buffer.\n8. Retransmissions triggered when gaps detected.\n9. Transfer ends upon receiving termination block.\n10. Finalizes statistics and flushes remaining data before closing connection.\n\n#### Return Values\n\n- Returns 0 on successful completion of all requested transfers.\n- Returns -1 if any error occurs during transfer process.\n\n---\n\n### `command_connect(command_t *, ttp_parameter_t *)`\n\nEstablishes a new Tsunami control session over TCP.\n\nSteps include:\n1. Parsing host/port arguments from command line.\n2. Creating a TCP socket using `create_tcp_socket`.\n3. Converting socket descriptor to stream (`fdopen`).\n4. Performing protocol negotiation (`ttp_negotiate`).\n5. Authenticating against server using shared secret (`ttp_authenticate`).\n\n#### Return Value\n\n- On success returns pointer to initialized `ttp_session_t`.\n- On failure returns NULL.\n\n---\n\n### `command_dir(command_t *, ttp_session_t *)`\n\nRequests directory listing from remote Tsunami server.\n\n1. Ensures valid session exists.\n2. Sends request (`TS_DIRLIST_HACK_CMD`).\n3. Reads number of files returned.\n4. Loops through each file name and size printing results.\n5. Writes final null byte back to server as acknowledgment.\n\n#### Return Value\n\n- Returns 0 on success.\n- Non-zero value indicates an error occurred.\n\n---\n\n### `disk_thread(void *)`\n\nDedicated thread responsible for writing received data blocks to disk.\n\nThis function operates until it receives a special block with index zero indicating shutdown.\n\nIt uses:\n- `ring_peek()` – Retrieves next available block.\n- `accept_block()` – Writes block contents to local file.\n- `ring_pop()` – Removes processed block from ring.\n\nThe thread exits cleanly after popping the stop marker.\n\n---\n\n## Configuration Parameters\n\n| Parameter              | Description                                  |\n|--------------------------|----------------------------------------------|\n| `server_name`          | Hostname/IP address of Tsunami server       |\n| `server_port`          | Port number used by Tsunami server         |\n| `client_port`          | Local port used for UDP communication     |\n| `block_size`           | Size in bytes of each data block            |\n| `udp_buffer`           | Buffer size for UDP socket                |\n| `verbose_yn`             | Enable verbose output                     |\n| `transcript_yn`        | Enable transcript logging               |\n| `ipv6_yn`              | Use IPv6 instead of IPv4                  |\n| `output_mode`            | Output mode (screen or line)              |\n| `target_rate`          | Target throughput rate                    |\n| `error_rate`             | Expected packet loss rate                   |\n| `lossless`               | Enforce lossless transfers                 |\n| `losswindow_ms`        | Time window for semi-lossy retransmit    |\n| `history`                | History buffer percentage                 |\n| `passphrase`             | Shared authentication key                 |\n\nThese parameters are managed via the `set` command, which allows users to configure defaults before initiating connections.\n\n## Integration Points\n\n### External Dependencies\n- `tsunami-client.h`: Core client-side APIs including session management, transfer initiation, and statistics reporting.\n- `pthread.h`: Threading support required for background I/O handling.\n- `vsibctl.h`, `vsib_ioctl.h`: VSI Brute hardware control interfaces; not directly involved but may be referenced during build-time configuration.\n\n### Internal Calls Within Module\n- `command_get()` → `got_block()`\n- `parse_fraction()` → `warn()`\n- `disk_thread()` → `ring_pop()`, `accept_block()`\n- `command_set()` → `error()`, `warn()`\n\n### Cross-Module Execution Flows\n- `command_get()` calls into `ttp_open_transfer`, `ttp_open_port`, etc., defined elsewhere in the codebase (`include/tsunami-client.h`)\n- `disk_thread()` interacts with `accept_block()` — also part of the core API (`include/tsunami-client.h`)","other-rtserver":"# Other — rtserver\n\n# Module: rtserver\n\nThe `rtserver` module provides core functionality for handling real-time data transfers in the Tsunami system, particularly focusing on parsing EVN filenames and managing VSIbrute hardware control via ioctl commands.\n\n## Purpose\n\nThis module supports:\n- Parsing EVN-style filenames into structured metadata including start times and auxiliary info.\n- Controlling VSIbrute character driver modes using ioctl interface.\n- Supporting protocol-level operations such as opening real-time transfers.\n\n## Key Components\n\n### File Parsing (`parse_evn_filename.*`)\nParses EVN filename strings into a structured format that includes:\n- Experiment name\n- Station code\n- Scan identifier\n- Data start time (both ASCII and numeric representations)\n- Auxiliary information array\n- Validity flag\n\n#### Functions\n```c\nstruct evn_filename *parse_evn_filename(char *filename);\n```\nTakes an EVN filename string and returns a pointer to a parsed structure or NULL on failure.\n\n```c\nchar *get_aux_entry(char *key, char **auxinfo, int nr_auxinfo);\n```\nRetrieves a value from the auxiliary info array by key.\n\n### VSIbrute Hardware Control (`vsibctl.*`, `vsib_ioctl.h`)\nDefines constants used with the Linux VSIbrute character driver's ioctl interface for setting board mode and retrieving status.\n\n#### Constants\n```c\n#define VSIB_SET_MODE 0x7801\n#define VSIB_MODE_STOP 0x0\n#define VSIB_MODE_DIVISOR 0x0000ffff\n#define VSIB_MODE_RUN 0x80000000\n#define VSIB_MODE_GIGABIT 0x40000000\n#define VSIB_MODE_EMBED_1PPS_MARKERS 0x20000000\n```\n\nThese are used to configure the VSIbrute device behavior during capture sessions.\n\n### Registration (`registration.h`)\nUsed internally to embed RCS identifiers in object files for version tracking purposes.\n\n## Integration Points\n\n### Protocol Layer\nThe functions `parse_evn_filename()` and `get_aux_entry()` are called from `ttp_open_transfer()` in `protocol.c`.\n\n### Client Side\nThe function `start_vsib()` in `vsibctl.c` uses `VSIB_MODE_MODE` macro defined here to set up VSIbrute board configuration.\n\n## Example Usage\n\nTo parse an EVN filename:\n\n```c\n#include \"parse_evn_filename.h\"\n\nstruct evn_filename *evn = parse_evn_filename(\"gre53_Ef_scan035_154d12h43m10s.vsi\");\n\nif (evn && evn->valid) {\n    printf(\"Start Time: %lf\\n\", evn->data_start_time);\n}\n```\n\nTo control VSIbrute hardware mode:\n\n```c\n#include <sys/ioctl.h>\n#include \"vsib_ioctl.h\"\n\nint fd; // Assume valid file descriptor opened earlier\nint mode = VSIB_MODE_MODE(2); // Set mode to 2\nioctl(fd, VSIB_SET_MODE, &mode);\n```\n\n## Build System\n\nThis module is built as part of the `rttsunamid` program using autotools. It depends on common library components.\n\n### Makefile.am Snippet\n```makefile\nbin_PROGRAMS\t\t= rttsunamid\n\nrttsunamid_SOURCES\t= \\\n\t\t\tconfig.c \\\n\t\t\tio.c \\\n\t\t\tlog.c \\\n\t\t\tmain.c \\\n\t\t\tnetwork.c \\\n\t\t\tprotocol.c \\\n\t\t\ttranscript.c \\\n\t\t\tvsibctl.c \\\n\t\t\tparse_evn_filename.c \\\n\t\t\tparse_evn_filename.h\n```\n\n## Design Notes\n\n- The parsing logic supports multiple EVN formats including those with fractional seconds.\n- The VSIbrute ioctl constants define a multi-mode interface that allows flexible configuration depending on use case.\n- All source files include appropriate headers and follow standard C conventions for portability.\n\n## Mermaid Diagram\n\n```mermaid\ngraph TD\n    A[protocol.c] --> B(parse_evn_filename)\n    A --> C(get_aux_entry)\n    B --> D[parse_evn_filename.h]\n    C --> D\n    E[vsibctl.c] --> F[VSIB_MODE_MODE]\n    F --> G[vsib_ioctl.h]\n```","other-semaphoreexamples":"# Other — semaphoreExamples\n\n# **Other — semaphoreExamples**\n\nThis module demonstrates inter-process communication using POSIX semaphores. It contains two programs, `sema` and `semb`, that coordinate through a shared semaphore identified by a fixed key (`1492`). The coordination ensures that `semb` waits until `sema` performs a \"V\" (signal) operation, allowing sequential execution between processes.\n\nThe example uses standard System V IPC functions:\n- `semget()` to access or create a semaphore.\n- `semctl()` to initialize the semaphore's value.\n- `semop()` to perform P/V operations on the semaphore.\n\nThese programs are intended as educational examples for understanding semaphore-based synchronization across multiple processes.\n\n## Files\n\n### `sema.c`\n\nA program that performs a \"V\" (release) operation on a semaphore.\n\n#### Purpose\n\nTo signal another process waiting on a semaphore, enabling it to proceed with its work.\n\n#### Key Functions\n\n- `main()`\n  - Uses `semget()` to get the semaphore ID.\n  - Exits if the semaphore doesn't exist.\n  - Sets up a `sembuf` structure to perform a V operation (`sem_op = 1`) on semaphore index `0`.\n  - Calls `semop()` to release the semaphore.\n  - Reports success or failure.\n\n#### Semaphore Usage\n\n```c\nstruct sembuf operations[1];\noperations[0].sem_num = 0;\noperations[0].sem_op = 1;\noperations[0].sem_flg = 0;\nretval = semop(id, operations, 1);\n```\n\n### `semb.c`\n\nA program that performs a \"P\" (wait) operation on a semaphore.\n\n#### Purpose\n\nTo wait for a semaphore to be signaled before proceeding.\n\n#### Key Functions\n\n- `main()`\n  - Uses `semget()` to get the semaphore ID.\n  - Exits if the semaphore doesn't exist.\n  - Sets up a `sembuf` structure to perform a P operation (`sem_op = -1`) on semaphore index `0`.\n  - Calls `semop()` to wait on the semaphore.\n  - Reports success or failure.\n\n#### Semaphore Usage\n\n```c\nstruct sembuf operations[1];\noperations[0].sem_num = 0;\noperations[0].sem_op = -1;\noperations[0].sem_flg = 0;\nretval = semop(id, operations, 1);\n```\n\n### `semabinit.c`\n\nInitializes a semaphore used by both `sema` and `semb`.\n\n#### Purpose\n\nCreates and initializes a semaphore with an initial value of zero. This is typically run once before running either `sema` or `semb`, ensuring they can coordinate properly.\n\n#### Key Functions\n\n- `main()`\n  - Uses `semget()` with `IPC_CREAT` to create a new semaphore array.\n  - Initializes the semaphore’s value using `semctl()` with `SETVAL`.\n\n#### Initialization Logic\n\n```c\nunion semun {\n    int val;\n    struct semid_ds *buf;\n    ushort *array;\n} argument;\n\nargument.val = 0;\nid = semget(KEY, 1, 0666 | IPC_CREAT);\n\nif( semctl(id, 0, SETVAL, argument) < 0)\n{\n   fprintf(stderr, \"Cannot set semaphore value.\\n\");\n}\nelse\n{\n   fprintf(stderr, \"Semaphore %d initialized.\\n\", KEY);\n}\n```\n\n## Semaphore Behavior\n\nThe example uses a single semaphore in an array of size one (`semget(..., 1, ...)`). The semaphore's value starts at 0:\n\n- A **V** (signal) operation increments the semaphore value.\n- A **P** (wait) operation decrements it, blocking if the value would go below zero.\n\nThis allows `semb` to block until `sema` signals it, enabling synchronization between processes without shared memory or other mechanisms.\n\n## Compilation & Execution\n\nCompile all programs:\n```bash\ngcc -o sema sema.c\ngcc -o semb semb.c\ngcc -o semabinit semabinit.c\n```\n\nRun initialization first:\n```bash\n./semabinit\n```\n\nThen execute `semb` in background:\n```bash\n./semb &\n```\n\nFinally, run `sema`:\n```bash\n./sema\n```\n\nExpected output:\n```\nProgram semb about to do a P-operation.\nProcess id is 12345\nSuccessful P-operation by program semb.\nProgram sema about to do a V-operation.\nSuccessful V-operation by program sema.\n```\n\n## Mermaid Diagram: Semaphore Coordination Flow\n\n```mermaid\ngraph TD\n    A[sema] --> B{semget()}\n    C[semb] --> D{semget()}\n    B -- exists? --> E[semop(V)]\n    D -- exists? --> F[semop(P)]\n    E --> G[exit]\n    F --> H[exit]\n    I[semabinit] --> J{semget(IPC_CREAT)}\n    J --> K{semctl(SETVAL)}\n    K --> L[exit]\n```","other-server":"# Other — server\n\n# Server Module Documentation\n\nThe `server` module implements the core functionality of the Tsunami daemon (`tsunamid`). It handles configuration loading, I/O operations, logging, network communication, protocol processing, and transcript management. This module serves as the central hub that orchestrates all major activities within the daemon process.\n\n## Purpose\n\nThis module provides the foundational infrastructure for running the Tsunami daemon, including:\n- Parsing command-line arguments and configuration files\n- Managing system logs and output\n- Handling network connections and data transfer\n- Processing client-server protocols\n- Maintaining session transcripts\n\n## Key Components\n\n### Main Entry Point\n- **main.c**: Contains the entry point function `main()` which initializes the daemon, parses arguments, sets up signal handlers, and starts the main event loop.\n\n### Configuration Management\n- **config.c**: Implements functions for reading and parsing configuration from files or command line options. Handles daemon settings like port numbers, paths, etc.\n\n### Input/Output Operations\n- **io.c**: Manages standard input/output streams and file I/O operations used by the daemon during runtime.\n\n### Logging System\n- **log.c**: Provides centralized logging capabilities with support for different log levels and output destinations such as console or log files.\n\n### Network Communication\n- **network.c**: Implements socket creation, connection handling, and network-level message passing between clients and the server.\n\n### Protocol Handling\n- **protocol.c**: Processes incoming messages according to the defined protocol specification, routing them appropriately based on type and content.\n\n### Transcript Management\n- **transcript.c**: Records and manages session transcripts for debugging and auditing purposes, storing information about interactions between client and server.\n\n## Build System Integration\n\n### Autotools Makefile.am\n```makefile\nAM_CPPFLAGS = -I$(top_srcdir)/include\ncommon_lib = $(top_builddir)/common/libtsunami_common.a\nbin_PROGRAMS = tsunamid\ntsunamid_SOURCES = config.c io.c log.c main.c network.c protocol.c transcript.c\ntsunamid_LDADD = $(common_lib)\ntsunamid_DEPENDENCIES = $(common_lib)\n```\n\n### Standalone Makefile\n```makefile\nSRC = config.c  io.c  log.c  main.c  network.c  protocol.c  transcript.c \\\n   ../common/common.c  ../common/error.c  ../common/md5.c\nCFLAGS = -Wall -O3 -I../common/ -I../include/ -pthread -D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE\ntsunamid: $(SRC)\n\t$(CC) $(CFLAGS) $(SRC) -o tsunamid\n```\n\n## External Dependencies\n\nThe server module depends on several components from other parts of the codebase:\n\n1. **Common Library** (`libtsunami_common.a`): \n   - Shared utilities and error handling routines\n   - Common data structures and helper functions\n\n2. **Include Directory**:\n   - Header files defining interfaces and constants used throughout the module\n\n3. **System Libraries**:\n   - POSIX threading library (pthread)\n   - Standard C library functions\n\n## Architecture Overview\n\nThis module is designed around a single executable program `tsunamid`. It follows a modular structure where each `.c` file encapsulates specific functionality related to system management, communication, and processing.\n\nNo complex execution flows are detected in this module's call graph, indicating that it operates primarily through straightforward procedural control flow without significant branching logic.\n\n## Compilation Notes\n\nWhen building using autotools, ensure that the common library path is correctly set via `AM_CPPFLAGS` and `tsunamid_LDADD`.\n\nFor standalone builds, all source files must be compiled with appropriate include paths and linking flags including `-pthread` for thread support.\n\n## Usage\n\nTo run the Tsunami daemon:\n```bash\n./tsunamid [options]\n```\n\nWhere options typically include configuration file paths or runtime parameters handled by the modules within this directory.","other-sys":"# Other — sys\n\n# win32compat/sys Module Documentation\n\n## Overview\n\nThe `win32compat/sys` module provides compatibility definitions for system-level headers required by POSIX-compliant applications when running under Windows. It includes redefinitions or extensions of standard types, macros, and structures from `<sys/socket.h>`, `<sys/time.h>`, and `<sys/types.h>` that are not natively available in the Windows environment.\n\nThis module is part of a larger compatibility layer designed to bridge differences between Unix-like systems and Microsoft Windows platforms, particularly for network programming interfaces such as those defined in RFCs related to IP multicast and IPv6 support.\n\n## Key Files\n\n### `socket.h`\nProvides forward declarations for socket-related headers (`<winsock2.h>` and `<ws2tcpip.h>`), ensuring proper inclusion order without conflicts with older WinSock APIs.\n\n```c\n#include <winsock2.h>\n#include <sys/ws2tcpip.h>\n```\n\n### `time.h`\nDefines a minimal `time_t` type using `long`.\n\n```c\ntypedef long time_t;\n```\n\n### `types.h`\nContains exact-width integer type definitions compatible across compilers (`_MSC_VER` vs GNU C). Also defines additional types like `_ssize_t`, `off64_t`, etc., which are used throughout the system API.\n\n#### Type Definitions\n\n| Type         | Description                          |\n|--------------|--------------------------------------|\n| int8_t       | Signed 8-bit integer                 |\n| u_int8_t     | Unsigned 8-bit integer               |\n| u_char       | Unsigned character                   |\n| int16_t      | Signed 16-bit integer                  |\n| u_int16_t    | Unsigned 16-bit integer                |\n| int32_t      | Signed 32-bit integer                  |\n| u_int32_t    | Unsigned 32-bit integer                |\n| int64_t      | Signed 64-bit integer                  |\n| u_int64_t    | Unsigned 64-bit integer              |\n\nAdditionally:\n- `time_t`: Defined as `long`.\n- `ssize_t`: Alias for `_ssize_t`.\n- `off64_t`: Defined as `u_int64_t`.\n- `fpos64_t`: Defined as `u_int64_t`.\n\n### `ws2tcpip.h`\nIncludes TCP/IP-specific extensions from Windows Sockets 2 (WinSock2) including:\n\n- **IP Multicast Options**: Macros like `IP_MULTICAST_IF`, `IP_ADD_MEMBERSHIP`, and `IP_DROP_MEMBERSHIP`.\n- **IPv6 Support Structures**:\n  - `in6_addr`: Union-based structure representing an IPv6 address.\n  - `sockaddr_in6`: Structure for storing IPv6 socket addresses.\n- **Address Testing Macros**:\n  - `IN6_IS_ADDR_UNSPECIFIED()`\n  - `IN6_IS_ADDR_LOOPBACK()`\n  - `IN6_IS_ADDR_LINKLOCAL()`\n  - And others for checking various IPv6 address properties.\n- **Network Information Functions**:\n  - `getnameinfo()` – Converts a socket address to a corresponding host and service name.\n  - `getaddrinfo()` / `freeaddrinfo()` – Resolves hostnames into IP addresses.\n- **Error Handling Constants**:\n  - `EAI_AGAIN`, `EAI_BADFLAGS`, `EAI_FAIL`, etc. — mapped error codes from WinSock.\n\n## Purpose and Usage\n\nThis module serves primarily as a c
