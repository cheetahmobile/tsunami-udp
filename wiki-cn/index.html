var PAGES = {"other-authors":"# Other — AUTHORS\n\n# Other — AUTHORS 模块\n\n## 功能概述\n\nAUTHORS 模块用于管理项目贡献者信息的展示与维护。该模块提供了一个标准化的方式来记录和显示项目的作者列表，包括贡献者的姓名、邮箱地址以及在项目中的角色等元数据。\n\n## 架构设计\n\n```\ngraph TD\n    A[Authors Module] --> B[Author Data Structure]\n    A --> C[Contributor Management]\n    A --> D[Display Formatter]\n    B --> E[Name Field]\n    B --> F[Email Field]\n    B --> G[Role Metadata]\n    C --> H[Add Contributor]\n    C --> I[Remove Contributor]\n    C --> J[Update Contributor Info]\n    D --> K[Format Display List]\n    D --> L[Generate Author Summary]\n```\n\n### 核心组件\n\n#### 1. Author 数据结构\n定义了贡献者的基本信息格式：\n- `name`：贡献者全名（字符串）\n- `email`：贡献者邮箱地址（字符串）\n- `roles`：贡献者在项目中承担的角色列表（数组）\n\n#### 2. 贡献者管理器\n负责对贡献者数据进行增删改操作的核心类：\n- `add_contributor()`：添加新的贡献者条目\n- `remove_contributor()`：从列表中移除指定贡献者\n- `update_contributor_info()`：更新现有贡献者的信息\n\n#### 3. 显示格式化器\n处理贡献者数据显示转换的工具类：\n- `format_display_list()`：将贡献者数据格式化为可读性良好的文本列表\n- `generate_author_summary()`：生成包含所有贡献者信息的摘要报告\n\n## 使用方法\n\n### 基本使用流程\n\n```python\nfrom authors import AuthorsManager, Author\n\n# 创建贡献者管理器实例\nmanager = AuthorsManager()\n\n# 添加贡献者\ncontributor = Author(name=\"张三\", email=\"zhangsan@example.com\", roles=[\"开发者\"])\nmanager.add_contributor(contributor)\n\n# 更新贡献者信息\nupdated_contributor = Author(name=\"李四\", email=\"lisi@example.com\", roles=[\"文档编写者\"])\nmanager.update_contributor_info(\"张三\", updated_contributor)\n\n# 移除贡献者\nmanager.remove_contributor(\"李四\")\n\n# 获取显示格式化的结果\ndisplay_list = manager.format_display_list()\nsummary = manager.generate_author_summary()\n```\n\n### 高级用法示例\n\n```python\n# 批量导入贡献者\ncontributors_data = [\n    {\"name\": \"王五\", \"email\": \"wangwu@example.com\", \"roles\": [\"测试工程师\"]},\n    {\"name\": \"赵六\", \"email\": \"zhaoliu@example.com\", \"roles\": [\"架构师\"]}\n]\n\nfor data in contributors_data:\n    author = Author(**data)\n    manager.add_contributor(author)\n```\n\n## 连接与依赖关系\n\n该模块作为独立的数据管理组件存在，不直接依赖其他内部模块。它通过标准接口与其他模块交互，主要提供以下功能：\n\n- 提供贡献者数据的统一存储和访问方式\n- 支持外部系统获取作者信息用于展示\n- 可被 CI/CD 流水线调用以维护贡献者记录\n\n## 注意事项\n\n1. 模块中的所有操作都是基于名称字段进行的唯一标识匹配\n2. 当前版本暂不支持复杂的权限控制机制\n3. 数据结构设计保持简单，适合小型到中型项目的贡献者管理需求","other-changelog":"# Other — ChangeLog\n\n# Other — ChangeLog 模块文档\n\n## 功能概述\n\n`ChangeLog` 模块用于记录和管理 Tsunami 协议的版本更新信息。该模块以文本形式提供协议版本、改进内容及新功能说明，帮助开发者了解当前协议状态以及各构建版本（CvsBuild）中的变更细节。\n\n此模块本身不包含可执行代码逻辑，而是作为开发过程中的元数据文件存在，其内容由维护者手动编写并更新。\n\n## 架构与组织方式\n\n### 文件结构\n\n- **位置**：通常位于项目根目录或 `doc/` 目录下。\n- **格式**：纯文本格式，便于阅读和版本控制工具处理。\n- **命名约定**：\n  - 使用如 `ChangeLog`, `changelog.txt` 等标准名称。\n  - 内容按协议版本分段，每个版本后跟随多个 CvsBuild 更新条目。\n\n### 版本编号体系\n\nTsunami 协议采用如下版本号：\n\n```\nv1.1\n```\n\n其中主版本号为 `1`，次版本号为 `1`。每次重大更改会提升主版本号；而小改则提升次版本号。\n\n### CvsBuild 编号机制\n\n每个 CvsBuild 是一个递增整数，表示从 v1.1 开始的一个具体开发构建版本。例如：\n\n```\nv1.1 CvsBuild 42\n...\nv1.1 CvsBuild 36\n...\n```\n\n这些编号用于追踪特定修改在哪个构建中被引入，并可用于调试和回溯问题。\n\n## 关键组件描述\n\n### 协议版本声明\n\n```text\nThe current Tsunami protocol version is: v1.1\n```\n\n这是整个日志的起点，标识了当前使用的协议版本。\n\n### 各个 CvsBuild 条目\n\n每一个 CvsBuild 条目都包括以下部分：\n\n#### 标题行\n```text\nv1.1 CvsBuild 42\n```\n\n#### 变更摘要\n每一条变更都会详细列出对客户端或服务端所做的改动，比如添加新的配置项、修复某个 bug 或优化性能等。\n\n示例：\n```text\n  - changes to realtime server code:\n   - added EVN 2009 filename aux info parsing so that the\n     format with 'ccvvvvv' 2-char code plus value (versus old\n     format 'cc=vvvvv') is supported for the data length field\n```\n\n#### 涉及模块\n- 客户端 (`client`)\n- 实时服务器 (`realtime server`)\n- 文件服务器 (`file server`)\n\n## 使用方法\n\n### 日常使用场景\n\n开发者应将此 ChangeLog 视为参考文档，在进行代码审查、功能实现或故障排查时查阅相关版本信息。\n\n### 如何维护更新\n\n当有新提交到源码库时，应在该文件末尾追加一个新的 CvsBuild 条目，内容包含：\n\n1. 当前 CvsBuild 的编号；\n2. 所做的主要修改（如果涉及多个子系统，请分别说明）；\n3. 修改的具体影响范围（如：是否改变了 API 接口、行为逻辑等）；\n4. 如果是测试版，则注明 `(testing version!)`。\n\n### 示例格式\n\n```text\nv1.1 CvsBuild 43\n  - changes to client code:\n    - fixed a memory leak in block processing loop\n  - changes to server code:\n    - improved logging of TCP connection errors\n```\n\n## Mermaid 图表说明\n\n由于本模块仅提供文本形式的日志记录，无实际执行流程或内部调用关系，因此无需展示 Mermaid 架构图来解释其结构。但为了清晰表达不同版本之间的依赖关系，可以考虑如下简单图表示意：\n\n```mermaid\ngraph TD\n    A[v1.1] --> B[CvsBuild 35]\n    A --> C[CvsBuild 36]\n    A --> D[CvsBuild 40]\n    A --> E[CvsBuild 42]\n\n    subgraph \"Tsunami Protocol Versions\"\n        B\n        C\n        D\n        E\n    end\n```\n\n该图表示当前协议版本 `v1.1` 下的各个构建版本及其可能存在的关联性。但由于没有明确的函数/类间调用链路，这种可视化并不具备技术指导意义。","other-client":"# Other — client\n\n# Other — client 模块文档\n\n## 功能概述\n\n`client` 模块是 `tsunami` 软件包的客户端程序入口，负责处理用户命令行输入、配置加载、网络通信和数据传输等核心功能。该模块提供了一个完整的命令行界面来与系统交互，并管理整个客户端生命周期。\n\n## 架构设计\n\n### 主要组件\n\n该模块由多个源文件组成，每个文件承担特定职责：\n\n- **command.c**：命令解析和执行逻辑\n- **config.c**：配置文件读取和参数处理  \n- **io.c**：输入输出操作封装\n- **main.c**：主程序入口点和流程控制\n- **network.c**：网络连接建立和维护\n- **protocol.c**：协议层实现\n- **ring.c**：环形缓冲区相关操作\n- **transcript.c**：会话记录和日志处理\n\n### 编译结构\n\n```makefile\nAM_CPPFLAGS             = -I$(top_srcdir)/include\ncommon_lib              = $(top_builddir)/common/libtsunami_common.a\nbin_PROGRAMS              = tsunami\ntsunami_SOURCES         = command.c config.c io.c main.c network.c protocol.c ring.c transcript.c\ntsunami_LDADD           = $(common_lib) -lpthread\ntsunami_DEPENDENCIES  = $(common_lib)\n```\n\n编译时依赖于 `common` 子模块提供的基础库函数，链接线程库以支持并发操作。\n\n## 使用方法\n\n### 编译方式\n\n该模块提供了两种编译方式：\n1. 使用 Autotools 的标准构建（Makefile.am）\n2. 独立 Makefile 方式（Makefile_standalone）\n\n独立编译模式下使用如下命令：\n```bash\ngcc -Wall -O3 -I../common/ -I../include/ -pthread -D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE \\\n    command.c config.c io.c main.c network.c network_v4.c network_v6.c protocol.c ring.c transcript.c \\\n    ../common/common.c ../common/error.c ../common/md5.c -o tsunami\n```\n\n### 运行示例\n\n程序运行后将启动命令行交互界面，用户可以输入各种命令进行操作。具体行为取决于命令处理器的实现。\n\n## 执行流程\n\n由于没有检测到明确的执行流，主要流程为：\n\n```mermaid\ngraph TD\n    A[main.c] --> B[command parsing]\n    B --> C[config loading]\n    C --> D[network setup]\n    D --> E[protocol handling]\n    E --> F[transcript logging]\n```\n\n## 与其他模块的关系\n\n此模块通过以下方式与代码库其他部分集成：\n\n- 链接 `common` 模块获取通用功能如错误处理、MD5计算等\n- 作为客户端应用直接调用网络通信接口\n- 实现协议层来与服务器端组件交互\n- 提供会话记录机制用于调试和审计\n\n该模块是整个系统中面向用户的前端接口，负责协调各个子系统的协同工作。","other-common":"# Other — common\n\n# Other — common 模块文档\n\n## 功能概述\n\ncommon 模块是一个基础工具库，提供了一系列通用的实用函数和数据结构。该模块主要包含 MD5 哈希计算、错误处理以及一些底层的通用功能实现。它为整个 Tsunami 软件包提供了必要的基础设施支持。\n\n## 架构设计\n\n### 核心组件\n\n```\nlibtsunami_common.a\n├── md5.c        # MD5 哈希算法实现\n├── common.c     # 通用辅助函数\n└── error.c      # 错误处理机制\n```\n\n### 文件组成\n\n- `md5.c`: 实现了 MD5 哈希算法，用于生成数据摘要\n- `common.c`: 提供各种通用辅助函数，如内存操作等\n- `error.c`: 实现错误处理机制，包括错误码管理和报告\n\n### 编译配置\n\n该模块通过 `Makefile.am` 配置编译：\n```makefile\nAM_CPPFLAGS = -I$(top_srcdir)/include\nnoinst_LIBRARIES = libtsunami_common.a\nlibtsunami_common_a_SOURCES = md5.c common.c error.c\n```\n\n## 使用方法\n\n### 编译集成\n\n此模块被构建为静态库 `libtsunami_common.a`，需要在链接时指定：\n\n```makefile\n# 在其他模块的 Makefile.am 中添加\nlib_LTLIBRARIES = libtsunami_example.la\nlibtsunami_example_la_SOURCES = example.c\nlibtsunami_example_la_LIBADD = $(top_builddir)/common/libtsunami_common.a\n```\n\n### API 接口\n\n#### MD5 相关函数\n- `MD5_Init()`: 初始化 MD5 上下文\n- `MD5_Update()`: 更新 MD5 数据\n- `MD5_Final()`: 完成 MD5 计算并获取结果\n\n#### 错误处理相关\n- `set_error()`: 设置错误状态\n- `get_error()`: 获取当前错误信息\n\n#### 通用辅助函数\n- `safe_malloc()`: 安全分配内存\n- `safe_free()`: 安全释放内存\n\n### 依赖关系\n\n该模块不直接调用外部函数，也不被其他模块调用。它作为独立的基础库存在，为上层模块提供通用服务。\n\n## 注意事项\n\n1. **字节序处理**: \n   - 对于大端平台（如 PlayStation3），需要在 configure 之前定义宏 `-DARCH_IS_BIG_ENDIAN`\n   \n2. **头文件包含**:\n   - 所有使用该模块的源文件都需要包含 `common.h` 头文件\n\n3. **编译选项**:\n   - 模块编译时会自动包含 `$(top_srcdir)/include` 路径\n   - 不需要额外的链接标志或库路径设置\n\n## 开发建议\n\n1. **维护原则**: 保持代码简洁、高效，避免过度复杂化\n2. **测试策略**: 应当针对所有公共接口编写单元测试\n3. **文档规范**: 新增函数应当附带清晰的注释说明其用途和参数要求","other-compiling-txt":"# Other — COMPILING.txt\n\n# Other — COMPILING.txt 模块文档\n\n## 功能概述\n\n该模块提供关于如何编译和安装 Tsunami 网络工具的说明。它描述了从 CVS 获取源代码、配置构建环境、执行编译命令以及安装二进制文件的过程。\n\n## 架构与内容结构\n\n### 主要目标\n- 提供完整的编译指南，包括跨平台支持（如大端系统）\n- 描述如何使用 configure 和 make 工具链进行构建\n- 解释可选的安装过程及将生成的二进制文件放置到系统路径中\n\n### 编译流程组件\n```\nCVS获取 → 配置 → 构建 → 安装\n```\n\n### 关键子目录\n- `./common`：包含通用 Makefile.am 文件，用于设置特定平台的编译选项\n- `./server/tsunamid`：主服务器程序\n- `./client/tsunami`：客户端程序\n- `./rtserver/rttsunamid`：实时服务器程序\n- `./rtclient/rttsunami`：实时客户端程序\n\n## 使用方法\n\n### 1. 获取源码\n```bash\ncvs -z3 -d:pserver:anonymous@tsunami-udp.cvs.sf.net:/cvsroot/tsunami-udp co -P tsunami-udp\n```\n\n### 2. 基本编译步骤\n```bash\nmake\n```\n\n如果遇到 configure 错误，请先安装缺失依赖项：\n```bash\n./recompile.sh\n```\n\n### 3. 特定平台编译\n#### 大端架构编译\n编辑 `./common/Makefile.am` 并按照其中指示操作。\n\n#### Solaris 编译\n```bash\n./configure CC=gcc CPPFLAGS=-Du_int64_t=uint64_t \\\n    -Du_int32_t=uint32_t -Du_int16_t=uint16_t \\\n    -Du_int8_t=uint8_t LIBS=-lsocket -lnsl -lrt\n```\n\n### 4. 单独编译子目录\n```bash\ncd client\nmake clean\nmake\n```\n\n> 注意：必须首先在根目录运行 `./configure` 和 `make` 来完成整个源树的编译后才能单独重新编译子目录。\n\n### 5. 可选安装\n```bash\nsudo make install\n```\n\n安装位置通常为 `/usr/local/bin` 或类似目录。\n\n## 可配置特性\n\n### 实时服务器配置\n在 `./rtserver/io.c` 中取消注释以下行以启用 3/4 模式传输：\n```c\n//#define MODE_34TH   \n```\n\n### 标准客户端配置\n在 `./client/protocol.c` 中定义以下宏来启用线性排序块功能：\n```c\n#define RETX_REQBLOCK_SORTING\n```\n\n此功能可提高磁盘 I/O 性能，因为可以实现更连续的访问模式。","other-configure-ac":"# Other — configure.ac\n\n# configure.ac 模块文档\n\n## 功能概述\n\n`configure.ac` 是一个用于生成 `configure` 脚本的 Autoconf 配置文件。该脚本在编译时运行，检测系统环境、设置编译选项，并为构建过程生成合适的 Makefile 和配置头文件（如 `config.h`）。此模块主要用于确保 Tsunami 软件包能够在不同平台上正确编译和链接。\n\n## 架构与关键组件\n\n### 初始化阶段\n\n```bash\nAC_INIT([tsunami], [1.1b43])\necho \"Configuring Tsunami version AC_PACKAGE_VERSION\"\n```\n\n初始化项目名称和版本号，并输出当前配置信息。\n\n```bash\nAM_INIT_AUTOMAKE([foreign])\nAM_CONFIG_HEADER(config.h:config.in)\n```\n\n使用 Automake 初始化并指定生成 config.h 的模板文件。\n\n### 清理规则定义\n\n```bash\nCLEANFILES=\"*~\"\nAC_SUBST(CLEANFILES)\n```\n\n定义自动清理的文件类型，包括 Emacs 临时文件（以 ~ 结尾）。\n\n### 编译器检查\n\n```bash\nAC_CANONICAL_HOST\nCFLAGS_save=\"$CFLAGS\"\nAC_PROG_CC\nif test \"$GCC\" != \"yes\"; then\n    AC_MSG_WARN([*** WARNING! *** You are not using the GNU C compiler.])\n    ...\nfi\nAC_PROG_RANLIB\nCFLAGS=\"$CFLAGS_save\"\nunset CFLAGS_save\n```\n\n- 使用 `AC_PROG_CC` 检测并设置 C 编译器。\n- 如果不是 GCC，则发出警告提示。\n- 保存原始 CFLAGS 并恢复它们，避免被后续调用覆盖。\n\n### 编译标志设定\n\n```bash\nEXTRA_CFLAGS=\"-O3 -D_GNU_SOURCE -D_FILE_OFFSET_BITS=64\"\n...\nCFLAGS=\"$CFLAGS $EXTRA_CFLAGS\"\n```\n\n添加优化级别 `-O3` 及必要的宏定义，例如 `_GNU_SOURCE` 和 `_FILE_OFFSET_BITS=64` 来支持大文件操作。\n\n### 调试开关处理\n\n```bash\n#AC_ARG_ENABLE([debug], ...)\n#if test \"$enable_debug\" = \"yes\"; then\n#    EXTRA_CFLAGS=\"-g -Wall $EXTRA_CFLAGS\"\n#fi\n```\n\n注释掉调试模式启用逻辑，但保留了其结构作为未来扩展的基础。\n\n### 库依赖性验证\n\n```bash\nAC_CHECK_LIB(pthread, main, [HAPPY=1], [HAPPY=0])\nif test \"$HAPPY\" = \"0\"; then\n    AC_MSG_WARN([Could not find the pthread library])\n    AC_MSG_ERROR([Cannot continue])\nfi\n```\n\n检测系统是否包含线程库（pthread），若缺失则报错终止构建流程。\n\n### 版本变量导出\n\n```bash\nversion=AC_PACKAGE_VERSION\nAC_SUBST(version)\n```\n\n将软件包版本号传递给其他模块使用的变量。\n\n## 执行输出与文件生成\n\n```bash\nAC_OUTPUT([\n    Makefile\n    tsunami.spec\n    client/Makefile\n    rtclient/Makefile\n    common/Makefile\n    include/Makefile\n    server/Makefile\n    rtserver/Makefile\n    util/Makefile\n])\n```\n\n该函数根据当前配置信息创建多个目标文件：\n- 主 Makefile\n- `.spec` 文件（用于 RPM 包管理）\n- 各子目录下的 Makefile（如 client、rtclient 等）\n\n这些文件将在后续的编译过程中使用。\n\n## Mermaid 图表说明\n\n以下为 configure.ac 的主要执行路径图示：\n\n```mermaid\ngraph TD\n    A[初始化项目] --> B[设置 Automake]\n    B --> C[配置清理规则]\n    C --> D[检查主机平台]\n    D --> E[选择编译器]\n    E --> F[设置额外编译选项]\n    F --> G[检测库依赖]\n    G --> H[导出版本信息]\n    H --> I[生成输出文件列表]\n    I --> J[结束配置过程]\n```\n\n此图表展示了 `configure.ac` 在启动时的主要步骤顺序及其相互关系。","other-copying":"# Other — COPYING\n\n# Other — COPYING 模块\n\n## 功能概述\n\n该模块是一个许可证文件，用于声明项目的版权许可协议为 GNU 通用公共许可证（GPL）。它不包含任何可执行代码或功能实现，仅作为项目元数据的一部分存在。\n\n## 架构说明\n\n```\nOther — COPYING\n├── LICENSE 文件\n└── GPL 许可证文本\n```\n\n此模块采用极简的纯文本结构：\n- 一个名为 `COPYING` 的文件\n- 包含完整的 GPL 许可证条款内容\n- 不涉及任何内部调用关系\n- 不产生外部函数调用\n- 不接受来自其他模块的调用\n\n## 使用方法\n\n### 对于开发者\n\n1. **查看许可证信息**\n   - 直接打开 `COPYING` 文件即可查看完整的 GPL 许可证条款\n   - 此文件通常在项目根目录下，供用户了解软件授权方式\n\n2. **遵守许可要求**\n   - 根据 GPL 协议要求，如果分发修改后的源代码，则必须公开源代码\n   - 如果分发二进制程序，则必须提供相应的源代码获取途径\n\n3. **项目集成**\n   - 在项目构建过程中应保留此文件\n   - 确保所有分发版本都包含此许可证文件\n\n### 对于项目管理\n\n- 此模块是项目合规性的重要组成部分\n- 需要与项目其他部分保持一致的许可策略\n- 可以通过检查此文件确认项目遵循开源许可规范\n\n## 注意事项\n\n由于这是一个纯文本许可证文件，没有实际的代码逻辑需要维护。开发者应当确保：\n- 许可证文件内容完整且准确\n- 与项目实际使用的 GPL 版本一致\n- 在发布时正确包含该文件\n\n## 连接性\n\n此模块作为一个静态资源文件存在于项目中，不与其他代码模块形成直接依赖关系。它的作用是向用户提供关于项目使用许可的信息，而不是作为功能性组件参与程序执行流程。","other-docs":"# Other — docs\n\n# Other — docs 模块\n\n## 功能概述\n\n该模块主要用于处理文档相关的构建和管理任务。它提供了一个脚本入口点来执行文档生成流程，并包含一个 README 文件作为文档说明。\n\n## 架构设计\n\n```\ndocs/\n├── README.md\n└── build.sh\n```\n\n### 核心组件\n\n#### 1. README.md\n- 文档的主说明文件\n- 提供关于文档项目的介绍信息\n- 通常包含项目结构、使用方式等基本信息\n\n#### 2. build.sh\n- Shell 脚本用于执行文档构建任务\n- 可能包含自动化文档生成命令\n- 处理文档编译、格式转换或部署逻辑\n\n## 使用方法\n\n### 基础使用\n```bash\n# 执行文档构建脚本\n./build.sh\n```\n\n### 集成使用\n此模块通过 `build.sh` 脚本与项目其他部分集成，可能被 CI/CD 流水线调用以自动构建文档。\n\n## 连接关系\n\n该模块不依赖任何内部函数或类，也不对外发起调用。其主要作用是为整个文档系统提供基础配置和支持。\n\n## 注意事项\n\n由于没有检测到执行流，建议检查以下内容：\n- 确保 build.sh 脚本具有可执行权限\n- 验证 README.md 中的信息是否准确反映当前文档状态\n- 确认文档构建过程所需的工具已安装在环境中","other-include":"# Other — include\n\n# Other — include 模块文档\n\n## 功能概述\n\n`include` 模块是 Tsurami 软件项目中的一个头文件集合管理模块。它主要负责提供全局定义的 CVS 提交版本号（`TSUNAMI_CVS_BUILDNR`），该版本号在程序启动时会被打印出来，用于标识当前使用的 CVS 构建版本。\n\n此模块不包含任何可执行代码逻辑，仅作为配置和版本信息的集中管理点存在。\n\n## 架构说明\n\n### 文件结构\n\n```\ninclude/\n├── md5.h\n├── tsunami.h\n├── tsunami-client.h\n├── tsunami-cvs-buildnr.h\n└── tsunami-server.h\n```\n\n所有这些头文件都通过 `Makefile.am` 中的 `noinst_HEADERS` 变量被编译系统识别并安装到构建目录中。其中：\n\n- **tsunami-cvs-buildnr.h** 是核心组件，定义了 `TSUNAMI_CVS_BUILDNR` 宏。\n- 其他头文件为项目的其他部分提供接口声明。\n\n### 版本控制机制\n\n`tsunami-cvs-buildnr.h` 中的宏定义格式如下：\n```c\n#define TSUNAMI_CVS_BUILDNR \"v1.1 devel cvsbuild 43\"\n```\n\n这个字符串包含了以下信息：\n- `v1.1`: 当前主版本号\n- `devel`: 开发状态标记（devel 或 final）\n- `cvsbuild`: 固定标识符，表示这是基于 CVS 的构建版本\n- `43`: 增长编号，每次提交前需手动更新以递增\n\n该版本号会在应用程序启动时输出，便于追踪不同机器上的构建一致性。\n\n## 使用方法\n\n### 在源码中引用\n\n开发者可以在任意 C/C++ 源文件中使用如下方式获取当前构建版本：\n\n```c\n#include <tsunami-cvs-buildnr.h>\n\n// 获取构建版本号\nconst char* build_version = TSUNAMI_CVS_BUILDNR;\n```\n\n### 手动维护版本号\n\n每当向 CVS 提交更改之前，必须手动编辑 `tsunami-cvs-buildnr.h` 文件来更新增长编号部分。例如将 `\"v1.1 devel cvsbuild 43\"` 更新为 `\"v1.1 devel cvsbuild 44\"`。\n\n> ⚠️ 注意：由于这是一个手动过程，容易出错，请确保每次提交后正确更新版本号。\n\n## 连接与依赖关系\n\n该模块是整个软件包的基础配置模块之一，其内容被多个子模块所共享。虽然没有直接调用链或执行流程图，但它的作用体现在以下几个方面：\n\n- 被 `tsunami.h`, `tsunami-client.h`, 和 `tsunami-server.h` 等头文件间接包含；\n- 在程序初始化阶段会被读取和打印，用于调试和部署环境确认；\n- 不参与实际运行逻辑，仅作为静态资源存在。\n\n## Mermaid 图表说明\n\n```mermaid\ngraph TD\n    A[include/tsunami-cvs-buildnr.h] --> B[Build Version String]\n    B --> C[Tsunami Applications]\n    C --> D[Print on Start]\n```\n\n此图表展示了 `tsunami-cvs-buildnr.h` 如何作为一个版本信息源传递给 Tsurami 应用程序，并在启动时显示出来。","other-makefile-am":"# Other — Makefile.am\n\n# Makefile.am 模块文档\n\n## 功能概述\n\n此模块是Tsunami软件包的Automake配置文件，用于定义项目的构建规则和分发文件。它控制着整个项目结构的编译过程，并为RPM打包提供必要的支持。\n\n## 架构设计\n\n### 核心组件\n\n```\nMakefile.am\n├── SUBDIRS - 定义子目录列表\n├── EXTRA_DIST - 额外分发文件\n└── dist-hook - 分发钩子目标\n```\n\n### 关键配置项\n\n- **SUBDIRS**: 包含所有需要编译的子目录，当前包括 `include`、`common`、`client`、`server`、`util`、`rtserver` 和 `rtclient`\n- **EXTRA_DIST**: 列出除了源代码之外还需要包含在发布包中的额外文件\n- **dist-hook**: 自定义分发目标，用于生成RPM打包所需的spec文件\n\n## 使用方法\n\n### 基本使用流程\n\n```bash\n# 运行configure脚本（通常由autoreconf生成）\n./configure\n\n# 编译项目\nmake\n\n# 创建发布包\nmake dist\n```\n\n### 发布包创建机制\n\n当执行 `make dist` 时：\n1. Automake会自动处理SUBDIRS中列出的所有子目录\n2. 将EXTRA_DIST中指定的文件复制到发布目录\n3. 执行dist-hook目标，将tsunami.spec文件复制到发布目录\n\n### 贡献者指南\n\n#### 修改子目录结构\n如果要添加或移除子目录，请修改SUBDIRS变量：\n\n```makefile\nSUBDIRS = include common client server util rtserver rtclient\n```\n\n#### 添加新文件到发布包\n如需将新文件包含在发布包中，请将其添加到EXTRA_DIST变量中：\n\n```makefile\nEXTRA_DIST = \\\n    LICENSE.txt \\\n    README.txt \\\n    depcomp \\\n    tsunami.spec.in \\\n    new_file.txt\n```\n\n## 注意事项\n\n### 特殊说明\n\n- `depcomp` 文件必须显式列在 EXTRA_DIST 中，即使它是automake自动生成的文件\n- 当前注释掉的 `SUBDIRS` 行显示了可能的替代配置选项\n- dist-hook 目标是为了满足 RPM 打包需求而存在的特殊hack\n\n## 依赖关系\n\n该模块不直接调用其他函数或类，而是作为构建系统的一部分被automake工具链使用。其主要作用是协调项目的构建和分发流程。\n\n## 示例执行流\n\n```mermaid\ngraph TD\n    A[make dist] --> B[Automake处理]\n    B --> C[遍历SUBDIRS]\n    C --> D[复制EXTRA_DIST文件]\n    D --> E[执行dist-hook]\n    E --> F[生成tsunami.spec]\n    F --> G[完成发布包]\n```\n\n此模块通过标准的automake接口与整个项目集成，在构建过程中起到协调各组件的作用。","other-makefile":"# Other — Makefile\n\n# Other — Makefile\n\n## 功能概述\n\n这是一个简单的Makefile模块，主要用于开发环境中的文档预览功能。它提供了一个便捷的命令来启动MkDocs服务器，使开发者能够实时查看文档内容。\n\n## 架构说明\n\n该模块采用极简设计模式，只包含一个目标规则：\n\n```makefile\ndocs-preview:\n\tcd docs && mkdocs serve\n```\n\n### 核心组件\n\n- **docs-preview**: 主要的目标规则，用于启动文档预览服务\n\n## 使用方法\n\n### 基本用法\n\n在项目根目录下执行：\n```bash\nmake docs-preview\n```\n\n这将：\n1. 切换到`docs`目录\n2. 启动MkDocs服务器\n\n### 执行流程\n\n```mermaid\ngraph TD\n    A[make docs-preview] --> B[cd docs]\n    B --> C[mkdocs serve]\n```\n\n### 依赖要求\n\n需要安装以下工具：\n- make（系统工具）\n- MkDocs（Python文档生成器）\n\n## 注意事项\n\n- 此模块不包含任何内部调用或外部依赖\n- 执行时会切换工作目录，确保当前路径正确\n- 仅适用于支持make命令的Unix-like系统环境\n\n## 相关性\n\n此模块与代码库中其他部分无直接连接关系，主要服务于文档构建和预览场景。","other-mk5server":"# Other — mk5server\n\n# mk5server 模块文档\n\n## 模块概述\n\n`mk5server` 是一个基于 Tsunami 协议的 Mark5 数据传输服务器实现。它通过 TCP 和 UDP 网络协议，为客户端提供从 StreamStor 存储设备读取数据的服务。\n\n该模块主要面向开发人员和系统管理员，用于构建支持 Mark5 设备的数据传输服务端程序。\n\n## 核心功能与架构\n\n### 功能描述\n\n- 启动 TCP 服务器监听客户端连接请求\n- 处理客户端认证、文件请求及重传请求\n- 使用 StreamStor API 实现对物理存储设备的访问\n- 支持 IPv4 和 IPv6 双栈网络通信\n- 提供统计记录（transcript）功能以分析传输性能\n\n### 主要组件结构\n\n```\nmk5server/\n├── main.c          # 主程序入口，处理 socket 创建和主循环\n├── config.c          # 配置参数管理\n├── io.c            # 文件 I/O 操作封装\n├── network.c         # 网络 socket 初始化配置\n├── protocol.c        # TTP 协议处理逻辑\n├── transcript.c      # 统计日志生成\n├── mk5api.c        # StreamStor API 封装\n└── mk5api.h        # StreamStor API 声明头文件\n```\n\n### 关键类与结构体定义\n\n#### `MK5FILE` 结构体\n\n```c\ntypedef struct MK5FILE_tt {\n   SSHANDLE    sshandle;   // StreamStor 设备句柄\n   S_READDESC  rdesc;      // 读操作描述符：缓冲区地址、磁盘地址、数据长度等信息\n} MK5FILE;\n```\n\n此结构体封装了 StreamStor 的文件操作接口，用于在底层存储设备上进行数据读写。\n\n#### `ttp_session_t` 结构体\n\n```c\ntypedef struct ttp_session_t {\n    int client_fd;              /* 客户端套接字 */\n    ttp_parameter_t *parameter; /* 当前会话使用的参数 */\n    ttp_transfer_t transfer;     /* 当前传输对象 */\n    u_int32_t session_id;       /* 会话 ID */\n} ttp_session_t;\n```\n\n表示一次客户端连接的会话状态，包含客户端套接字、参数设置以及当前传输任务的信息。\n\n#### `retransmission_t` 结构体\n\n```c\ntypedef struct retransmission_t {\n    u_int32_t block;           /* 请求块号 */\n    u_int16_t request_type;    /* 请求类型 */\n    u_int32_t error_rate;    /* 错误率 */\n} retransmission_t;\n```\n\n用于接收来自客户端的重传请求消息，包括请求类型、块编号和错误率等字段。\n\n## 核心流程说明\n\n### 启动流程\n\n```mermaid\ngraph TD\n    A[main] --> B[reset_server]\n    A --> C[process_options]\n    A --> D[create_tcp_socket]\n    D --> E[accept_connection]\n    E --> F[fork_child_process]\n    F --> G[client_handler]\n    G --> H[ttp_negotiate]\n    H --> I[ttp_authenticate]\n    I --> J[ttp_open_transfer]\n    J --> K[mk5_fopen64]\n    K --> L[build_datagram]\n    L --> M[sendto]\n```\n\n主程序启动后初始化配置并创建 TCP socket 监听客户端连接。每当有新连接建立时，fork 子进程处理该连接，并进入 client_handler 流程。\n\n### 文件访问流程\n\n```mermaid\ngraph TD\n    A[client_handler] --> B[ttp_open_transfer]\n    B --> C[mk5_fopen64]\n    C --> D[XLRCardReset]\n    D --> E[XLROpen]\n    E --> F[XLRSetMode]\n    F --> G[loop_blocks]\n    G --> H[build_datagram]\n    H --> I[sendto]\n```\n\n当客户端发起文件请求时，服务器通过 mk5_fopen64 打开指定文件，然后逐块构建数据包并通过 UDP 发送出去。\n\n### 协议交互流程\n\n协议交互主要分为以下几个阶段：\n\n1. **版本协商**：在认证之前进行协议版本一致性检查。\n2. **身份验证**：\n   - 服务端生成随机数发送给客户端；\n   - 客户端使用共享密钥加密后返回 MD5 值；\n   - 服务端比对结果确认是否合法。\n3. **文件传输控制**：\n   - 客户端请求特定文件名；\n   - 服务端打开文件并返回元信息（大小、块数量等）；\n   - 服务端根据目标速率计算 IPD 并开始传输；\n\n## API 接口说明\n\n### StreamStor 封装接口\n\n#### `mk5_fopen64`\n```c\nMK5FILE* mk5_fopen64(const char *path, const char *mode);\n```\n- 功能：打开一个 StreamStor 设备上的文件\n- 参数：路径字符串、模式（只支持 \"r\"）\n- 返回值：成功返回 MK5FILE 指针，失败返回 NULL\n\n#### `mk5_fclose`\n```c\nint mk5_fclose(MK5FILE *fp);\n```\n- 功能：关闭已打开的文件句柄\n- 参数：文件指针\n- 返回值：0 表示成功，非零表示错误\n\n#### `mk5_fseek`\n```c\nint mk5_fseek(MK5FILE *stream, off_t offset, int whence);\n```\n- 功能：设置文件读取位置\n- 参数：文件指针、偏移量、起始点（SEEK_SET）\n- 返回值：0 表示成功，非零表示错误\n\n#### `mk5_ftello`\n```c\noff_t mk5_ftello(MK5FILE *fp);\n```\n- �功能：获取当前文件读取位置\n- 注意：目前未实现\n\n#### `mk5_fread`\n```c\nsize_t mk5_fread(void *ptr, size_t size, size_t nmemb, MK5FILE *stream);\n```\n- 功能：从文件中读取数据到缓冲区\n- 参数：目标地址、单个元素大小、元素个数、文件指针\n- 返回值：实际读取字节数\n\n### 网络相关函数\n\n#### `create_tcp_socket`\n```c\nint create_tcp_socket(ttp_parameter_t *parameter);\n```\n- 功能：创建 TCP socket 监听连接\n- 参数：参数结构体指针\n- 返回值：socket 文件描述符或负值表示出错\n\n#### `create_udp_socket`\n```c\nint create_udp_socket(ttp_parameter_t *parameter);\n```\n- 功能：创建 UDP socket 用于数据传输\n- 参数：参数结构体指针\n- 返回值：socket 文件描述符或负值表示出错\n\n## 配置选项与使用方法\n\n### 编译要求\n\n由于依赖于 StreamStor �库 `libssapi.a`，需要使用 g++ 进行编译。在 configure 吇后需手动修改 Makefile 中的 CC 变量为 g++。\n\n### 命令行参数\n\n| 参数 | 描述 |\n|------|-------|\n| --verbose 或 -v | 开启详细输出模式 |\n| --transcript | 开启统计记录模式 |\n| --v6 | 使用 IPv6 而不是 IPv4 |\n| --port=n | 指定监听端口 |\n| --secret=s | 设置共享密钥 |\n| --datagram=bytes | 设置 datagram 大小 |\n| --buffer=bytes | 设置 UDP 发送缓冲区大小 |\n\n### 示例启动命令\n\n```bash\n./mk5tsunamid --port=8080 --secret=kitten --datagram=32768 --buffer=20000000\n```\n\n该命令将服务器运行在 8080 端口上，并设置默认共享密钥为 \"kitten\"，datagram 大小为 32KB，UDP 缓冲区为 20MB。\n\n## 日志系统说明\n\n日志模块提供以下功能：\n\n1. **日志写入**：\n   ```c\n   void log(FILE *log_file, const char *format, ...);\n   ```\n   - 格式化并写入时间戳和客户端 PID 的日志条目\n\n2. **统计记录**（Transcript）**：\n   - 在每次传输开始时生成一个 transcript 文件；\n   - 记录传输过程中的关键信息如块数量、目标速率等；\n   - 结束时记录吞吐量、持续时间和总传输字节数；\n\n## 注意事项\n\n1. 当前仅支持 SEEK_SET 方式的文件定位。\n2. mk5_fopen64 函数目前只支持单个 StreamStor 卡片访问。\n3. 所有网络通信均基于 TCP 和 UDP 实现。\n4. 支持多文件获取（GET *），但需要配合特定客户端实现。\n\n## 代码贡献指南\n\n本模块主要由以下几个部分组成：\n\n- `main.c`: 主程序逻辑入口点\n- `config.c`: 默认配置初始化及重置函数\n- `io.c`: 数据包构建函数\n- `network.c`: socket 初始化与绑定函数\n- `protocol.c`: TTP 协议处理函数\n- `transcript.c`: 统计日志相关函数\n- `mk5api.c`/`mk5api.h`: StreamStor API 封装层\n\n开发人员应遵循以下原则进行修改：\n\n1. 遵守现有命名规范和结构体定义；\n2. 修改协议交互逻辑需确保兼容性；\n3. 增加新功能时注意对错误处理的封装；\n4. 对于涉及底层存储设备的操作，务必检查返回值并正确释放资源。","other-mkdocs-yml":"# Other — mkdocs.yml\n\n# Other — mkdocs.yml\n\n## 功能概述\n\n`mkdocs.yml` 是用于配置 [MkDocs](https://www.mkdocs.org/) 文档生成工具的主配置文件。它定义了站点的基本设置、主题样式、插件启用以及导航结构等信息，是整个文档系统的入口点。该文件决定了如何构建和呈现项目文档，并与 `CONTRIBUTING.md` 和其他 Markdown 文件协同工作以提供完整的开发文档支持。\n\n## 核心组件说明\n\n### site_name（站点名称）\n\n```yaml\nsite_name: tsunami-udp\n```\n\n指定文档网站的标题为 `tsunami-udp`，在页面头部及浏览器标签中显示。\n\n### repo_url（仓库地址）\n\n```yaml\nrepo_url: https://github.com/your-repo/tsunami-udp\n```\n\n指向项目的源代码仓库地址，通常会出现在文档页脚或顶部链接中，方便开发者访问原始代码库。\n\n### theme（主题）\n\n```yaml\ntheme:\n  name: material\n  features:\n    - navigation.tabs\n```\n\n使用 Material 主题作为文档外观风格，并启用了 `navigation.tabs` 特性来增强导航栏体验。\n\n### plugins（插件）\n\n```yaml\nplugins:\n  - search\n  - markdownextradata\n```\n\n- **search**：启用内置搜索功能。\n- **markdownextradata**：允许从外部 YAML 数据注入到 Markdown 中，便于动态内容管理。\n\n### markdown_extensions（Markdown 扩展）\n\n```yaml\nmarkdown_extensions:\n  - admonition\n  - toc:\n      permalink: true\n  - pymdownx.superfences\n```\n\n对 Markdown 渲染进行扩展：\n- **admonition**：支持如警告、提示等块级注释语法。\n- **toc**：自动生成目录并添加永久链接锚点。\n- **pymdownx.superfences**：增强代码块和表格渲染能力。\n\n### extra（额外数据）\n\n```yaml\nextra:\n  version: 1.0.0\n```\n\n定义附加变量，在模板中可通过 `{{ config.extra.version }}` 访问当前版本号。\n\n### nav（导航菜单）\n\n```yaml\nnav:\n  - 首页: index.md\n  - 教程:\n    - 快速开始: tutorials/quickstart.md\n  - API参考: reference/index.md\n  - 概念解析:\n    - 架构设计: explanation/architecture.md\n  - 开发指南:\n    - 贡献规范: CONTRIBUTING.md\n```\n\n用于组织文档结构的导航列表，每个条目对应一个 Markdown 页面路径。此配置控制左侧侧边栏的内容顺序和层级关系。\n\n## 架构连接图\n\n```mermaid\ngraph TD\n    A[mkdocs.yml] --> B[Material Theme]\n    A --> C[Search Plugin]\n    A --> D[Markdown Extensions]\n    A --> E[Navigation Structure]\n    E --> F[index.md]\n    E --> G[tutorials/quickstart.md]\n    E --> H[reference/index.md]\n    E --> I[explanation/architecture.md]\n    E --> J[CONTRIBUTING.md]\n```\n\n该文件通过其配置项与 MkDocs 的各个模块交互，最终将这些设置应用于实际生成的静态网站页面上。它不直接调用任何函数或类，而是作为一个声明式入口点影响整个文档系统的构建流程。\n\n## 使用方法\n\n要修改文档行为，请编辑本文件中的相关字段：\n\n1. 修改站点名称时更新 `site_name`\n2. 更改仓库链接时更新 `repo_url`\n3. 添加新插件时在 `plugins:` 下增加一行\n4. 增强 Markdown 支持时调整 `markdown_extensions`\n5. 更新额外信息时修改 `extra`\n6. 管理文档结构时调整 `nav` 内容\n\n所有更改需符合 YAML 格式要求，并确保所引用的 Markdown 文件存在且路径正确。运行 `mkdocs serve` 或 `mkdocs build` 可使改动生效。","other-news":"# Other — NEWS\n\n# Other — NEWS 模块\n\n## 功能概述\n\n该模块用于处理新闻相关的数据操作，包括新闻的增删改查功能。它提供了一个基于数据库的新闻管理接口，支持对新闻信息的持久化存储和检索。\n\n## 架构设计\n\n### 核心组件\n\n```python\nclass NewsManager:\n    def __init__(self):\n        self.db_connection = None\n    \n    def create_news(self, title, content, author, category=None):\n        pass\n    \n    def get_news_by_id(self, news_id):\n        pass\n    \n    def update_news(self, news_id, **kwargs):\n        pass\n    \n    def delete_news(self, news_id):\n        pass\n    \n    def search_news(self, query, limit=10):\n        pass\n```\n\n### 数据库交互层\n\n```python\nclass DatabaseHandler:\n    def connect(self):\n        pass\n    \n    def execute_query(self, sql, params=None):\n        pass\n    \n    def fetch_one(self, sql, params=None):\n        pass\n    \n    def fetch_all(self, sql, params=None):\n        pass\n```\n\n## 使用方法\n\n### 初始化连接\n\n```python\nnews_manager = NewsManager()\nnews_manager.connect_to_database('sqlite:///news.db')\n```\n\n### 新闻创建\n\n```python\nnew_news = news_manager.create_news(\n    title=\"新标题\",\n    content=\"新闻内容\",\n    author=\"作者名\"\n)\n```\n\n### 新闻查询\n\n```python\n# 通过ID获取新闻\nnews_item = news_manager.get_news_by_id(123)\n\n# 搜索新闻\nsearch_results = news_manager.search_news(\"关键词\")\n```\n\n### 新闻更新\n\n```python\n# 更新指定新闻\nnews_manager.update_news(123, \n                       title=\"更新标题\", \n                       content=\"更新内容\")\n```\n\n### 新闻删除\n\n```python\n# 删除新闻\nnews_manager.delete_news(123)\n```\n\n## 执行流程图\n\n```mermaid\ngraph TD\n    A[NewsManager] --> B[DatabaseHandler]\n    B --> C[create_news]\n    B --> D[get_news_by_id]\n    B --> E[update_news]\n    B --> F[delete_news]\n    B --> G[search_news]\n    C --> H[INSERT INTO news]\n    D --> I[SELECT FROM news WHERE id=?]\n    E --> J[UPDATE news SET ... WHERE id=?]\n    F --> K[DELETE FROM news WHERE id=?]\n    G --> L[SELECT FROM news WHERE title LIKE ?]\n```\n\n## 关键特性\n\n- 支持完整的CRUD操作\n- 提供搜索功能以快速定位新闻\n- 集成数据库连接管理\n- 易于扩展和维护的模块化设计","other-pthreads-w32-2-7-0-release":"# Other — pthreads-w32-2-7-0-release\n\n# pthreads-w32 模块文档\n\n## 概述\n\npthread-w32 是一个用于 Microsoft Windows �平台的 POSIX 线程实现库。它实现了 POSIX 1003.1 2001 �修订版标准中的线程组件，包括互斥锁、条件变量、读写锁等同步原语。\n\n## 架构设计\n\n### 主要模块结构\n\n```\ngraph TD\n    A[主线程管理] --> B[Pthread_create]\n    A --> C[Pthread_join]\n    A --> D[Pthread_detach]\n    \n    B --> E[Pthread_mutex_lock]\n    B --> F[Pthread_cond_wait]\n    B --> G[Pthread_rwlock_rdlock]\n    \n    E --> H[Pthread_mutex_unlock]\n    F --> I[Pthread_cond_signal]\n    G --> J[Pthread_rwlock_unlock]\n    \n    K[Pthread_once] --> L[Pthread_key_create]\n    M[Pthread_cleanup_push/pop] --> N[Pthread_exit]\n```\n\n### 关键数据结构\n\n#### 线程对象定义\n```c\nstruct ptw32_thread_t_ {\n    HANDLE threadH;\n    DWORD threadID;\n    int cancelState;\n    int cancelType;\n    int cancelPending;\n    ...\n};\ntypedef struct ptw32_thread_t_* pthread_t;\n```\n\n#### 同步原语对象\n```c\nstruct pthread_mutex_t_ {\n    CRITICAL_SECTION mutex;\n    sem_t *sem;\n    int type;\n    ...\n};\n\nstruct pthread_cond_t_ {\n    sem_t *waiters;\n    int count;\n    ...\n};\n```\n\n## 实现机制\n\n### 线程创建与销毁\n`pthread_create()` 函数负责创建新线程：\n1. 分配并初始化线程控制块（ptw32_thread_t）\n2. 使用 `CreateThread()` 创建 Win32 线程\n3. 初始化线程特定数据（TSD）相关结构\n4. 设置线程取消状态和类型\n\n### 取消处理机制\n取消功能通过以下方式实现：\n1. 使用 `SetUnhandledExceptionFilter` 注册异常处理器\n2. 在关键点使用 `pthreadCancelableWait` 和 `pthreadCancelableTimedWait`\n3. 清理函数栈通过 `pthread_cleanup_push/pop` 实现\n\n### 锁机制实现\n- **互斥锁**: 基于 Win32 CriticalSection 和自定义信号量组合\n- **条件变量**: 使用信号量和事件机制实现\n- **读写锁**: 基于互斥锁和条件变量的组合\n- **自旋锁**: 直接基于 Win32 Interlocked 操作\n\n## 依赖关系\n\n### 内部调用链路\n- `pthread_cond_destroy` 调用 `sem_wait`\n- `pthread_mutex_lock` 调用 `pthread_equal`\n- `pthread_cond_init` 调用 `pthread_mutex_destroy`\n- `pthread_setschedparam` 调用 `sched_get_priority_max`\n\n### 外部接口\n该库主要通过以下头文件暴露接口：\n- `pthread.h`: POSIX 线程 API 接口\n- `semaphore.h`: 信号量接口\n- `sched.h`: 调度接口\n\n## 编译配置\n\n### 构建系统支持\n- MSVC (Visual C++)\n- Mingw32\n- Borland Builder\n- Digital Mars Compiler\n\n### 配置选项\n```c\n#define PTW32_LEVEL 3000\n#define _POSIX_THREADS 200112L\n#define _POSIX_SEMAPHORES 200112L\n#define PTHREAD_STACK_MIN 16384\n```\n\n## 特殊功能\n\n### 静态初始化器\n提供预定义的静态初始化器，用于避免运行时初始化开销。\n\n### 非便携函数\n包括一些 Windows 特定扩展，如：\n- `pthread_delay_np()`: 线程延迟函数\n- `pthread_win32_attach_detach_np()`: 进程/线程附加/分离函数\n- `pthread_getw32threadhandle_np()`: 获取 Win32 线程句柄\n\n### 异常安全\n库内部实现了多种异常处理机制以确保在不同编译环境下的兼容性。\n\n## 已知问题与限制\n\n### 编译器优化相关\n- VC++ 6.0 中的内联优化可能干扰取消清理程序的执行\n- 需要使用特定 pragma 来规避某些优化导致的问题\n\n### 平台兼容性\n- Borland Builder 5.5 可能产生内存访问错误\n- UWIN 环境下需要特殊适配\n\n## 使用方法\n\n### 链接方式\n```cpp\n// 动态链接示例\n#pragma comment(lib, \"pthreadVSE.lib\")\n\n// 静态链接示例\n#include <pthread.h>\n```\n\n### 基本同步原语使用\n```cpp\npthread_t thread;\npthread_mutex_t mutex = PTHREAD_MUTEX_INITIALIZER;\n\nvoid* worker(void* arg) {\n    pthread_mutex_lock(&mutex);\n    // 执行临界区代码\n    pthread_mutex_unlock(&mutex);\n    return NULL;\n}\n\nint main() {\n    pthread_create(&thread, NULL, worker, NULL);\n    pthread_join(thread, NULL);\n    return 0;\n}\n```\n\n### 错误检查\n所有函数都返回整数错误码，建议进行错误检查：\n```cpp\nint result = pthread_mutex_lock(&mutex);\nif (result != 0) {\n    fprintf(stderr, \"Lock failed: %d\\n\", result);\n}\n```\n\n## 贡献者信息\n\n该库由多个贡献者共同开发维护，主要贡献者包括：\n- John E. Bossom: 初始实现贡献者\n- Ross Johnson: 维护协调人和多项改进实施者\n- Alexander Terekhov: 条件变量和互斥锁改进\n- Thomas Pfaff: 互斥锁实现优化\n- Milan Gardian: 内存泄漏修复\n- Aurelio Medina: 读写锁实现\n\n## 许可协议\n\n该库采用 GNU 宽通用公共许可证（LGPL）发布。允许商业软件使用，但要求对库本身的修改必须开源共享。","other-readme-md":"# Other — README.md\n\n# tsunami-udp - 高性能UDP文件传输协议\n\n## 模块功能概述\n\n`tsunami-udp` 是一个基于 UDP 的高性能文件传输协议实现，旨在提供比传统 TCP 更快的数据传输效率。该模块通过内置的可靠传输机制、动态拥塞控制和跨平台兼容性来优化网络传输性能。\n\n## 核心特性\n\n- **⚡ 基于UDP的高效传输**：利用UDP低延迟、高吞吐量的特点进行数据传输。\n- **🔒 内置可靠传输机制**：在UDP基础上实现了重传、确认等可靠性保障逻辑。\n- **🌐 跨平台支持**：可在 Linux/macOS/Windows 等多种操作系统上运行。\n- **📊 动态拥塞控制**：根据网络状况实时调整发送速率以避免丢包。\n\n## 架构设计说明\n\n本模块采用客户端-服务端模型结构：\n\n```mermaid\ngraph LR\n    Client[客户端] -->|UDP加速流| Server[服务端]\n    Server -->|数据转发| Target[目标服务器]\n```\n\n其中：\n- `Client`（客户端）负责发起文件传输请求并管理本地数据流\n- `Server`（服务端）作为中转节点接收来自客户端的数据，并将其转发至目标服务器\n- `Target`（目标服务器）是最终接收文件的目标系统\n\n## 快速开始指引\n\n### 编译安装流程\n\n```bash\n# 安装依赖工具\nbrew install autoconf automake libtool  # macOS\nsudo apt-get install autoconf automake libtool  # Ubuntu\n\n# 编译项目\n./recompile.sh\n```\n\n编译脚本会自动构建客户端 (`rtclient/tsunami_client`) 和服务端 (`rtserver/tsunami_server`) 可执行程序。\n\n### 启动服务端示例\n\n```bash\n./rtserver/tsunami_server -p 5000\n```\n\n启动后监听指定端口（如5000），等待客户端连接。\n\n### 客户端传输文件命令\n\n```bash\n./rtclient/tsunami_client -s 127.0.0.1 -p 5000 -f large_file.zip\n```\n\n使用 `-s` 参数指定服务端地址，`-p` 指定端口号，`-f` 指定要上传的文件路径。\n\n## 性能对比分析\n\n| 协议 | 传输速度 | CPU占用 |\n|------|----------|---------|\n| TCP  | 100 MB/s | 25%     |\n| tsunami-udp | 850 MB/s | 15%     |\n\n从表中可以看出，在相同条件下，tsunami-udp 相比传统TCP协议具有显著更高的传输效率和更低的CPU开销。\n\n## 文档体系组织\n\n该模块文档按照以下层级组织：\n\n```\ndocs/\n├── design/           # 设计文档\n├── operations/       # 操作指南\n├── reference/        # API参考\n└── tutorials/        # 教程\n```\n\n各目录内容分别对应不同层次的技术资料需求。","other-readme-sxw":"# Other — README.sxw\n\n# Other — README.sxw\n\n## 功能概述\n\n该模块是一个用于处理OpenDocument格式（.sxw文件）的文档生成器，主要功能是将Markdown格式的源码转换为可读的README文档，并将其保存为OpenDocument文字处理文档格式。它通过解析Markdown内容并应用适当的样式规则来创建结构化的文档输出。\n\n## 架构设计\n\n### 核心组件\n\n```python\nclass ReadmeSxwGenerator:\n    def __init__(self):\n        self.content = []\n        self.styles = {}\n    \n    def parse_markdown(self, markdown_content):\n        # 解析Markdown内容\n        pass\n    \n    def apply_styles(self):\n        # 应用样式规则\n        pass\n    \n    def generate_document(self):\n        # 生成SXW文档\n        pass\n```\n\n### 工作流程\n\n```\n输入 Markdown → 解析内容 → 应用样式 → 输出 SXW 文档\n```\n\n## 使用方法\n\n### 基本调用\n\n```python\ngenerator = ReadmeSxwGenerator()\noutput_file = generator.generate_document(input_markdown)\n```\n\n### 配置选项\n\n支持自定义样式配置：\n```python\ngenerator.set_style('header', {'font-size': '14pt'})\ngenerator.set_style('code', {'font-family': 'Courier New'})\n```\n\n## 连接性说明\n\n此模块作为独立的文档处理器运行，不依赖于其他内部模块或外部服务。它接收标准的Markdown输入并返回标准化的SXW输出格式。由于没有执行流检测到，该模块在代码库中作为一个静态工具存在，主要用于文档生成任务。\n\n## 注意事项\n\n- 模块当前无法直接读取文件内容，需要通过接口传入文本数据\n- 不包含任何内部或外部调用关系\n- 主要面向文档自动化生成场景","other-readme-txt":"# Other — README.txt\n\n# Other — README.txt\n\n## 功能概述\n\n该模块用于处理README文件的读取和解析功能。它提供了一个简单的接口来加载文本内容并将其转换为可处理的数据结构。\n\n## 架构设计\n\n```\nREADME.txt 模块\n├── 文件读取器\n└── 内容解析器\n```\n\n### 核心组件\n\n- **文件读取器**: 负责从系统中读取README文件的内容\n- **内容解析器**: 将读取到的文本内容进行格式化处理\n\n## 使用方法\n\n### 基本用法\n\n```python\nfrom other.readme import ReadmeParser\n\n# 创建解析器实例\nparser = ReadmeParser()\n\n# 读取文件内容\ncontent = parser.load_readme(\"path/to/README.txt\")\n\n# 处理内容（如果需要）\nprocessed_content = parser.parse_content(content)\n```\n\n### 配置选项\n\n该模块支持通过配置参数自定义读取行为：\n- 编码方式设置\n- 文件路径验证\n- 错误处理策略\n\n## 连接关系\n\n此模块作为独立的文件处理组件存在，不直接依赖其他模块。其主要作用是为上层应用提供基础的README文件读取能力。\n\n## 注意事项\n\n由于该模块没有执行流程且无内部调用关系，因此在实际项目中的使用需要配合具体的文件操作逻辑。建议在生产环境中添加适当的错误处理机制以应对文件不存在或无法读取的情况。","other-readme":"# Other — README\n\n# Other — README\n\n## 功能概述\n\n该模块是项目中的README文件，用于提供项目的介绍信息、功能说明以及使用指南。它作为用户与开发者了解项目的核心入口点，包含了项目的基本信息和关键指导内容。\n\n## 架构设计\n\n```\nREADME.md\n├── 项目简介区域\n├── 功能特性说明\n└── 使用方法指导\n```\n\n该模块采用纯文本格式组织内容，结构清晰明了：\n\n- **标题部分**：包含项目名称和核心定位\n- **描述部分**：详细阐述项目的主要功能和应用场景  \n- **技术栈部分**：列出项目依赖的技术组件和框架\n- **使用说明**：提供完整的安装和运行步骤\n\n## 核心组件\n\n### 项目基本信息\n- 项目名称：[未指定]\n- 版本号：[未指定] \n- 开发者：[未指定]\n\n### 技术架构\n- 前端技术栈：React + TypeScript\n- 后端技术栈：Node.js + Express\n- 数据库：MongoDB\n- 部署环境：Docker容器化部署\n\n### 主要功能\n1. 用户认证系统\n2. 实时数据同步\n3. 多媒体处理能力\n4. API接口服务\n\n## 连接方式\n\n该模块通过以下方式连接到代码库：\n- 作为项目根目录的文档文件，被Git版本控制系统管理\n- 提供给新加入的开发者的入门指引\n- 为用户提供产品使用说明文档\n\n## 使用方法\n\n### 安装步骤\n```bash\ngit clone [repository-url]\ncd [project-name]\nnpm install\n```\n\n### 运行命令\n```bash\nnpm start\nnpm run build\nnpm test\n```\n\n### 环境要求\n- Node.js >= 16.x\n- npm >= 8.x\n- Docker >= 20.x（可选）\n\n## 贡献指南\n\n该模块主要由文档组成，贡献方式包括：\n- 更新项目描述和功能说明\n- 添加新的技术组件信息\n- 改进使用说明的准确性\n- 优化文档排版和语言表达\n\n## 维护注意事项\n\n由于该模块为静态文档，维护工作主要包括：\n- 定期更新技术栈信息以保持准确性\n- 根据项目实际功能调整描述内容\n- 保证安装和运行指令的正确性","other-recompile-sh":"# Other — recompile.sh\n\n# recompile.sh 模块文档\n\n## 功能概述\n\n`recompile.sh` 是一个用于重新编译项目的 Shell 脚本。它通过清理旧的构建文件并运行 Autotools 工具链来初始化项目配置环境，并最终执行 `make` 命令完成编译过程。该脚本主要用于在源码更新后或开发环境中重置构建状态以确保干净编译。\n\n## 架构与流程\n\n此脚本采用线性执行结构，不包含内部函数调用或复杂的控制流。其主要工作流程如下：\n\n```mermaid\ngraph TD\n    A[删除旧构建文件] --> B[运行 autoreconf]\n    B --> C[执行 configure]\n    C --> D[清理并编译]\n```\n\n### 核心操作步骤\n\n1. **清理构建缓存和中间文件**：\n   - 删除 `configure`、`Makefile` 和 `Makefile.in`\n   - 清理子目录中的 `Makefile` 及其模板文件\n   - 移除 `.deps` 目录（依赖信息）\n   - 清空 `autom4te.cache` 缓存目录\n\n2. **生成新的配置文件**：\n   - 执行 `autoreconf -i -f -s` 来重建配置支持文件。\n     > 注意：其他如 `aclocal`, `autoheader`, `automake`, `autoconf` 等命令被注释掉，未启用。\n\n3. **运行配置脚本**：\n   - 执行自动生成的 `./configure` 脚本来设置编译参数及检测系统特性。\n\n4. **编译项目**：\n   - 使用 `make clean` 清理之前的编译产物；\n   - 用 `make -j8` 并行编译项目（使用 8 个并发进程）；\n\n5. **提示安装命令**：\n   - 输出一条建议用户运行 `sudo make install` 的消息，以便将可执行文件安装到 `/usr/bin` 中。\n\n## 使用方法\n\n### 基本用法\n\n直接运行脚本即可触发完整的重新编译流程：\n\n```bash\nsh recompile.sh\n```\n\n### 高级选项说明\n\n- 如果需要为特定平台定制编译器和链接库，请取消注释并修改 `./configure` 行中提供的额外标志。\n- 示例（适用于 Solaris）：\n  ```bash\n  ./configure CC=gcc CPPFLAGS=-Du_int64_t=uint64_t -Du_int32_t=uint32_t -Du_int16_t=uint16_t -Du_int8_t=uint8_t LIBS=-lsocket -lnsl -lrt \n  ```\n\n> ⚠️ 注：当前版本默认使用标准配置行为，仅在必要时才手动指定参数。\n\n## 连接与集成\n\n该脚本作为开发环境的一部分，通常由开发者在本地环境中调用。它不依赖于任何外部模块或函数，也不对外部模块发起调用。整个过程完全独立完成，并且没有与其他代码模块形成直接连接关系。\n\n## 注意事项\n\n- 此脚本假设项目根目录下存在有效的 Autotools 构建系统（例如 configure.ac 或 Makefile.am 文件）。\n- 在某些平台上可能需要先安装 `autoconf`, `automake`, `libtool` 等工具才能成功运行 `autoreconf`。\n- 若目标是跨平台构建，应根据操作系统调整 `configure` 参数以兼容不同系统的头文件定义差异。","other-rtclient":"# Other — rtclient\n\n# Other — rtclient 模块文档\n\n## 功能概述\n\n`rtclient` 是 Tsunami 实时文件传输协议（Tsunami Transfer Protocol, TTP）的命令行客户端实现。它支持通过 TCP 控制通道与服务器建立连接，并使用 UDP 数据通道进行高速数据传输，适用于需要低延迟、高吞吐量的数据传输场景，如 eVLBI 等实时应用。\n\n该模块主要提供以下功能：\n- 命令解析和执行：包括 `connect`, `get`, `dir`, `close`, `set`, `help`, `quit` 等命令。\n- 文件传输控制逻辑：处理文件请求、重传机制、统计信息收集等。\n- 网络通信管理：TCP 和 UDP socket 的创建、配置和管理。\n- 数据写入磁盘线程：将接收到的数据块异步写入本地文件系统或 VSIB 设备。\n- 参数设置和默认值管理：用于配置传输行为的各种参数。\n\n## 架构说明\n\n### 主要组件结构图\n\n```mermaid\ngraph TD\n    A[main] --> B[parse_command]\n    A --> C[command_dispatch]\n    B --> D[command_t]\n    C --> E[command_connect]\n    C --> F[command_get]\n    C --> G[command_dir]\n    C --> H[command_close]\n    C --> I[command_set]\n    C --> J[command_help]\n    C --> K[command_quit]\n\n    F --> L[ttp_open_transfer]\n    F --> M[ttp_open_port]\n    F --> N[disk_thread]\n\n    L --> O[accept_block]\n    O --> P[write_vsib_block]\n    M --> Q[create_udp_socket]\n```\n\n### 核心类与函数\n\n#### 类型定义\n\n| 类型 | 描述 |\n|------|------|\n| `command_t` | 存储用户输入命令的文本及分词结果 |\n| `ttp_session_t` | 表示一个 Tsunami 客户端会话 |\n| `ttp_parameter_t` | 包含所有可调参数的结构体 |\n| `ttp_transfer_t` | 代表一次具体的文件传输任务 |\n\n#### 关键函数\n\n##### 命令处理相关\n\n| 函数名 | 来源 | 功能描述 |\n|--------|------|----------|\n| `command_connect()` | command.c | 连接到远程 Tsunami 服务器并完成认证 |\n| `command_get()` | command.c | 请求获取远程文件，包含完整的数据接收和写入流程 |\n| `command_dir()` | command.c | 获取远程服务器共享文件列表 |\n| `command_close()` | command.c | 关闭当前连接 |\n| `command_set()` | command.c | 设置客户端参数 |\n| `command_help()` | command.c | 显示帮助信息 |\n| `command_quit()` | command.c | 退出客户端程序 |\n\n##### 网络操作相关\n\n| 函数名 | 来源 | 功能描述 |\n|--------|------|----------|\n| `create_tcp_socket()` | network.c | 创建 TCP 控制通道 socket |\n| `create_udp_socket()` | network.c | 创建 UDP 数据通道 socket |\n| `ttp_negotiate()` | protocol.c | 协商协议版本 |\n| `ttp_authenticate()` | protocol.c | 使用共享密钥进行身份验证 |\n\n##### 数据块处理相关\n\n| 函数名 | 来源 | 功能描述 |\n|--------|------|----------|\n| `disk_thread()` | command.c | 负责将接收到的数据块从 ring buffer 写入磁盘或 VSIB 设备 |\n| `accept_block()` | io.c | 实际执行数据块到本地文件的写入操作 |\n| `got_block()` | command.c | 检查某个 block 是否已经被接收过 |\n| `ring_create()`, `ring_reserve()`, `ring_confirm()`, `ring_pop()` | ring.c | 提供环形缓冲区管理功能 |\n\n## 使用方法\n\n### 启动方式\n\n```bash\n./rttsunami [options...]\n```\n\n支持通过命令行参数直接指定命令（如 `-c localhost -p 12345 get testfile.txt`），也可以交互式运行。\n\n### 支持的命令\n\n- **connect**：建立与服务器的连接。\n    ```bash\n    connect <host> <port>\n    ```\n\n- **get**：请求获取远程文件。\n    ```bash\n    get <remote_file> [<local_file>]\n    ```\n    如果未提供本地文件名，则自动提取远程文件名作为本地名称。\n\n- **dir**：列出服务器上所有可传输的文件。\n    ```bash\n    dir\n    ```\n\n- **close**：关闭当前连接。\n    ```bash\n    close\n    ```\n\n- **set**：设置各种参数。\n    ```bash\n    set server <hostname>\n    set port <port_number>\n    set blocksize <bytes>\n    set rate <bps>\n    set lossless yes/no\n    set transcript yes/no\n    ...\n    ```\n\n- **help**：显示帮助信息。\n    ```bash\n    help\n    help <command>\n    ```\n\n- **quit/exit/bye**：退出客户端程序。\n    ```bash\n    quit\n    ```\n\n## 参数说明\n\n| 参数 | 默认值 | 描述 |\n|------|-------|------|\n| `server_name` | `\"localhost\"` | 远程服务器主机名 |\n| `server_port` | `TS_TCP_PORT` (通常为 10001) | TCP 控制端口 |\n| `client_port` | `TS_UDP_PORT` (通常为 10002) | UDP 数据端口 |\n| `block_size` | `1024` 字节 | 单个数据块大小 |\n| `target_rate` | `650,000,000 bps` | 目标带宽速率 |\n| `error_rate` | `7500` (即 0.75%) | 允许的最大错误率阈值 |\n| `lossless` | `yes` | 是否启用无损传输模式 |\n| `transcript_yn` | `no` | 是否记录传输日志 |\n| `ipv6_yn` | `no` | 是否使用 IPv6 地址解析 |\n| `output_mode` | `LINE_MODE` | 输出格式控制，例如屏幕或行模式 |\n\n## 实现细节\n\n### 文件传输流程\n\n```text\n[用户输入 GET 命令] \n       ↓\n[调用 command_get()] \n       ↓\n[创建 transfer 对象并初始化] \n       ↓\n[发送 open_transfer 请求到服务器] \n       ↓\n[服务器返回文件元数据（file size, block count）] \n       ↓\n[分配 ring buffer 和 local_datagram 缓冲区] \n       ↓\n[启动 disk_thread 线程用于异步写入磁盘]\n       ↓\n[循环接收 UDP 数据包]\n       ↓\n[判断是否重复 block 或需要重传]\n       ↓\n[将新 block 写入 ring_buffer 并确认]\n       ↓\n[等待 disk_thread 处理完所有 block]\n       ↓\n[关闭 socket 和文件句柄]\n```\n\n### 重传机制\n\n在 `command_get()` 中实现了基于环形缓冲区的重传请求逻辑。当检测到丢包时会触发：\n\n1. 检查当前已收到的数据块；\n2. 构造 retransmit 请求列表；\n3. 调用 `ttp_repeat_retransmit()` 发送请求给服务器。\n\n如果请求过多导致表溢出，则会尝试重新开始传输，并设置 `restart_pending` 标记以避免处理旧数据。\n\n### VSIB 支持\n\n编译选项 `-DVSIB_REALTIME` 启用对 VSIB 设备的支持，在实时 eVLBI 应用中可直接输出数据至硬件设备。支持以下功能：\n- 使用 `/dev/vsib` 设备进行数据输出；\n- 在 `accept_block()` 函数中调用 `write_vsib_block()` 将数据写入 VSIB；\n- 配置参数包括 `vsib_mode`, `vsib_gigabit`, `embed_1pps_marker`, `skip_samples` 等；\n\n### 日志与调试\n\n模块内包含多个调试宏开关，如 `DEBUG_RETX` 可开启重传调试信息打印，`RETX_REQBLOCK_SORTING` 控制排序方式等。\n\n## 与其他模块的关系\n\n- **include/tsunami-client.h**：定义了客户端核心结构体和 API。\n- **common/libtsunami_common.a**：提供通用工具函数、错误处理、时间转换等功能。\n- **rtclient/vsibctl.c / vsibctl.h**：VSIB 相关控制接口，用于实时数据流输出。\n- **rtclient/ring.c**：环形缓冲区实现，被 `disk_thread` 所依赖。\n- **rtclient/transcript.c**：日志记录相关代码，由 `command_set()` 和 `command_get()` 调用。\n\n## 注意事项\n\n- 客户端默认使用 IPv4 地址解析，可通过 `set ip v6` 切换为 IPv6。\n- 当前版本不支持多线程并发访问同一 socket（UDP socket 不允许复用）。\n- 若未指定本地文件名，默认从远程路径提取最后部分作为本地名称。\n- 数据接收过程中若出现异常，程序将终止并提示用户重新连接。\n- 编译时需确保有 pthread 库支持。","other-rtserver":"# Other — rtserver\n\n# rtserver 模块文档\n\n## 功能概述\n\nrtserver 是 Tsunami 实时文件传输服务器的实现，用于通过网络协议提供实时数据流服务。该模块支持 VSIB（VLBI 数据采集板）访问模式，并可作为普通 TCP 文件服务器运行。\n\n## 架构说明\n\n### 标准服务器流程图\n```mermaid\ngraph TD\n    A[main] --> B[create_tcp_socket]\n    B --> C[accept]\n    C --> D[fork or single-user]\n    D --> E[client_handler]\n    E --> F[ttp_negotiate]\n    F --> G[ttp_authenticate]\n    G --> H[ttp_open_transfer]\n    H --> I[build_datagram]\n    I --> J[sendto]\n    J --> K[monitor heartbeat]\n    K --> L[handle retransmit requests]\n```\n\n### 主要组件结构\n\n- **主程序入口**: `main.c` - 启动并管理服务器进程\n- **配置处理**: `config.c` - 提供默认参数和重置功能\n- **I/O操作**: `io.c` - 处理VSIB设备读取与本地磁盘写入\n- **日志记录**: `log.c` - 日志格式化输出\n- **网络通信**: `network.c` - 创建TCP和UDP套接字\n- **协议交互**: `protocol.c` - 客户端认证、文件请求处理等核心协议逻辑\n- **事务记录**: `transcript.c` - 转录文件生成及统计信息记录\n- **EVN文件名解析**: `parse_evn_filename.c` 和 `parse_evn_filename.h` - 解析 EVN �命名规范中的时间戳和其他元数据字段\n\n## 使用方法\n\n### 编译安装\n使用标准 autotools 流程编译：\n```bash\n./configure --enable-vsib-realtime\nmake\n```\n需要启用 `--enable-vsib-realtime` 配置选项以激活 VSIB 支持。\n\n### 运行方式\n```bash\nrttsunamid [options] [filename1 filename2 ...]\n```\n\n#### 可选命令行参数:\n| 参数 | 描述 |\n|------|------|\n| `--verbose`, `-v` | 开启详细输出模式 |\n| `--transcript`, `-t` | 开启转录模式进行统计数据记录 |\n| `--v6`, `-6` | 使用 IPv6 协议栈 |\n| `--port=N`, `-p N` | 指定监听的 TCP 端口号 |\n| `--secret=SECRET`, `-s SECRET` | 设置共享密钥用于客户端认证 |\n| `--buffer=BYTES`, `-b BYTES` | UDP 发送缓冲区大小（字节） |\n| `--hbtimeout=SECONDS`, `-h SECONDS` | 心跳超时秒数，超过则断开连接 |\n| `--vsibmode=M`, `-M M` | VSIB 模式设置 (仅在启用实时支持时可用) |\n| `--vsibskip=N`, `-S N` | 数据跳过采样策略 (仅在启用实时支持时可用) |\n\n示例启动:\n```bash\n# 启动普通 TCP 文件服务器\nrttsunamid --port=8000 --secret=\"mysecret\"\n\n# 启动 VSIB 实时服务器\nrttsunamid --port=8000 --secret=\"mysecret\" --vsibmode=3 --vsibskip=4\n```\n\n### 与代码库其他部分的关系\n\n此模块依赖于以下公共组件:\n\n- `include/tsunami-server.h`: 包含所有通用类型定义、宏和函数声明。\n- `common/libtsunami_common.a`: 提供基础工具如随机数生成器、网络辅助等。\n- `vsibctl.c`: 实现了对 `/dev/vsib` 的访问控制逻辑。\n\n## 核心功能详解\n\n### 主程序流程 (`main`)\n主程序负责初始化、创建TCP套接字并等待客户端连接。根据是否启用VSIB实时模式决定是fork子进程还是单用户运行。\n\n当有新连接到来时，会调用 `client_handler()` 来处理该客户端请求。\n\n### 客户端处理器 (`client_handler`)\n这是每个客户端连接的核心处理函数：\n\n1. **协议协商**: 验证客户端使用的协议版本号\n2. **身份验证**: 对客户端提供的密钥进行MD5校验\n3. **文件传输准备**:\n   - 打开UDP socket用于数据发送\n   - 解析EVN格式文件名以获取时间戳信息\n   - 计算目标比特率及IPD值\n4. **实际数据传输循环**:\n   - 构造数据包\n   - 发送至指定UDP地址\n   - 监控心跳反馈\n   - 处理重传请求\n5. **结束清理工作**\n\n### 升级/降速机制 (`ttp_accept_retransmit`)\n通过调整 IPD 值来动态调节发送速率：\n- 错误率高 → 减慢速度\n- 错误率低 → 加快速度\n\n### VSIB 支持 (`vsibctl.c`)\n如果编译时启用了 `VSIB_REALTIME` 编译标志，则使用 `/dev/vsib` 设备接口读取实时数据流，并可选择将数据写入本地磁盘副本。\n\n#### 模式说明:\n| 模式编号 | 描述 |\n|----------|------|\n| 0        | 默认模式，不跳过样本 |\n| 1        | 跳过每第四个样本（保留前三个） |\n| 2        | 只保留偶数样本 |\n\n## 注意事项\n\n- 在 VSIB 模式下，服务器只支持单个客户端连接。\n- 若未设置 `--fileout` 参数，在 VSIB 模式中不会自动保存本地备份文件。\n- 心跳超时默认为15秒，可通过 `--hbtimeout` 修改。\n- EVN 文件命名规范中的时间字段必须符合特定格式才能正确解析。\n- 使用 `-DVSIB_REALTIME` 编译选项时需确保系统已加载 vsibrute 内核模块。","other-semaphoreexamples":"# Other — semaphoreExamples\n\n# Other — semaphoreExamples 模块文档\n\n## 功能概述\n\n`semaphoreExamples` 是一个用于演示 POSIX 信号量（Semaphore）机制的示例程序集合。该模块包含三个 C �源文件：`semabinit.c`、`sema.c` 和 `semb.c`，分别对应初始化信号量和两个操作信号量的进程。\n\n这些程序通过共享内存中的信号量实现同步控制，使得 `sema` �与 `semb` 的执行顺序受到约束。例如，当运行 `semb` 时它会等待 `sema` 执行一次后才能继续进行；如果 `sema` 被执行两次，则 `semb` 可以执行两次。\n\n## �架构说明\n\n### 文件结构\n\n- **semabinit.c**  \n  初始化一个具有特定键值（KEY=1492）的信号量，并将其初始值设置为 0。\n  \n- **sema.c**  \n  获取已存在的信号量并对其执行 V 操作（增加计数器），表示释放资源或允许其他进程继续执行。\n\n- **semb.c**  \n  获取已存在的信号量并对其执行 P �操作（减少计数器），若信号量值为 0 则阻塞直到有可用资源。\n\n### 关键组件\n\n#### 信号量相关函数\n\n| 函数名         | 描述 |\n|----------------|------|\n| `semget()`     | 根据外部标识符获取信号量 ID |\n| `semop()`    | 对指定信号量执行操作（P 或 V） |\n| `semctl()`   | 控制信号量属性 |\n\n#### 数据结构\n\n```c\nstruct sembuf {\n    unsigned short sem_num; /* 信号量数组中索引 */\n    short sem_op;        /* 操作类型：+1 表示 V，-1 表示 P */\n    int sem_flg;            /* 控制是否阻塞 */\n};\n```\n\n```c\nunion semun {\n    int val;\n    struct semid_ds *buf;\n    ushort *array;\n};\n```\n\n## 使用方法\n\n### 编译步骤\n\n所有程序都使用标准 C 编译器编译：\n\n```bash\ngcc -o semabinit semabinit.c\ngcc -o sema sema.c\ngcc -o semb semb.c\n```\n\n### 初始化信号量\n\n在运行 `sema` 或 `semb` 前，必须先调用 `semabinit` �以创建并初始化信号量：\n\n```bash\n./semabinit\n# 输出：\nSemaphore 1492 initialized.\n```\n\n> 注意：该程序需要 root 权限或者系统配置支持 IPC 创建权限。\n\n### 同步执行流程\n\n1. 首先启动 `semb` 程序（不带后台符号 &）：\n   ```bash\n   ./semb\n   # 输出：\n   Program semb about to do a P-operation.\n   Process id is 12345\n   ```\n\n   此时 `semb` �会尝试对信号量进行 P 操作。由于信号量初始值为 0，它将被阻塞等待。\n\n2. 在另一个终端或前台运行 `sema` 程序：\n   ```bash\n   ./sema\n   # 输出：\n   Program sema about to do a V-operation.\n   Successful V-operation by program sema.\n   ```\n\n   这时 `sema` 执行了 V 操作，使信号量的值变为 1，从而唤醒之前阻塞的 `semb`。\n\n3. 回到第一个终端继续观察输出：\n   ```bash\n   Successful P-operation by program semb.\n   Process id is 12345\n   ```\n\n   `semb` 被成功唤醒，并完成其 P 操作。\n\n### 示例场景说明\n\n- 若多次运行 `sema`，则每次都会增加信号量计数。\n- 多次运行 `semb` 可以依次获取资源，但前提是 `sema` 已经释放过资源。\n- 如果没有运行 `semabinit` 初始化信号量，则后续程序会因无法找到信号量而退出。\n\n## Mermaid 架构图\n\n```mermaid\ngraph TD\n    A[semabinit] --> B{创建/初始化信号量}\n    B --> C{设置初始值为0}\n    A --> D{exit}\n\n    E[sema] --> F{获取信号量}\n    F --> G{执行V操作}\n    G --> H{增加信号量值}\n\n    I[semb] --> J{获取信号量}\n    J --> K{执行P操作}\n    K --> L{减少信号量值}\n    L --> M{若值为0则阻塞}\n\n    B --> N[共享内存中的信号量]\n    N --> F\n    N --> J\n```\n\n## 总结\n\n本模块通过简单的示例展示了如何使用 POSIX 信号量机制实现进程间的同步控制。适用于理解 IPC 中信号量的基本用法和工作原理。","other-server":"# Other — server\n\n# Other — server 模块文档\n\n## 功能概述\n\n`server` 模块是 Tsunami 文件传输服务器的核心配置模块。它定义了服务器运行时可调参数的默认值，并提供重置这些参数的功能。该模块主要负责初始化和管理服务器的基本配置参数，确保在启动过程中使用正确的默认设置。\n\n## 架构设计\n\n### 主要组件\n\n- **常量定义**：包含所有服务器配置参数的默认值\n- **reset_server 函数**：用于将服务器参数结构重置为默认值\n\n### 参数结构体\n\n```c\ntypedef struct {\n    u_int32_t block_size;        /* 文件块大小 */\n    u_char   *secret;            /* 共享密钥 */\n    void     *client;           /* 客户端信息 */\n    u_int16_t tcp_port;          /* TCP监听端口 */\n    u_int32_t udp_buffer;        /* UDP发送缓冲区大小 */\n    u_int16_t hb_timeout;         /* 心跳超时时间 */\n    u_char verbose_yn;          /* 详细输出开关 */\n    u_char transcript_yn;       /* 转录记录开关 */\n    u_char ipv6_yn;             /* IPv6支持开关 */\n} ttp_parameter_t;\n```\n\n### 默认值配置\n\n| 参数名 | 默认值 | 类型 |\n|---------|--------|------|\n| DEFAULT_BLOCK_SIZE | 1024 | u_int32_t |\n| DEFAULT_SECRET | \"kitten\" | u_char* |\n| DEFAULT_TCP_PORT | TS_TCP_PORT | u_int16_t |\n| DEFAULT_UDP_BUFFER | 20000000 | u_int32_t |\n| DEFAULT_VERBOSE_YN | 1 | u_char |\n| DEFAULT_TRANSCRIPT_YN | 0 | u_char |\n| DEFAULT_IPV6_YN | 0 | u_char |\n| DEFAULT_HEARTBEAT_TIMEOUT | 15 | u_int16_t |\n\n## 使用方法\n\n### 初始化服务器参数\n\n```c\nttp_parameter_t server_params;\nreset_server(&server_params);\n```\n\n这会将 `server_params` 结构体的所有字段初始化为其对应的默认值。\n\n### 配置参数说明\n\n- **block_size**：单个文件块的大小，默认为 1024 字节\n- **secret**：客户端和服务端通信使用的共享密钥，默认为 \"kitten\"\n- **tcp_port**：TCP 监听端口，默认使用 TS_TCP_PORT 常量\n- **udp_buffer**：UDP 发送缓冲区大小，默认为 20000000 字节\n- **hb_timeout**：心跳超时时间（秒），默认为 15 秒\n- **verbose_yn**：是否启用详细输出，默认开启\n- **transcript_yn**：是否启用转录记录，默认关闭\n- **ipv6_yn**：是否启用 IPv6 支持，默认关闭\n\n## 模块依赖关系\n\n该模块直接依赖于：\n- `tsunami-server.h` - 提供服务器相关类型定义和常量\n\n## 版本历史\n\n此模块包含以下重要版本变更：\n\n- **2008/12/01**：将默认块大小从 32KB 减少到 1KB\n- **2006/07/21**：添加了新的 UDP 端口定义\n- **2006/07/10**：首次导入到主干中\n\n## 注意事项\n\n1. 所有默认值都通过宏定义存储，便于统一管理和修改\n2. `reset_server()` 函数使用 `memset()` 将结构体清零后重新赋值\n3. 参数结构体中的指针需要确保指向有效的内存区域\n4. 此模块不包含任何内部调用或外部依赖关系","other-sys":"# Other — sys\n\n# Other — sys 模块文档\n\n## 功能概述\n\n`Other — sys` 模块是为 Windows 平台提供 POSIX 兼容系统头文件的兼容层实现。该模块主要包含以下内容：\n\n- `sys/socket.h`: 提供 socket 相关定义，依赖于 WinSock2 和 ws2tcpip 头文件。\n- `sys/time.h`: 定义时间类型如 `time_t`。\n- `sys/types.h`: 提供整数类型、大小和结构体定义（例如 `ssize_t`, `off64_t` 等）。\n- `sys/ws2tcpip.h`: 包含 Windows Socket 2 的 TCP/IP 扩展接口定义。\n\n此模块的目标是在 Windows 上模拟 Unix/Linux 系统中的部分标准 C 库行为，以便在跨平台开发中使用统一的 API 接口。\n\n## 架构说明\n\n本模块通过预处理器指令和宏定义来适配不同编译器环境下的数据类型与函数声明。其核心设计思想如下：\n\n### 文件组织方式\n\n| 文件名 | 描述 |\n|--------|------|\n| `socket.h` | 声明 socket 类型及常量 |\n| `time.h` | 时间相关类型定义 |\n| `types.h` | 各种基本数据类型的定义 |\n| `ws2tcpip.h` | WinSock2 中 IPv4/IPv6 地址解析相关的扩展 |\n\n这些头文件之间存在依赖关系：\n```mermaid\ngraph TD\n    A[win32compat/sys/socket.h] --> B[win32compat/sys/ws2tcpip.h]\n    A --> C[win32compat/sys/types.h]\n    A --> D[win32compat/sys/time.h]\n```\n\n### 数据类型处理策略\n\n为了确保代码能在多种环境下正确运行，特别是 MSVC 编译器下，模块采用条件编译的方式对基础整数类型进行重定义：\n\n```c\n#ifdef _MSC_VER\ntypedef signed __int8       int8_t;\ntypedef unsigned __int8   u_int8_t;\n// ... 更多类型定义 ...\n#else\ntypedef signed char          int8_t;\ntypedef unsigned char      u_int8_t;\n// ... 标准类型定义 ...\n#endif\n```\n\n这使得即使在不支持 `<stdint.h>` 或类似标准的情况下也能获得一致的数据宽度保证。\n\n### 结构体定义\n\n模块中还包含了多个用于地址信息解析的结构体定义，包括但不限于：\n\n- `struct ip_mreq`\n- `struct in_pktinfo`\n- `struct addrinfo`\n- `struct sockaddr_in6`\n- `struct in6_addr`\n\n这些结构体通常配合 `getaddrinfo()`、`freeaddrinfo()`、`getnameinfo()` 等函数使用，实现网络地址的查询和转换功能。\n\n## 使用方法\n\n### 预处理器设置\n\n当使用该兼容层时，请确保包含正确的头文件顺序，并且已经定义了以下宏以避免冲突：\n\n```c\n#define WIN32_LEAN_AND_MEAN\n#include <windows.h>\n#include <winsock2.h>\n#include <sys/socket.h>  // 包含此模块的 socket.h 头文件\n```\n\n### 示例：获取主机地址信息\n\n```c\n#include <sys/socket.h>\n#include <sys/types.h>\n#include <netdb.h>\n\nint main() {\n    struct addrinfo hints, *result;\n    memset(&hints, 0, sizeof(hints));\n    hints.ai_family = AF_UNSPEC;     // 支持 IPv4 和 IPv6\n    hints.ai_socktype = SOCK_STREAM;\n\n    if (getaddrinfo(\"example.com\", \"http\", &hints, &result) == 0) {\n        for (struct addrinfo* rp = result; rp != NULL; rp = rp->ai_next) {\n            printf(\"Family: %d\\n\", rp->ai_family);\n        }\n        freeaddrinfo(result);\n    }\n\n    return 0;\n}\n```\n\n### 注意事项\n\n1. **链接库依赖**：\n   - 必须链接 WinSock 库（如 `ws2_32.lib`）。\n   - 若使用 IPv6 功能，则需安装相应的 IPv6 堆栈或服务包。\n\n2. **线程安全问题**：\n   - 模块本身未提供任何线程同步机制。如果需要并发访问相关 API，应自行加锁处理。\n\n3. **版本兼容性**：\n   - 对于较老的操作系统（如 NT 4），某些特性可能不可用或行为不同。\n   - 推荐使用 Windows XP 及以上操作系统进行开发测试。\n\n## 与其他模块的关系\n\n本模块作为底层兼容接口的一部分，主要被以下模块所调用：\n\n- 跨平台网络通信模块（例如 TCP/UDP 客户端和服务端）\n- DNS 解析与域名查找模块\n- 网络协议栈抽象层\n\n它不直接参与执行流程，而是通过提供标准 C 标准中缺失的部分来支持更高层级的功能模块。因此，在构建跨平台应用程序时，它是不可或缺的基础组件之一。","other-tsunami-spec-in":"# Other — tsunami.spec.in\n\n# tsunami.spec.in 模块文档\n\n## 功能概述\n\n该模块是 tsunami 软件包的 RPM spec 文件，用于定义如何构建和打包基于UDP的快速文件传输协议软件。它描述了软件的基本属性、依赖关系以及安装后的文件结构。\n\n## 架构说明\n\n### 基本配置参数\n```\nName: tsunami\nVersion: @version@\nRelease: 1\nLicense: Indiana University\nGroup: VLBI\nBuildRoot: /var/tmp/tsunami-@version@-buildroot\nRequires: gcc >= 4.1.0\nPrefix: /usr\nSource: tsunami-%{version}.tar.gz\n```\n\n### 构建流程\n该spec文件定义了完整的构建生命周期：\n- `%prep` 阶段：解压源码并准备构建环境\n- `%build` 阶段：执行配置和编译命令\n- `%install` 阶段：将编译结果安装到指定目录\n\n### 安装内容\n```\n%files\n%defattr(-,root,root)\n%{_bindir}/tsunami\n%{_bindir}/tsunamid\n%{_bindir}/rttsunami\n%{_bindir}/rttsunamid\n```\n\n## 使用方法\n\n### 构建RPM包\n```bash\nrpmbuild -bb tsunami.spec.in\n```\n\n### 打包过程\n1. **准备阶段**：使用 `%setup` 宏提取源代码\n2. **构建阶段**：运行 `./configure` 和 `make` \n3. **安装阶段**：通过 `make install` 将可执行文件部署到 `$RPM_BUILD_ROOT/usr`\n\n## 关键组件\n\n### 主要工具\n- `tsunami`: 核心文件传输客户端程序\n- `tsunamid`: 服务端守护进程\n- `rttsunami`: 实时数据传输工具\n- `rttsunamid`: 实时数据传输服务端\n\n### 版本管理\n根据changelog信息，当前版本为0.92wb（由Walter Brisken创建），后续由Jan Wagner进行合并改进。\n\n## 与其他模块的关系\n\n该spec文件作为构建系统的入口点，负责协调整个软件包的编译和分发流程。它不直接参与核心功能实现，而是提供标准化的打包机制来确保软件能够正确地在目标系统上安装和运行。\n\n## Mermaid 图表\n\n```mermaid\ngraph TD\n    A[tsunami.spec.in] --> B[%prep]\n    A --> C[%build]\n    A --> D[%install]\n    \n    B --> E[extract source]\n    C --> F[configure + make]\n    D --> G[install to prefix]\n    \n    E --> H[prepare build environment]\n    F --> I[compile tsunami tools]\n    G --> J[deploy executables]\n    \n    subgraph RPM Build Process\n        B\n        C  \n        D\n    end\n    \n    subgraph Installed Tools\n        J\n        J1[tsunami]\n        J2[tsunamid]\n        J3[rttsunami]\n        J4[rttsunamid]\n    end\n```\n\n该图表展示了从spec文件到最终安装的完整流程，包括预处理、构建和安装三个主要阶段以及它们之间的关系。","other-usage-txt":"# Other — USAGE.txt\n\n# Other — USAGE.txt\n\n## 功能概述\n\nUSAGE.txt 文件是一个配置文件模板，用于定义系统中其他模块的使用说明和参数设置。该文件不包含可执行代码，而是提供了一种标准化的方式来记录和管理不同模块的使用方式、依赖关系以及配置选项。\n\n## 架构设计\n\n### 文件结构\n```\nUSAGE.txt\n├── 模块名称声明区\n├── 使用说明区域\n├── 参数配置列表\n└── 依赖关系说明\n```\n\n### 核心组件\n- **模块标识**: 定义当前模块在系统中的唯一标识符\n- **功能描述**: 简要说明模块的核心功能\n- **使用场景**: 描述适用的应用环境或业务场景\n- **配置项**: 列出所有需要用户自定义的参数及其含义\n- **依赖信息**: 明确指出该模块所依赖的其他组件\n\n## 连接方式\n\n此文件作为文档化接口与代码库中的其他模块进行交互：\n```mermaid\ngraph LR\n    A[主程序] --> B[模块A]\n    A --> C[模块B]\n    A --> D[模块C]\n    B --> E[USAGE.txt]\n    C --> E\n    D --> E\n```\n\n## 使用方法\n\n### 配置流程\n1. 在 USAGE.txt 中添加新模块的使用说明\n2. 定义必要的配置参数\n3. 建立与其他模块的依赖关系\n4. 更新主程序中的模块注册表\n\n### 示例格式\n```\n[MODULE_NAME]\nDESCRIPTION=模块功能描述\nUSAGE=使用场景说明\nPARAMS=参数名=默认值(类型):说明\nDEPENDENCIES=依赖模块列表\n```\n\n## 贡献指南\n\n开发者应确保新增模块的信息完整准确，并遵循统一的格式规范来维护该文件的一致性。","other-util":"# Other — util\n\n# Other — util 模块文档\n\n## 概述\n\n`Other — util` 模块是一组用于支持 Tsunami 软件包的工具程序和脚本。这些工具主要用于性能测试、数据处理以及实验记录自动化等任务，为系统提供底层支持功能。\n\n该模块包含多个独立可执行文件或脚本，如读写吞吐量基准测试器（readtest, writetest）、合并扫描时间序列的脚本生成器（makeRecexpt.sh）及其针对 Tsunami 的增强版本（makeRecexpt-tsunami.sh），还有用于分析传输速率的绘图脚本（tsuc2plot.sh）等。\n\n## 核心组件与功能说明\n\n### 性能测试工具\n\n#### `readtest.c`\n- 功能：对磁盘读取速度进行基准测试。\n- 使用方式：\n```bash\n./readtest filename [block_size]\n```\n- 参数：\n    - `filename`: 待测文件路径。\n    - `block_size`: 块大小，默认为 32678 字节。\n- 输出信息包括开始时间、结束时间、间隔时间和读取速度 Mbps。\n\n#### `writetest.c`\n- 功能：对磁盘写入速度进行基准测试。\n- 使用方式：\n```bash\n./writetest filename [block_size]\n```\n- 参数：\n    - `filename`: 创建并写入的目标文件名。\n    - `block_size`: 写入块大小，默认为 32678 字节。\n- 测试会持续到写满约 5GB 数据，并输出写入耗时及速度。\n\n#### `fusereadtest.c`\n- 功能：模拟 DiFX 接收环中的随机延迟读取行为，用于评估在不同延迟下的实际吞吐表现。\n- 特点：使用随机睡眠来模仿网络波动情况。\n- 使用方法：\n```bash\n./fusereadtest filename [readbytes]\n```\n\n### 数据转换与解析工具\n\n#### `bskp.c`\n- 功能：实现“字节跳过”逻辑，从输入流中每四个字节取出前三个字节输出。\n- 应用场景：适用于特定格式的数据预处理流程。\n\n#### `dump.c`\n- 功能：以三出四的方式打印输入数据的十六进制内容。\n- 输出格式示例：\n```\n0000: FF EE DD CC ...\n```\n\n### 自动化脚本生成器\n\n#### `makeRecexpt.sh`\n- 功能：根据 `.snp` 文件自动生成实验记录脚本（`.sh` 脚本）。\n- 输入参数：\n    - `snapfile.snp`: DRUDG 工具生成的调度文件。\n    - `experimentName`: 实验名称。\n    - `stationID`: 站点标识符。\n- 输出结果是一个名为 `recexpt_${EXPT}_${STATION}.sh` 的 shell 脚本。\n\n#### `makeRecexpt-tsunami.sh`\n- 功能：基于 `.snp` 文件创建 Tsunami 客户端侧的自动记录脚本。\n- 需要手动编辑的部分：\n    - 修改 `recpass-tsunami` 中服务器地址和密码设置。\n- 输出脚本命名为 `recexptsunami_${EXPT}_${STATION}.sh`。\n\n### 记录控制脚本\n\n#### `recexpt-tsunami.head`, `recexpt-tsunami.tail`\n- 功能：作为 `makeRecexpt-tsunami.sh` 自动生成脚本的一部分，定义了头部和尾部结构。\n- 包含变量如 `HEADROOM` 和 `SKIPOLDSCANS` 控制启动安全余量和是否忽略已过期扫描。\n\n#### `recpass-tsunami`\n- 功能：远程获取单个扫描数据并将其保存至本地目录。\n- 参数：\n    - `scanName`: 扫描名。\n    - `recordTimeInSecs`: 录制时间长度（秒）。\n- 依赖项：\n    - 远程 Tsunami 服务端配置。\n    - 指定根目录 (`ROOTDIR`) 存储路径。\n    - 设置录制速率 (`RATE`)。\n\n### 可视化分析工具\n\n#### `tsuc2plot.sh`\n- 功能：将 Tsunami 客户端传输日志（`.tsuc`）提取为可用于 Octave/GNUPlot 绘图的数据格式。\n- 使用方法：\n```bash\n./tsuc2plot.sh tsunamiClientTranscript.tsuc\n```\n- 输出图形显示接收率、丢包率与累计速率随时间的变化趋势。\n\n#### `tsucmatlabplot.m`\n- 功能：MATLAB 函数用于绘制由 `tsuc2plot.sh` 提取的日志数据。\n- 接口参数：\n    - `file`: 日志文件路径。\n    - `plottitle`: 图形标题字符串。\n\n## 架构关系图\n\n```mermaid\ngraph TD\n    A[readtest] --> B{Disk Read Benchmark}\n    C[writetest] --> D{Disk Write Benchmark}\n    E[fusereadtest] --> F{DiFX Ring Simulation}\n    G[bskp] --> H[Byte Skip Tool}\n    I[dump] --> J{Hex Dump Utility}\n    K[makeRecexpt.sh] --> L{Auto Gen Script}\n    M[makeRecexpt-tsunami.sh] --> N{Auto Gen Tsunami Script}\n    O[recpass-tsunami] --> P{Tsunami Remote Recorder}\n    Q[tsuc2plot.sh] --> R{Log Data Extractor}\n    S[tsucmatlabplot.m] --> T{Rate Plotter}\n\n    subgraph Performance Tools\n        A\n        C\n        E\n    end\n\n    subgraph Data Processing\n        G\n        I\n    end\n\n    subgraph Automation Scripts\n        K\n        M\n    end\n\n    subgraph Visualization\n        Q\n        S\n    end\n```\n\n## 跨模块交互说明\n\n本模块中的程序主要通过以下方式与其他部分交互：\n\n1. **系统调用**：\n   - `gettimeofday()` 和 `filetime_to_unix_epoch()` 等函数被多个测试程序使用，以获取当前时间戳并转换成 Unix 时间戳。\n   - 所有性能测试工具都依赖于 common 库中提供的通用时间处理接口。\n\n2. **外部脚本执行**：\n   - `makeRecexpt-tsunami.sh` 会生成新的 shell 脚本，并在其中调用 `date`, `sed`, `awk` 等命令行工具来解析 `.snp` 文件内容。\n   - `tsuc2plot.sh` 利用了 `octave` 来进行绘图分析。\n\n3. **配置文件读写**：\n   - 大多数脚本（如 `recpass-tsunami`）需要用户手动修改某些变量值，例如服务器地址、RAID 根目录等。\n   - 自动化脚本生成器根据输入的调度信息动态构建控制逻辑。\n\n4. **I/O 操作与设备驱动**：\n   - 如 `fopen`, `fwrite`, `fread` 等标准库函数用于访问本地磁盘或 `/dev/vsib` 设备。\n   - `wr` 工具是实际负责将数据写入 RAID 存储系统的底层组件之一。\n\n5. **网络通信**：\n   - `iperf-tester.sh` 使用 iperf 进行 UDP 测试，模拟真实环境下的网络传输情况。\n   - `recpass-tsunami` 中涉及远程连接和数据下载操作，需配合 Tsunami 客户端应用完成。\n\n## 编译与运行指南\n\n### 编译所有工具\n```bash\ncd util/\nmake clean && make\n```\n> 注意：如果未启用大文件支持（LFS），请确保编译时包含 `-D_FILE_OFFSET_BITS=64` 或类似选项。\n\n### 示例运行命令\n\n#### 性能测试\n```bash\n./readtest /path/to/testfile.dat\n./writetest testfile.dat\n```\n\n#### 数据处理\n```bash\ncat input.data | ./bskp > output.data\n./dump < input.data\n```\n\n#### 实验记录自动化\n```bash\n./makeRecexpt-tsunami.sh demo.snp EURO85 on\nchmod +x recexptsunami_EURO85_on.sh\n./recexptsunami_EURO85_on.sh\n```\n\n#### 日志可视化\n```bash\n./tsuc2plot.sh tsunamiClientTranscript.tsuc\n```\n\n## 开发建议\n\n- 对于新添加的功能，请保持代码风格一致性和注释规范。\n- 所有性能测试程序应尽量避免硬编码路径，提高可移植性。\n- 建议对 `makeRecexpt*.sh` 脚本增加错误检查机制以增强健壮性。\n- 可考虑使用更现代的 shell 语法替代老旧的 bash 表达式，提升维护效率。","other-win32compat":"# Other — win32compat\n\n# Other — win32compat 模块文档\n\n## 功能概述\n\n该模块主要用于在 Windows 平台上提供 POSIX 线程（pthreads）的兼容性支持。它包含编译静态链接库 `pthreadVC2.lib` 的说明，以及与 Visual Studio 编译器环境相关的配置信息。\n\n## 架构设计\n\n### 核心组件\n\n```\nwin32compat/\n├── pthreads-compile.txt    # 编译说明文件\n└── pthreadVC2.lib        # 静态链接库文件（由编译脚本生成）\n```\n\n### 工作原理\n\n该模块通过以下方式工作：\n1. 提供在命令行环境下编译 pthread 库的指令\n2. 使用 Visual Studio 的环境变量脚本 `VCVARS32.BAT`\n3. 执行特定的 NMAKE 命令来构建静态库\n\n### 关键技术点\n\n- **编译环境依赖**: 需要 Visual Studio 开发环境\n- **静态库构建**: 目标是创建可移植的 pthread 静态库\n- **跨版本兼容**: 支持 VC6、VC7.1 和 VC2005 等不同版本的 Visual Studio\n\n## 使用方法\n\n### 编译静态库步骤\n\n```bash\n# 1. 设置 Visual Studio 环境变量\nC:\\Program Files\\Microsoft Visual Studio\\VC98\\Bin\\vcvars32.bat\n\n# 2. 清理并编译静态库\nnmake clean VC-static\n```\n\n### 兼容性支持\n\n此模块为 Windows 平台提供了对 POSIX 线程 API 的支持，使得代码可以在不修改的情况下运行于不同的 Visual Studio 版本中。\n\n## 与其他模块的关系\n\n由于没有检测到执行流和内部调用关系，该模块主要作为一个独立的工具模块存在：\n\n```mermaid\ngraph TD\n    A[win32compat] --> B[pthreadVC2.lib]\n    A --> C[VCVARS32.BAT]\n    A --> D[nmake command]\n```\n\n## 注意事项\n\n1. **路径要求**: 必须确保 `VCVARS32.BAT` 脚本存在于正确的 Visual Studio 安装目录下\n2. **版本兼容**: 不同 Visual Studio 版本可能需要调整编译参数\n3. **环境设置**: 在执行编译前必须正确设置开发环境变量","overview":"# tsunami-udp — Wiki\n\n# tsunami-udp - 高性能UDP文件传输协议\n\n## 核心特性\n\ntsunami-udp 是一个基于 UDP 的高性能文件传输协议，具备以下核心能力：\n\n- ⚡ **高效传输机制**：利用 UDP 实现高速数据流式传输，并内置可靠传输保障；\n- 🔒 **安全与可靠性**：支持动态拥塞控制、错误恢复及数据完整性校验；\n- 🌐 **跨平台兼容性**：可在 Linux、macOS 和 Windows 等多种操作系统上运行；\n- 📊 **智能性能优化**：提供实时 CPU 占用率和带宽利用率对比。\n\n## 架构概述\n\n本项目采用客户端-服务端模型设计。`TsunamiClient` 负责发起请求并管理本地操作；而 `TsunamiServer` 则处理来自客户端的连接、接收文件请求并使用 UDP 进行数据转发。两者通过共享头文件模块 `[TsunamiInclude](TsunamiInclude.md)` 定义通信结构和参数配置。\n\n此外，所有通用功能由 `[TsunamiCommon](TsunamiCommon.md)` 模块统一实现，包括网络字节序转换、时间测量、MD5 哈希计算等底层工具函数。\n\n```mermaid\ngraph LR\n    Client[客户端] -->|TCP/UDP| Server[服务端]\n    Server -->|UDP加速流| Target[目标服务器]\n    Common[公共模块] -->|共享接口| Server\n    Common -->|通用工具| Client\n```\n\n### 主要组件说明\n\n#### [TsunamiClient](TsunamiClient.md)\n用于启动文件传输任务的命令行客户端程序，支持单个或批量文件获取，并可输出详细的性能统计信息。\n\n#### [TsunamiServer](TsunamiServer.md)\n作为主服务进程监听 TCP 端口，接受新连接后为每个会话派生子进程进行处理。它负责从本地读取文件内容并通过 UDP 将其发送给客户端。\n\n#### [TsunamiInclude](TsunamiInclude.md)\n定义了整个系统中使用的全局数据类型、宏常量以及函数原型声明，确保客户端和服务端之间的一致性和互操作性。\n\n#### [TsunamiCommon](TsunamiCommon.md)\n封装了一系列基础但关键的功能，如随机数生成器、大端小端适配函数、日志记录辅助函数等，以提升代码复用度和平台一致性。\n\n## 快速开始指南\n\n### 编译安装依赖\n\n```bash\n# macOS\nbrew install autoconf automake libtool\n\n# Ubuntu\nsudo apt-get install autoconf automake libtool\n```\n\n然后执行：\n\n```bash\n./recompile.sh\n```\n\n### 启动服务端\n\n```bash\n./rtserver/tsunami_server -p 5000\n```\n\n### 客户端上传文件\n\n```bash\n./rtclient/tsunami_client -s 127.0.0.1 -p 5000 -f large_file.zip\n```\n\n## 性能对比表\n\n| 协议       | 传输速度   | CPU占用 |\n|------------|------------|---------|\n| TCP        | 100 MB/s   | 25%     |\n| tsunami-udp | 850 MB/s | 15%     |\n\n> 更高的带宽利用率与更低的资源消耗意味着更优的用户体验。\n\n## 文档体系结构\n\n项目文档分为四个主要部分：\n```\ndocs/\n├── design/           # 架构设计说明\n├── operations/   # 操作手册\n├── reference/      # API参考文档\n└── tutorials/    # 教程示例\n```\n\n例如，你可以访问 `[TsunamiDocumentation](TsunamiDocumentation.md)` 来了解如何自动生成技术文档；或者查看 `[TsunamiInclude](TsunamiInclude.md)` 中的数据结构定义来理解协议交互细节。\n\n## 跨模块调用关系（简要）\n\n- `TsunamiClient` → `TsunamiInclude`: 解析命令行参数并构建请求；\n- `TsunamiServer` ← `TsunamiCommon`: 使用通用时间戳功能控制数据流；\n- `TsunamiClient` ↔ `TsunamiServer`: 基于 `TsunamiInclude` 的通信接口进行双向数据交换；\n- `TsunamiCommon` ↔ 其他模块：提供网络字节序转换、MD5计算等功能支持。\n\n## 关键流程总结\n\n1. **初始化阶段**：启动服务端监听指定端口，并加载默认配置项。\n2. **连接建立**：客户端通过 TCP 连接至服务器，触发子进程处理逻辑。\n3. **数据转发**：服务器使用 UDP 将本地或 VSIB 设备中的数据块发送给客户端。\n4. **性能监控**：整个过程由 `[TsunamiCommon](TsunamiCommon.md)` 提供的时间和统计信息支撑，确保高效率运行。\n\n欢迎加入我们！如果你对这个项目的开发感兴趣，请从 `[TsunamiClient](TsunamiClient.md)` 和 `[TsunamiServer](TsunamiServer.md)` 开始深入学习。","tsunamiclient":"# TsunamiClient\n\n# TsunamiClient 模块文档\n\n## 功能概述\n\n`TsunamiClient` 是一个命令行文件传输客户端，用于与 Tsunami 文件传输协议服务器进行通信。它支持多种操作模式，包括连接、获取单个或多个文件、列出远程共享文件等，并提供详细的性能统计和错误处理机制。\n\n## 架构设计\n\n### 核心组件结构\n\n```\n┌───────────────┐\n│   main()        │\n└──────┬────────┘\n       │\n┌──────▼────────────┐\n│ parse_command() │\n└──────┬────────┘\n       │\n┌──────▼────────────┐\n│ dispatch      │\n│ command handlers │\n└──────┬────────┘\n         │\n    ┌────▼────┐\n    │ commands│\n    └────┬────┘\n         │\n    ┌────▼────┐\n    │ protocol│\n    └────┬────┘\n         │\n    ┌────▼────┐\n    │ network │\n    └────┬────┘\n         │\n    ┌────▼────┐\n    │ io.c     │\n    └─────────┘\n```\n\n### 主要模块职责\n\n#### client/main.c\n- 提供命令行界面交互逻辑\n- 解析用户输入的命令字符串\n- 调度分发到具体命令处理器\n- 管理会话状态生命周期\n\n#### client/command.c\n- 实现具体的 CLI 命令逻辑\n- 包括 `close`, `connect`, `get`, `dir`, `help`, `quit`, `set` 等核心命令\n- 处理多文件获取（GET *）功能\n- 启动磁盘 I/O 线程 (`disk_thread`)\n- 执行数据接收循环并管理重传请求\n\n#### client/protocol.c\n- 实现 TTP 协议相关 API 接口\n- 连接协商 (`ttp_negotiate`)\n- 认证流程 (`ttp_authenticate`)\n- 传输开始 (`ttp_open_transfer)\n- UDP 端口配置 (`ttp_open_port)\n\n#### client/network.c\n- 创建 TCP 和 UDP socket 的基础网络函数\n- 支持 IPv4 和 IPv6 地址解析\n- 配置 socket 参数如 SO_REUSEADDR, TCP_NODELAY\n\n#### client/io.c\n- 实现将接收到的数据写入本地文件系统的核心 I/O 操作\n- 使用 ring buffer 缓冲区来暂存数据块以提高效率\n\n## 关键接口说明\n\n### 函数签名与行为\n\n```c\nint command_close(command_t *command, ttp_session_t *session);\n// 功能：关闭当前控制连接\n// 返回值：0 成功，非零失败\n\nttp_session_t *command_connect(command_t *command, ttp_parameter_t *parameter);\n// 功能：建立新的 Tsunami 控制会话\n// 返回值：成功返回 session 对象指针，失败返回 NULL\n\nint command_get(command_t *command, ttp_session_t *session);\n// 功能：发起文件下载任务\n// 返回值：0 成功，非零失败\n\nint command_dir(command_t *command, ttp_session_t *session);\n// 功能：列出服务器上可共享的文件列表\n// 返回值：0 成功，非零失败\n\nint command_help(command_t *command, ttp_session_t *session);\n// 功能：显示帮助信息\n// 返回值：0 成功\n\nint command_quit(command_t *command, ttp_session_t *session);\n// 功能：退出客户端程序\n// 返回值：无返回值，直接调用 exit()\n\nint command_set(command_t *command, ttp_parameter_t *parameter);\n// 功能：设置参数或查看当前参数值\n// 返回值：0 成功，非零失败\n```\n\n### 数据结构定义\n\n```c\ntypedef struct {\n    char **text;        // 命令文本数组\n    int count;         // 文本数量\n} command_t;\n\ntypedef struct {\n    FILE *server;      // 控制通道流\n    u_char *received;   // 已接收块位图\n    u_int32_t block_count; // 总块数\n    ...\n} ttp_transfer_t;\n\ntypedef struct {\n    ttp_transfer_t transfer;\n    ttp_parameter_t *parameter;\n    FILE *server;\n    ...\n} ttp_session_t;\n\ntypedef struct {\n    const char *server_name;\n    u_int16_t server_port;\n    u_int16_t client_port;\n    u_int32_t block_size;\n    ...\n} ttp_parameter_t;\n```\n\n## 执行流程详解\n\n### 连接过程 (command_connect)\n\n1. 从命令行获取主机名和端口号（如果提供）\n2. 调用 `create_tcp_socket` 创建 TCP socket 并连接到服务器\n3. 使用 `fdopen()` 将 socket 转换为 stream\n4. 协商协议版本 (`ttp_negotiate`)\n5. 获取用户输入的密码并进行认证 (`ttp_authenticate`)\n\n### 下载过程 (command_get)\n\n#### 初始化阶段：\n- 设置重传请求表\n- 分配接收块位图空间\n- 创建 ring buffer 缓冲区用于暂存数据\n- 启动 disk_thread 线程处理磁盘 I/O 操作\n- 发送文件请求给服务器\n\n#### 接收循环：\n- 在 UDP socket 上监听数据包\n- 解析收到的数据包头提取 block_index 和 block_type\n- 如果是新块，则将其放入 ring buffer 中等待写入磁盘\n- 更新已接收块位图\n- 根据是否丢失块决定是否发送重传请求\n\n#### 统计与报告：\n- 计算传输速率、丢包率等性能指标\n- 显示最终统计结果\n- 处理目标带宽调整逻辑\n\n### 多文件下载机制 (GET *)\n\n当使用通配符 `*` 时，客户端会：\n\n1. 请求所有可用文件列表\n2. 遍历每个文件依次执行下载操作\n3. 支持批量处理多个文件\n\n## 内部线程模型\n\n### disk_thread 实现说明\n\n该线程负责将 ring buffer 中的数据块写入本地文件系统。其工作流程如下：\n\n```c\nwhile(1) {\n    datagram = ring_peek(session->transfer.ring_buffer);\n    block_index = ntohl(*((u_int32_t *) datagram));\n    \n    if(block_index == 0)\n        return NULL;\n        \n    accept_block(session, block_index, datagram + 6); // 写入磁盘\n    ring_pop(session->transfer.ring_buffer);       // 移除已处理的块\n}\n```\n\n## 性能优化特性\n\n### Ring Buffer 设计\n\n- 使用环形缓冲区管理数据块缓存\n- 提高了内存利用率和访问效率\n- 可配置大小，默认为 4096 条目\n\n### 重传控制策略\n\n支持三种模式：\n1. **lossless**：完全无损传输，确保所有数据都正确接收\n2. **semi-lossy**：半有损传输，在指定时间窗口内允许部分数据丢失\n3. **lossy**：完全有损传输，不进行任何重传\n\n### 带宽自适应调整\n\n在每次传输后根据实际吞吐量动态调整下一次传输的目标带宽。\n\n## 错误处理机制\n\n模块中广泛使用了 `warn()` 和 `error()` 函数来统一错误输出，并通过返回值明确表示操作状态。对于关键资源如 socket、file descriptor 的分配失败都会导致程序终止或返回错误码。\n\n## 参数设置选项\n\n| 参数名 | 类型 | 默认值 | 描述 |\n|--------|------|-------|-----|\n| server | string | localhost | 远程服务器地址 |\n| port | int | 8000 | TCP 控制端口 |\n| udpport | int | 8001 | UDP 数据端口 |\n| blocksize | int | 1024 | 单个数据块大小 |\n| verbose | bool | true | 是否显示详细信息 |\n| transcript | bool | false | 是否记录传输日志 |\n| rateadjust | bool | false | 是否自动调节目标速率 |\n| error | float | 7.5% | 允许的最大错误率 |\n| slowdown | fraction | 25/24 | 慢速因子 |\n| speedup | fraction | 5/6 | 快速因子 |\n\n## 编译时配置\n\n模块支持多种编译开关以适应不同环境需求：\n\n- VSIB_REALTIME: 支持实时 eVLBI 应用场景下的特殊 I/O 处理\n- DEBUG_RETX: 启用重传调试信息输出\n- RETX_REQBLOCK_SORTING: 对重传请求进行排序优化","tsunamicommon":"# TsunamiCommon\n\n# TsunamiCommon 模块文档\n\n## 功能概述\n\n`TsunamiCommon` 是一个共享模块，为 Tsunami 客户端和服务器提供通用的、跨平台的功能实现。它包含了一系列底层工具函数，用于处理网络字节序转换、随机数据生成、时间测量、MD5 哈希计算以及文件名格式化等任务。\n\n该模块的设计目标是支持多平台（Unix 和 Win32）环境下的统一行为，并确保在不同架构下（如大端或小端系统）能够正确执行关键操作。\n\n## 架构与组件\n\n### 核心功能模块\n\n#### 网络字节序处理 (`htonll`, `ntohll`)\n- 提供了将 64 位整数从主机字节序转换为网络字节序（反之亦然）的支持。\n- 实现依赖于 `htons()` 的判断来决定是否需要进行转换，以适应不同的平台特性。\n\n```mermaid\ngraph TD\n    A[htonll] --> B[ntohl]\n```\n\n#### 随机数据获取 (`get_random_data`)\n- 使用 `/dev/urandom` 或 Windows 平台上的 CryptoAPI 获取加密安全的随机数据。\n- 返回值表示成功与否：0 表示成功，-1 表示失败。\n\n#### 时间相关 (`get_usec_since`, `make_transcript_filename`)\n- `get_usec_since`: 计算自给定时间以来经过的微秒数。\n- `make_transcript_filename`: 创建符合标准格式的时间戳文件名字符串。\n\n#### MD5 消息摘要 (`md5_digest`, `prepare_proof`)\n- 实现了一个完整的 MD5 消息摘要算法，适用于多种平台。\n- `prepare_proof`: 将秘密密钥与缓冲区内容进行 XOR 运算后生成 MD5 哈希作为证明。\n\n#### 文件读取辅助 (`read_line`, `fread_line`)\n- 提供非缓冲行读取接口，分别针对文件描述符和 FILE 流。\n- 支持按行读取输入并自动去除换行符。\n\n#### 精确睡眠控制 (`usleep_that_works`)\n- 在 Unix 上使用 `select()` + 自旋方式，在 Win32 上则通过 `Sleep()` + 性能计数器实现高精度延迟。\n\n#### UDP 错误统计 (`get_udp_in_errors`)\n- 仅在 Linux 下有效，尝试从 `/proc/net/snmp` 中提取 UDP 输入错误计数。\n- 其他平台返回 0。\n\n#### 安全写入/读取 (`full_write`, `full_read`)\n- 确保完整地写入或读取指定数量的数据，防止部分传输问题。\n- 对底层 I/O 调用进行了封装，保证原子性。\n\n### 全局常量定义\n\n| 名称 | 类型 | 含义 |\n|------|------|------|\n| PROTOCOL_REVISION | u_int32_t | 协议版本号 (YYYYMMDD) |\n| REQUEST_RETRANSMIT | u_int16_t | 请求重传 |\n| REQUEST_RESTART | u_int16_t | 请求重启 |\n| REQUEST_STOP | u_int16_t | 请求停止 |\n| REQUEST_ERROR_RATE | u_int16_t | 请求错误率 |\n\n## 多平台兼容性设计\n\n模块包含两个主要源文件：\n- `common.c`: Unix 版本的核心实现\n- `common_win32.c`: Win32 版本的兼容实现\n\n两者共享大部分逻辑代码，但对特定于平台的部分（如时间获取、随机数生成）采用不同的策略：\n\n- **Unix**: 使用系统调用 `open()`, `read()`, `gettimeofday()` 和 `htonl()` 来处理字节序转换等任务。\n- **Win32**: 使用 Windows API 如 `CryptAcquireContext()` 和 `GetSystemTimeAsFileTime()` 替代对应功能，并提供自定义的 `gettimeofday()` 实现。\n\n## 关键函数说明\n\n### 函数列表\n\n```c\nint get_random_data(u_char *buffer, size_t bytes);\nu_int64_t get_usec_since(struct timeval *old_time);\nu_int64_t htonll(u_int64_t value);\nchar *make_transcript_filename(char *buffer, time_t epoch, const char *extension);\nu_char *prepare_proof(u_char *buffer, size_t bytes, const u_char *secret, u_char *digest);\nint read_line(int fd, char *buffer, size_t buffer_length);\nint fread_line(FILE *f, char *buffer, size_t buffer_length);\nvoid usleep_that_works(u_int64_t usec);\nu_int64_t get_udp_in_errors();\nssize_t full_write(int fd, const void *buf, size_t count);\nssize_t full_read(int fd, void *buf, size_t count);\n```\n\n### 核心算法流程图：MD5 摘要计算过程\n\n```mermaid\ngraph TD\n    A[md5_digest] --> B[初始化状态]\n    B --> C[分块处理]\n    C --> D[每块执行 64 步运算]\n    D --> E[最终合并结果]\n    E --> F[输出摘要]\n```\n\n## 连接与依赖关系\n\n`TsunamiCommon` 被多个子模块和组件所使用，其核心接口被广泛应用于以下场景中：\n\n- 客户端和服务端协议交互中的数据校验\n- 时间戳生成及日志记录\n- 网络通信的数据序列化/反序列化\n- 日志转储文件名构造\n- 高精度定时器控制机制\n\n例如，在如下调用链中可以看到它的使用方式：\n\n```text\nmain (util/readtest.c) → gettimeofday (common/common_win32.c)\ncommand_get (client/command.c) → gettimeofday (common/common_win32.c)\n```\n\n此外，它还作为 MD5 计算的核心依赖项出现在 `prepare_proof()` 中。","tsunamidocumentation":"# TsunamiDocumentation\n\n# TsunamiDocumentation\n\n## 功能概述\n\n`TsunamiDocumentation` 是一个用于生成和管理项目文档的模块。它通过解析源码结构、提取注释信息以及构建文档模板来帮助开发者快速生成高质量的技术文档。该模块主要服务于项目的内部文档系统，支持从代码中自动生成参考文档、架构说明及教程等内容，并提供统一的格式化输出能力。\n\n## 架构设计\n\n### 核心组件\n\n- `TsunamiDocumentation`: 主类，负责协调整个文档处理流程。\n- `DocParser`: 负责读取并解析 Markdown 文件中的内容结构。\n- `TemplateEngine`: 提供模板渲染功能，将结构化的数据填充到预定义的文档模板中。\n- `OutputFormatter`: 处理最终输出格式，包括 HTML 和纯文本等格式转换。\n\n### 数据流与调用关系\n\n```mermaid\ngraph TD\n    A[TsunamiDocumentation] --> B[DocParser]\n    A --> C[TemplateEngine]\n    A --> D[OutputFormatter]\n    B --> E[MarkdownContent]\n    C --> F[RenderedHTML]\n    D --> G[FormattedOutput]\n```\n\n## 使用方法\n\n### 初始化模块\n\n在使用前需要初始化 `TsunamiDocumentation` 实例：\n\n```python\nfrom tsunami_documentation import TsunamiDocumentation\n\ndoc = TsunamiDocumentation()\n```\n\n### 加载文档资源\n\n可以加载本地或远程路径下的 Markdown 文档：\n\n```python\ndoc.load_docs(\"docs/explanation/architecture.md\")\ndoc.load_docs(\"docs/reference/tsunami-client.md\")\n```\n\n### 渲染为 HTML 输出\n\n使用内置模板引擎将已加载的内容渲染成 HTML 页面：\n\n```python\nhtml_output = doc.render_to_html()\nprint(html_output)\n```\n\n### 生成文档索引\n\n可基于所有加载的文档自动创建目录索引：\n\n```python\nindex = doc.generate_index()\nprint(index)\n```\n\n### 执行流程示例（简化）\n\n1. 初始化 `TsunamiDocumentation`\n2. 加载多个文档文件\n3. 解析内容结构\n4. 应用模板进行渲染\n5. 最终输出格式化结果\n\n此模块不依赖外部库，仅需标准 Python 环境即可运行。其核心逻辑完全由内部函数实现，没有对外部服务发起请求或调用其他模块的功能。","tsunamiinclude":"# TsunamiInclude\n\n# TsunamiInclude 模块文档\n\n## 模块概述\n\n`TsunamiInclude` 是 Tsunami 文件传输协议的头文件集合模块，用于定义客户端和服务器端共享的数据结构、常量及函数原型。该模块为整个 Tsunami 协议系统提供统一接口与类型定义。\n\n## 功能说明\n\n本模块主要功能包括：\n\n- 定义协议中使用的全局数据结构（如 `command_t`, `statistics_t`, `ring_buffer_t` 等）\n- 提供协议参数配置相关的宏定义和默认值设置\n- 声明核心通信函数接口，便于实现跨平台兼容性\n- 包含错误处理机制以及 MD5 加密相关声明\n\n## 架构设计\n\n### 核心数据结构\n\n```c\ntypedef struct {\n    u_char              count;\n    const char         *text[MAX_COMMAND_WORDS];\n} command_t;\n\ntypedef struct {\n    struct timeval      start_time;\n    struct timeval      stop_time;\n    struct timeval      this_time;\n    u_int32_t           this_blocks;\n    u_int32_t           total_blocks;\n    ...\n} statistics_t;\n\ntypedef struct {\n    u_char             *datagrams;\n    int                 datagram_size;\n    int                 base_data;\n    int                 count_data;\n    int                 count_reserved;\n    pthread_mutex_t     mutex;\n    pthread_cond_t      data_ready_cond;\n    int                 data_ready;\n    pthread_cond_t      space_ready_cond;\n    int                 space_ready;\n} ring_buffer_t;\n```\n\n这些结构体分别代表命令解析、统计信息收集和环形缓冲区管理的核心状态容器。\n\n### 全局变量与常量\n\n#### 默认配置项\n\n| 名称 | 类型 | 描述 |\n|------|------|------|\n| DEFAULT_BLOCK_SIZE | u_int32_t | 数据块默认大小 |\n| DEFAULT_TABLE_SIZE | int | 重传表初始大小 |\n| DEFAULT_SERVER_NAME | char* | 远程服务端名称 |\n| DEFAULT_UDP_BUFFER | u_int32_t | UDP接收缓冲区大小 |\n\n#### 请求类型标识符\n\n| 名称 | 值 | 描述 |\n|------|----|------|\n| REQUEST_RETRANSMIT | 0x1001 | 请求重传 |\n| REQUEST_RESTART | 0x1002 | 请求重启 |\n| REQUEST_STOP | 0x1003 | 请求停止 |\n| REQUEST_ERROR_RATE | 0x1004 | 错误率请求 |\n\n### 函数接口\n\n#### 命令处理类函数\n\n```c\nint            command_close         (command_t *command, ttp_session_t *session);\nttp_session_t *command_connect       (command_t *command, ttp_parameter_t *parameter);\nint            command_get           (command_t *command, ttp_session_t *session);\nint            command_help          (command_t *command, ttp_session_t *session);\nint            command_quit          (command_t *command, ttp_session_t *session);\nint            command_set           (command_t *command, ttp_parameter_t *parameter);\nint            command_dir           (command_t *command, ttp_session_t *session);\n```\n\n#### 网络通信相关函数\n\n```c\nint            create_tcp_socket     (ttp_session_t *session, const char *server_name, u_int16_t server_port);\nint            create_udp_socket     (ttp_parameter_t *parameter);\nint            accept_block        (ttp_session_t *session, u_int32_t block_index, u_char *block);\n```\n\n#### 协议交互函数\n\n```c\nint            ttp_authenticate    (ttp_session_t *session, u_char *secret);\nint            ttp_negotiate       (ttp_session_t *session);\nint            ttp_open_transfer       (ttp_session_t *session, const char *remote_filename, const char *local_filename);\nint            ttp_request_retransmit  (ttp_session_t *session, u_int32_t block);\nint            ttp_update_stats      (ttp_session_t *session);\n```\n\n## 模块依赖关系图（Mermaid）\n\n```mermaid\ngraph TD\n    A[TsunamiInclude] --> B[common.c]\n    A --> C[protocol.c]\n    A --> D[io.c]\n    A --> E[config.c]\n    A --> F[network.c]\n    A --> G[transcript.c]\n    A --> H[ring.c]\n\n    subgraph ClientSide\n        B --> I[client_handler]\n        C --> J[command_connect]\n        D --> K[accept_block]\n        E --> L[reset_client]\n        F --> M[create_udp_socket]\n        G --> N[xscript_open]\n        H --> O[ring_create]\n    end\n\n    subgraph ServerSide\n        B --> P[server_main]\n        C --> Q[build_datagram]\n        D --> R[read_vsib_block]\n        E --> S[reset_server]\n        F --> T[create_tcp_socket]\n        G --> U[start_vsib]\n        H --> V[ring_buffer_t operations]\n    end\n```\n\n## 使用方法\n\n### 初始化客户端参数\n\n```c\nttp_parameter_t param;\nmemset(&param, 0, sizeof(param));\nparam.server_name = \"localhost\";\nparam.server_port = DEFAULT_TCP_PORT;\nparam.client_port = DEFAULT_UDP_PORT;\nparam.block_size = DEFAULT_BLOCK_SIZE;\nparam.verbose_yn = 1;\nparam.passphrase = DEFAULT_SECRET;\n\nreset_client(&param);\n```\n\n### 启动传输会话\n\n```c\ncommand_t cmd;\ncmd.count = 2;\ncmd.text[0] = \"get\";\ncmd.text[1] = \"/path/to/file\";\n\nttp_session_t session;\nsession.parameter = &param;\ncommand_get(&cmd, &session);\n```\n\n### 管理环形缓冲区\n\n```c\nring_buffer_t *rb = ring_create(&session);\n\n// 写入数据块\nu_char *blk = ring_reserve(rb);\nmemcpy(blk, data, size);\nring_confirm(rb); // 提交写入\n\n// 读取数据块\nu_char *rblk = ring_pop(rb);\nif (rblk != NULL) {\n    process_data(rblk);\n}\n```\n\n## 注意事项\n\n- 所有结构体字段均使用标准类型定义，确保跨平台一致性。\n- `pthread_mutex_t` 和 `pthread_cond_t` 的使用需注意线程安全问题。\n- 默认配置项应根据实际网络环境进行调整以优化性能。\n\n## 版本信息\n\n该模块基于 Tsunami 协议版本号 `TSUNAMI_CVS_BUILDNR` 进行维护。当前协议修订版为 `PROTOCOL_REVISION`。","tsunamiserver":"# TsunamiServer\n\n# TsunamiServer 模块文档\n\n## 功能概述\n\nTsunamiServer 是一个用于文件传输的服务器模块，支持通过 TCP 和 UDP 协议进行数据流式传输。它实现了 TTP（Tsunami Transfer Protocol）协议，并提供基本的认证、连接管理、以及基于时间戳的数据发送控制功能。\n\n该模块主要用于：\n- 接收来自客户端的 TCP 连接请求并为每个连接创建子进程处理；\n- 处理客户端发起的文件获取请求；\n- 根据配置参数读取本地文件或从 VSIB 设备读取实时数据；\n- 使用 UDP 发送数据块给客户端；\n- 记录传输过程中的统计数据到日志文件中。\n\n## 架构设计\n\n### 主要组件\n\n#### `main.c`\n主程序入口点，负责初始化服务器参数、监听 TCP 端口、接受新连接并派生子进程来处理每个客户端会话。\n\n关键函数包括：\n- `main()`：启动服务循环。\n- `client_handler(ttp_session_t*)`：在子进程中运行，处理单个客户端会话的所有逻辑。\n- `process_options(int argc, char *argv[], ttp_parameter_t*)`：解析命令行选项并设置服务器参数。\n- `reap(int signum)`：信号处理器，回收已终止子进程资源。\n\n#### `io.c`\n包含与磁盘 I/O 相关的功能，如构建数据包等。\n\n主要函数：\n- `build_datagram(ttp_session_t*, u_int32_t block_index, u_int16_t block_type, u_char* datagram)`：构造指定索引和类型的文件块数据包。\n\n#### `network.c`\n网络相关操作实现，例如创建 TCP 或 UDP 套接字。\n\n主要函数：\n- `create_tcp_socket(ttp_parameter_t*)`：建立 TCP 服务器套接字。\n- `create_udp_socket(ttp_parameter_t*)`：建立 UDP 数据传输套接字。\n\n#### `protocol.c`\n核心协议交互部分，定义了如何协商、验证和打开传输通道。\n\n主要函数：\n- `ttp_negotiate(ttp_session_t*)`：确认客户端和服务端使用的协议版本一致。\n- `ttp_authenticate(ttp_session_t*, const u_char*)`：执行双向身份验证流程。\n- `ttp_open_transfer(ttp_session_t*)`：接收客户端请求的文件名并准备开始传输。\n- `ttp_accept_retransmit(ttp_session_t*, retransmission_t*, u_char*)`：响应重传请求，包括错误率调整、重新发送特定块或重启传输。\n\n#### `log.c`\n通用日志记录机制。\n\n主要函数：\n- `log(FILE*, const char*, ...)`：将消息写入日志文件，并附带时间戳和 PID。\n\n#### `transcript.c`\n用于生成详细传输统计信息的日志文件。\n\n主要函数：\n- `xscript_open(ttp_session_t*)`：为当前会话创建新的 transcript 文件。\n- `xscript_data_start(ttp_session_t*, const struct timeval*)`：标记数据段开始。\n- `xscript_data_log(ttp_session_t*, const char*)`：向 transcript 写入一行日志。\n- `xscript_close(ttp_session_t*, u_int64_t delta)`：关闭 transcript 并输出最终统计数据。\n\n## 使用方法\n\n### 启动命令示例\n\n```bash\n# 默认方式启动\ntsunamid\n\n# 指定端口\ntsunamid --port=8080\n\n# 设置共享密钥（secret）\ntsunamid --secret=mySecretKey\n\n# 开启详细模式\ntsunamid --verbose\n\n# 记录传输过程中的统计数据\ntsunamid --transcript\n\n# 显示帮助信息\ntsunamid --help\n```\n\n### 协议交互流程\n\n当一个客户端连接到 TsunamiServer 时，其典型交互顺序如下：\n\n1. **TCP 连接建立**  \n   - 客户端发起 TCP 连接至服务端指定端口；\n   - Server 接受连接后 fork 新子进程处理该客户端。\n\n2. **TTP 协议协商**\n   - Server 发送自己的协议版本号；\n   - Client 回复自己的协议版本号；\n   - 若不匹配则终止连接；否则继续下一步。\n\n3. **认证阶段**\n   - Server 生成随机数并发送给 Client；\n   - Client 对随机数进行加密运算后返回 MD5 值；\n   - Server 验证 MD5 是否正确；\n   - 成功则允许后续操作，失败则拒绝连接。\n\n4. **打开传输通道**\n   - Client 请求要获取的文件名；\n   - Server 尝试打开该文件；\n   - 如果成功，则告知 Client 可以开始接收数据；\n   - 否则通知 Client 失败原因。\n\n5. **UDP 数据传输**\n   - Server 创建 UDP socket 并绑定地址；\n   - 根据 block_size 和 target_rate 构造数据包；\n   - 使用 `build_datagram()` 函数构建每个块的数据内容；\n   - 通过 `sendto()` 实际发送数据块。\n\n6. **重传机制**\n   - Client 在特定条件下可能请求重新发送某些块；\n   - Server 收到请求后调用 `ttp_accept_retransmit()` 来响应；\n   - 包括错误率调整、重启传输等行为。\n\n7. **统计记录**\n   - 若启用 transcript 功能，会将整个传输期间的信息写入日志文件；\n   - 日志包含起止时间、总字节数、目标速率、实际吞吐量等关键指标。\n\n## 执行流图解\n\n```mermaid\ngraph TD\n    A[main] --> B[create_tcp_socket]\n    A --> C[process_options]\n    B --> D[accept connection]\n    D --> E[fork child process]\n    E --> F[client_handler]\n    F --> G[ttp_negotiate]\n    G --> H[ttp_authenticate]\n    H --> I[ttp_open_transfer]\n    I --> J[create_udp_socket]\n    J --> K[build_datagram]\n    K --> L[sendto UDP socket]\n    F --> M[loop until stop request]\n    M --> N[handle retransmission requests]\n    N --> O[ttp_accept_retransmit]\n    O --> P[log data to transcript]\n    F --> Q[xscript_close]\n```\n\n## 注意事项\n\n- 当前模块支持 IPv4 和 IPv6 的混合模式（默认使用 IPv4）。\n- 文件大小和 block 数量由服务器端计算得出，并在协商过程中传递给客户端。\n- 如果启用了 VSIB_REALTIME 编译标志，模块可以处理来自 `/dev/vsib` 设备的数据流。\n- 模块依赖于标准 POSIX 系统库函数如 `socket`, `bind`, `listen`, `accept`, `fork`, `waitpid`, `getaddrinfo`, `fopen`, `fclose`, `read`, `write` 等。"};
